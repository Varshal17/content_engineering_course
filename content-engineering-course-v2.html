<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Content Engineering — An Interactive Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4EFE6;
    --bg-elevated: #FDFAF3;
    --bg-sidebar: #EDE6D6;
    --ink: #1C1917;
    --ink-soft: #57534E;
    --ink-faint: #A8A29E;
    --accent: #9F1239;
    --accent-hover: #881337;
    --accent-soft: #FECDD3;
    --rule: #DDD3BD;
    --rule-soft: #E7E1D4;
    --complete: #15803D;
    --code-bg: #2A2724;
    --code-ink: #F4EFE6;
    --highlight: #FEF3C7;
    --shadow-soft: 0 1px 2px rgba(28,25,23,.04), 0 4px 16px rgba(28,25,23,.06);
    --shadow-strong: 0 4px 16px rgba(28,25,23,.08), 0 12px 32px rgba(28,25,23,.10);

    --font-display: "Fraunces", "Iowan Old Style", "Palatino", "Baskerville", Georgia, serif;
    --font-body: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", "SF Mono", Consolas, ui-monospace, monospace;

    --sidebar-w: 320px;
    --content-w: 720px;
    --ease: cubic-bezier(.4, 0, .2, 1);
  }

  [data-theme="dark"] {
    --bg: #1A1817;
    --bg-elevated: #242220;
    --bg-sidebar: #14110F;
    --ink: #F4EFE6;
    --ink-soft: #C7B299;
    --ink-faint: #78706A;
    --accent: #FB7185;
    --accent-hover: #F472B6;
    --accent-soft: #4C1D2F;
    --rule: #3A3530;
    --rule-soft: #2A2724;
    --complete: #4ADE80;
    --code-bg: #0E0C0B;
    --code-ink: #F4EFE6;
    --highlight: #44340A;
    --shadow-soft: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
    --shadow-strong: 0 4px 16px rgba(0,0,0,.5), 0 12px 32px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color .3s var(--ease), color .3s var(--ease);
  }

  ::selection { background: var(--accent); color: var(--bg); }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--rule);
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
    padding: 28px 0;
    transition: transform .3s var(--ease);
  }

  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  .brand {
    padding: 0 28px 24px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 20px;
  }

  .brand-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .brand-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 22px;
    line-height: 1.15;
    letter-spacing: -.01em;
    color: var(--ink);
    font-style: italic;
  }

  .brand-title em {
    font-style: normal;
    font-weight: 600;
  }

  .progress-summary {
    padding: 0 28px 20px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 20px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .progress-label-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  .progress-label-pct {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 20px;
    color: var(--accent);
    font-feature-settings: "tnum";
  }

  .progress-track {
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width .5s var(--ease);
    border-radius: 2px;
  }

  .nav-section {
    margin-bottom: 8px;
  }

  .nav-section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 8px 28px;
    font-weight: 500;
  }

  .nav-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 28px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.4;
    transition: background .15s var(--ease), color .15s var(--ease);
    position: relative;
  }

  .nav-item:hover {
    background: var(--bg-elevated);
    color: var(--ink);
  }

  .nav-item.active {
    background: var(--bg-elevated);
    color: var(--ink);
  }

  .nav-item.active::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .nav-item-number {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    min-width: 24px;
    padding-top: 2px;
    font-feature-settings: "tnum";
  }

  .nav-item-title {
    flex: 1;
    padding-right: 8px;
  }

  .nav-item-check {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--rule);
    flex-shrink: 0;
    margin-top: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s var(--ease);
  }

  .nav-item.complete .nav-item-check {
    background: var(--complete);
    border-color: var(--complete);
  }

  .nav-item.complete .nav-item-check::after {
    content: "";
    width: 4px;
    height: 7px;
    border: solid white;
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg) translateY(-1px);
  }

  .nav-item.complete .nav-item-title {
    color: var(--ink-faint);
  }

  .sidebar-footer {
    padding: 20px 28px;
    border-top: 1px solid var(--rule);
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .util-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 12px;
    transition: all .15s var(--ease);
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .util-btn:hover {
    background: var(--bg-elevated);
    color: var(--ink);
    border-color: var(--ink-soft);
  }

  /* Main */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar {
    height: 60px;
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .topbar-left {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .topbar-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s var(--ease);
  }

  .icon-btn:hover {
    background: var(--bg-elevated);
    color: var(--ink);
    border-color: var(--ink-soft);
  }

  .menu-btn { display: none; }

  /* Lesson */
  .lesson-container {
    flex: 1;
    padding: 56px 48px 80px;
    max-width: 100%;
    overflow-x: hidden;
  }

  .lesson {
    max-width: var(--content-w);
    margin: 0 auto;
    animation: fadeUp .5s var(--ease);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lesson-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .lesson-meta-rule {
    height: 1px;
    width: 32px;
    background: var(--accent);
  }

  h1.lesson-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.05;
    letter-spacing: -.02em;
    color: var(--ink);
    margin-bottom: 24px;
    font-feature-settings: "ss01";
  }

  .lesson-title em {
    font-style: italic;
    color: var(--accent);
  }

  .lesson-intro {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 1.45;
    color: var(--ink-soft);
    font-weight: 300;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
    font-style: italic;
  }

  h2.section-head {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -.01em;
    line-height: 1.2;
    color: var(--ink);
    margin: 48px 0 20px;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
    position: relative;
  }

  h2.section-head:first-child {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }

  h2.section-head .head-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: .1em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
  }

  h3.subsection {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    margin: 32px 0 14px;
    line-height: 1.3;
    letter-spacing: -.005em;
  }

  h4.minor-head {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 28px 0 12px;
  }

  .prose p {
    font-size: 17px;
    line-height: 1.65;
    margin-bottom: 18px;
    color: var(--ink);
  }

  .prose p.lead {
    font-size: 19px;
    color: var(--ink-soft);
  }

  .prose strong { font-weight: 600; color: var(--ink); }
  .prose em { font-style: italic; }

  .prose ul, .prose ol {
    margin: 8px 0 24px 0;
    padding-left: 0;
    list-style: none;
  }

  .prose ul li, .prose ol li {
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 12px;
    padding-left: 28px;
    position: relative;
  }

  .prose ul li::before {
    content: "—";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 500;
  }

  .prose ol {
    counter-reset: ol-counter;
  }

  .prose ol li {
    counter-increment: ol-counter;
  }

  .prose ol li::before {
    content: counter(ol-counter, decimal-leading-zero);
    position: absolute;
    left: 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    top: 2px;
  }

  .prose a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    transition: color .15s var(--ease);
  }

  .prose a:hover { color: var(--accent-hover); }

  .prose code {
    font-family: var(--font-mono);
    font-size: .88em;
    background: var(--rule-soft);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--ink);
    font-weight: 500;
  }

  .prose pre {
    background: var(--code-bg);
    color: var(--code-ink);
    border-radius: 8px;
    padding: 20px 24px;
    overflow-x: auto;
    margin: 20px 0;
    font-size: 14px;
    line-height: 1.6;
    border: 1px solid var(--rule);
    box-shadow: var(--shadow-soft);
  }

  .prose pre code {
    background: transparent;
    padding: 0;
    color: inherit;
    font-size: inherit;
    font-weight: 400;
  }

  .prose blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 24px;
    margin: 24px 0;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink-soft);
  }

  .prose blockquote p {
    margin-bottom: 12px;
    font-size: inherit;
    color: inherit;
  }

  .prose blockquote p:last-child { margin-bottom: 0; }

  .prose table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 14px;
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }

  .prose th {
    text-align: left;
    padding: 12px 16px 12px 0;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--accent);
    font-weight: 500;
    border-bottom: 1px solid var(--rule);
  }

  .prose td {
    padding: 14px 16px 14px 0;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
    line-height: 1.5;
  }

  .prose tr:last-child td { border-bottom: none; }

  /* Scenario callout */
  .scenario {
    background: var(--bg-elevated);
    border-left: 3px solid var(--accent);
    padding: 28px 32px;
    margin: 24px 0;
    border-radius: 0 8px 8px 0;
    position: relative;
  }

  .scenario-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scenario-label::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .scenario p {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .scenario p:last-child { margin-bottom: 0; }

  /* Activity */
  .activity {
    background: var(--bg-elevated);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 32px;
    margin: 32px 0;
    box-shadow: var(--shadow-soft);
  }

  .activity-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
  }

  .activity-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .activity-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ink);
  }

  .activity-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    flex-shrink: 0;
    padding-top: 8px;
    letter-spacing: .05em;
  }

  .save-indicator {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
    transition: background .3s var(--ease);
  }

  .save-indicator.saved {
    background: var(--complete);
  }

  .save-indicator.saving {
    background: var(--accent);
    animation: pulse 1s var(--ease) infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  .activity-prompt {
    margin-bottom: 20px;
  }

  .activity-prompt p,
  .activity-prompt ul,
  .activity-prompt ol {
    color: var(--ink);
  }

  .activity-workspace {
    margin-top: 20px;
  }

  .workspace-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .word-count {
    color: var(--ink-faint);
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .workspace-textarea {
    width: 100%;
    min-height: 200px;
    padding: 16px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    transition: border-color .15s var(--ease);
  }

  .workspace-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .workspace-textarea::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  /* Self-check */
  .selfcheck {
    background: var(--bg-elevated);
    border: 1px dashed var(--rule);
    border-radius: 10px;
    padding: 28px 32px;
    margin: 32px 0;
  }

  .selfcheck-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
  }

  .selfcheck-question {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
  }

  .selfcheck-question:last-child { border-bottom: none; }

  .selfcheck-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s var(--ease);
  }

  .selfcheck-question.checked .selfcheck-checkbox {
    background: var(--complete);
    border-color: var(--complete);
  }

  .selfcheck-question.checked .selfcheck-checkbox::after {
    content: "";
    width: 5px;
    height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translateY(-1px);
  }

  .selfcheck-question.checked .selfcheck-text {
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--ink-faint);
  }

  .selfcheck-text {
    font-size: 16px;
    color: var(--ink);
    line-height: 1.5;
    transition: color .15s var(--ease);
  }

  /* Apply callout */
  .apply-callout {
    background: linear-gradient(180deg, var(--bg-elevated) 0%, transparent 100%);
    border-top: 1px solid var(--accent);
    padding: 24px 0 0 0;
    margin: 32px 0;
  }

  .apply-callout-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .apply-callout p {
    font-family: var(--font-display);
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink);
    font-style: italic;
  }

  /* Complete CTA */
  .complete-cta {
    margin: 64px 0 24px;
    padding: 32px;
    border: 1px solid var(--rule);
    border-radius: 10px;
    background: var(--bg-elevated);
    text-align: center;
  }

  .complete-cta-text {
    font-family: var(--font-display);

      <p>This content engineer designs schemas, taxonomies, and CMS architectures. They make content reusable across web, mobile, voice, print, and AI surfaces. They live at the intersection of content strategy and software engineering. Forrester, NN/G, SimpleA, and the German firm parson all describe the role this way.</p>

{
  id: "m1",
  section: "Module 1",
  number: "01",
  title: "Content Modeling",
  intro: "The foundational craft. Most things content engineers do flow from the model. Get this right and the rest of the system gets easier; get this wrong and everything downstream suffers.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>A content engineer's first job is to model content. That means deciding, for each kind of content in a product: what fields it has, what types those fields are, what validation applies, what other content types it relates to, what lifecycle states it can be in, and how it will be used across surfaces.</p>
      <p>This is design work. It just produces a different artifact than your usual Figma file. A content model is a schema document or a diagram — boxes for content types, lines for references, annotations for fields and validation.</p>
      <p>Most content systems fail because nobody modeled them carefully. The most common pathology is what Karen McGrane calls "blob" content — fields named "body" or "content" that hold giant pieces of unstructured rich text. Blob content is opaque to systems: it can't be queried, validated, transformed, or reliably rendered to a new surface. The work of content modeling is to break blobs apart into typed, structured fields with rules.</p>
      <p>The two books that define this practice: <a href="https://rosenfeldmedia.com/books/designing-connected-content/" target="_blank"><em>Designing Connected Content</em></a> by Carrie Hane and Mike Atherton (2017), and <a href="https://abookapart.com/products/content-everywhere" target="_blank"><em>Content Everywhere</em></a> by Sara Wachter-Boettcher (2012). If you read only one industry book on content engineering, read Hane and Atherton.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<p>You model content all the time, informally. You just call it something else.</p>
      <ul>
        <li>Every time you spec a Figma flow with annotated copy, you've made decisions about what content "fields" exist in that screen — a heading, a body, a primary CTA label, an optional secondary CTA, an icon. That's a model.</li>
        <li>Every time you've written a content pattern in your design system ("error messages should follow this structure"), you've described a content type's fields.</li>
        <li>Every time you've defined when a piece of content is "ready to ship" (legal-approved, accessibility-checked, localized), you've described a lifecycle.</li>
        <li>Every time you've debated whether two similar screens are "the same component with different content" or "two different components," you've made a modeling decision.</li>
      </ul>
      <p>The leap is to formalize this. Write the model down with field names, types, validation, and references — the way an engineer would read it.</p>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "The core terms" },
    { type: "prose", html: `<ul>
      <li><strong>Content type</strong> — a category of content. Article, Author, Product, Notification, Disclosure, ErrorMessage. Sometimes called a content "model" (singular).</li>
      <li><strong>Field</strong> — a property of a content type. <code>title</code>, <code>body</code>, <code>publishedAt</code>.</li>
      <li><strong>Type</strong> — what kind of value a field accepts. Short text, long text, rich text, integer, decimal, boolean, date, datetime, image, file, URL, reference, array, enum.</li>
      <li><strong>Validation</strong> — rules a field's value must follow. Required, max length, unique, regex pattern, min/max value, allowed enum values.</li>
      <li><strong>Reference</strong> — a pointer from one record to another. An Article references an Author. Cardinality matters: one-to-one, one-to-many, many-to-many.</li>
      <li><strong>Entry / record / item</strong> — a single instance of a content type. The Article "How to set up 2FA" is one entry of type Article.</li>
      <li><strong>Lifecycle</strong> — the states a content entry moves through. Draft → in review → published → archived. Or in regulated contexts: draft → editorial review → legal review → compliance approval → published → due for re-review → archived.</li>
      <li><strong>Atomic content</strong> — content modeled at its smallest meaningful unit, so it can be composed into larger structures. An Address is atomic; an "About Us" page is not — it's composed of atoms.</li>
      <li><strong>Composability</strong> — the property of a model that lets you assemble larger content (pages, emails, flows) from reusable atomic pieces.</li>
    </ul>` },

    { type: "prose", html: `<ol>
      <li><strong>Reflect the domain, not the page.</strong> Don't model a "Homepage" content type with 40 fields. Model the things that make up the homepage: Hero, FeatureGrid, Testimonial, Product. Compose pages from those. The same Testimonial then appears on the homepage, the pricing page, and an email.</li>
      <li><strong>Atomic, then composed.</strong> Model the smallest meaningful unit (Author, Image-with-credit, Address, Disclosure). Compose larger types from those atoms.</li>
      <li><strong>Plan for variants and exceptions early.</strong> The most painful refactors are when you modeled Product and then someone adds Bundle. Or Article and then someone needs Video Article. Ask: what variants might exist in 18 months?</li>
    </ol>` },

    { type: "minor", text: "Common modeling mistakes" },
    { type: "prose", html: `<ul>
      <li><strong>The God Type:</strong> one content type with 80 fields, half blank on any given entry. "Page" types are usually this.</li>

      <li><strong>Flat structure with no references:</strong> the same author name typed manually on 200 articles. Author changes their byline preference — you update 200 records.</li>
      <li><strong>Coupling content to layout:</strong> fields called <code>leftColumnText</code> and <code>rightColumnText</code>. The day you redesign, you migrate every record.</li>
      <li><strong>No locale awareness:</strong> modeling everything assuming English, bolting on localization later. It's always painful.</li>
      <li><strong>No governance fields:</strong> in regulated contexts, no <code>lastReviewedBy</code>, no <code>complianceCategory</code>, no <code>validUntil</code>. The model can't answer compliance questions.</li>

    { type: "head", text: "Real scenario — modeling an error message pattern", num: "IV" },
    { type: "scenario", html: `<p>You're a content designer at a fintech. Your design system already has an "ErrorMessage" component visually, but it's just defined as <code>{title, body, severity}</code> in the content guidelines. Different product teams have started using it for everything: API failures, validation errors, blocking regulatory errors ("we can't open accounts in your state"), session timeouts, partial outages.</p>
      <p>Some need a primary action ("Try again"), some need a "Contact support" link, some need a learn-more link to a help article. Compliance asks: "Can you tell me which error messages have regulatory implications?" Nobody can answer because the model doesn't capture that.</p>
      <p>You volunteer to model the ErrorMessage content type properly. The result, after a week:</p>
      <pre><code>CONTENT TYPE: ErrorMessage
PURPOSE: a structured pattern for any error or blocking message
shown to a user, anywhere in the product.

FIELDS:
- id (slug, required, unique) — e.g., "session-expired-mobile"
- title (string, required, max 60 chars)
- body (rich text, max 300 chars)
- severity (enum: "info" / "warning" / "error" / "blocking")
- category (enum: "network" / "validation" / "permission" /

- primaryAction (reference to Action, optional)
- secondaryAction (reference to Action, optional)
- learnMoreArticle (reference to HelpArticle, optional)
- screenReaderLabel (string, required if title is jargon-heavy)
- isRegulatory (boolean) — drives compliance review workflow
- regulatoryJurisdictions (array of strings, required if

- lastReviewedBy (reference to Reviewer, required if isRegulatory)
- lastReviewedAt (date, required if isRegulatory)
- usedOn (array of strings, system-maintained) — back-references

REFERENCES:
- Action (sub-type: label, url or eventName, kind)
- HelpArticle
- Reviewer

LIFECYCLE:
- draft → editorial review → (if regulatory) legal review →
  published → due for re-review (every 12 months for regulatory)
- archived (with reason)</code></pre>
      <p>This is twenty lines of YAML, but it transforms the design system. Compliance can now query "all ErrorMessages where <code>isRegulatory</code> is true and <code>lastReviewedAt</code> is older than 12 months." Engineers can render a consistent component because the data is predictable. Writers can't ship a regulatory message without naming who reviewed it. And the "Page" team can stop reinventing error messages from scratch — they reference an existing one.</p>

REFERENCES:

    { type: "activity", id: "1.2", title: "The 'future variants' stress-test", prompt: `<p>Now take the content type you just modeled and stress-test it. Imagine three plausible future variants the product might need in the next 18 months. For each, decide:</p>

      <ul>
        <li>One box per content type</li>
        <li>Field names listed inside each box (you don't have to list every field — the important ones)</li>
        <li>Arrows from one type to another for references</li>
        <li>Label each arrow with its cardinality: <code>1..1</code>, <code>1..N</code>, <code>0..1</code>, <code>0..N</code></li>
        <li>Annotate optional fields with a marker</li>
      </ul>
      <p>This diagram is something you can actually show an engineer or product manager. It's a shared artifact. Paste a screenshot link or describe the diagram in the workspace below.</p>`,
      placeholder: "Link or description of my model diagram:\\n\\nKey decisions visible in the diagram:\\n- \\n- " },

    { type: "apply", html: `<p>In your next content design review, when a designer presents a flow, ask: <em>"What's the content type for this thing, and what are its fields?"</em> Not "what does the copy say." If they look puzzled, that's the opportunity. Sketch the model with them in the meeting. You'll watch the conversation reshape itself.</p>` },

    { type: "selfcheck", questions: [
      "Can you explain the difference between a content type and a page to a designer who only thinks in screens?",
      "Why is referencing an Author better than typing their name into a string field?",
      "What's the difference between a field's type and its validation?",
      "Name three governance fields you'd add to any regulated content type."
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>By the end of this module, you should have one polished content model document. Treat it as a portfolio piece. The format that interviews well:</p>
      <ol>
        <li>A one-paragraph context — what product, what content type, what problem this model solves</li>
        <li>The full field-level model (the YAML-style spec from Activity 1.1)</li>
        <li>A diagram (from Activity 1.3)</li>
        <li>A "tradeoffs and decisions" section: 3–5 modeling decisions you made, the alternatives considered, why you chose what you chose</li>
        <li>A "future variants" section (from Activity 1.2)</li>
      </ol>
      <p>In an interview, this document lets you tell a real story: "I noticed X was being modeled as a blob, so I formalized it. Here's the result. Here's what tradeoffs I considered." That conversation, more than any portfolio of screenshots, gets content designers hired into engineering-adjacent roles.</p>` }
  ]
},
{
  id: "m2",
  section: "Module 2",
  number: "02",
  title: "Taxonomy and Metadata",
  intro: "Content modeling defines what each piece of content is. Taxonomy defines how all your content is organized. Get the model right and individual entries make sense. Get the taxonomy right and your whole content estate becomes navigable, queryable, and governable.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>A content engineer's second craft is taxonomy: the organized system of categories, tags, and relationships you wrap around content. Taxonomy is what makes content findable (by users and by search), filterable (in UI and in queries), and reportable (by content ops and compliance).</p>
      <p>Metadata is data <em>about</em> content — not the content itself. Title, author, published date, locale, status, tags. The frontmatter at the top of a Markdown file is metadata. So is the "category" enum on a help article. So is the "isRegulatory" flag from Module 1.</p>
      <p>Taxonomy work tends to be invisible until it's broken. The classic failure mode: a help center launches with free-text tags. Three years later there are 200 tags including "AI", "ai", "Artificial Intelligence", "machine-learning", "ML", and "GPT". Filtering is unreliable. Analytics is meaningless. The team's compliance officer can't pull a list of all articles touching AML rules. The fix is a taxonomy redesign — a months-long project that didn't have to happen if taxonomy had been an explicit design decision at launch.</p>
      <p>The canonical book on this is Heather Hedden's <em>The Accidental Taxonomist</em>. The discipline traces back to library and information science, decades before content engineering existed as a term.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<ul>
      <li>Every time you've tagged a Figma file with a label, you've used a folksonomy.</li>
      <li>Every time you've grouped help articles into categories, you've designed a taxonomy.</li>
      <li>Every time you've named the status of a piece of content ("In review", "Approved", "Live"), you've defined an enum.</li>
      <li>Every time you've debated whether two topics are really one topic ("Should 'Sending money' and 'Transfers' be separate categories?"), you've done taxonomy work.</li>
    </ul>
    <p>The transition is from "tagging things as you go" to "designing the controlled vocabulary up front, with definitions, and pushing the system to enforce it."</p>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "Controlled vocabulary vs. folksonomy" },
    { type: "prose", html: `<ul>
      <li><strong>Controlled vocabulary</strong> — a fixed, curated list of allowed values. Editors pick from a dropdown. Examples: <code>severity</code> = "info" / "warning" / "error". Better for filters, navigation, analytics, compliance queries.</li>
      <li><strong>Folksonomy</strong> — free-form tags writers can invent. Better for emergent topics, exploratory tagging. Worse for analytics because of inconsistency.</li>
      <li><strong>Hybrid</strong> — what most mature systems use: controlled vocabularies for anything that drives UI or compliance, plus optional free tags for editorial flavor.</li>
    </ul>` },

    { type: "minor", text: "Hierarchy and faceting" },
    { type: "prose", html: `<ul>
      <li><strong>Hierarchical taxonomy</strong> — categories with parent/child relationships. "Account security" is a parent; "Two-factor authentication" is a child. Good for browse navigation.</li>
      <li><strong>Faceted classification</strong> — multiple parallel dimensions, each applied independently. An article can be tagged with <em>topic</em> = "Account security", <em>audience</em> = "Retail banking", <em>region</em> = "EU", <em>difficulty</em> = "Beginner". Users filter by combining facets.</li>
      <li><strong>Polyhierarchy</strong> — an item belongs to multiple parents. "Phishing" might live under both "Security" and "Email."</li>
    </ul>` },

    { type: "minor", text: "Metadata layers" },
    { type: "prose", html: `<ul>
      <li><strong>Descriptive metadata</strong> — what the content is about. Title, summary, topic, audience.</li>
      <li><strong>Administrative metadata</strong> — how the content is managed. Author, created date, last modified, version, owner, status.</li>
      <li><strong>Structural metadata</strong> — how this content relates to other content. Parent article, related articles, sequence.</li>
      <li><strong>Compliance metadata</strong> — for regulated contexts. Last reviewed by, last reviewed at, applicable jurisdictions, regulatory category, expiration date.</li>
      <li><strong>Schema.org</strong> — a shared web vocabulary for marking up content semantically (Article, Person, FAQPage, Product). Lets Google, social cards, and increasingly LLMs understand what your content <em>is</em>, not just what it <em>says</em>. Maintained by Google, Microsoft, Yahoo, and Yandex collaboratively.</li>
    </ul>` },

    { type: "minor", text: "Two failure modes" },
    { type: "prose", html: `<ul>
      <li><strong>Tag drift.</strong> Without a controlled vocabulary, synonyms multiply. "Customer Story" / "customer-stories" / "case study" / "Case Study". The fix is to make tags enums, not free text.</li>
      <li><strong>Tag overload.</strong> Without governance, every writer adds their pet tag. After two years there are 300 tags, each used by 1–2 articles, with no overarching meaning. The fix is periodic audits and a clear policy ("we don't add a new tag unless 5+ articles will use it").</li>
    </ul>` },

    { type: "head", text: "Real scenario — dual taxonomies for a regulated help center", num: "IV" },
    { type: "scenario", html: `<p>You're a content designer on a fintech help center team. There are 250 articles. Tags are free-text, set by whoever wrote the article. A casual count finds 47 distinct tags.</p>
      <p>Two stakeholders have problems:</p>
      <ul>
        <li><strong>Customer support</strong> says the help center's filter UI is useless. Customers can't browse by topic because half the topics have three variants ("Card issues" / "card-issues" / "Card problems").</li>
        <li><strong>Compliance</strong> says they need to be able to pull all articles touching specific regulations — KYC, AML, GDPR, PSD2 — for periodic audits. Currently this is a manual search through Google Docs. The last audit took two weeks.</li>
      </ul>
      <p>You realize: these are two different taxonomies trying to live in one tag field, and they shouldn't. You propose:</p>
      <ol>
        <li><strong>A customer-facing taxonomy.</strong> About 15 categories, named in plain English ("Logging in", "Sending money", "Card and payments", "Account security"). Hierarchical, browsable, drives the help center's filter UI. Required field on every article. Enum (dropdown).</li>
        <li><strong>An internal compliance taxonomy.</strong> About 12 tags ("KYC", "AML", "GDPR", "PSD2", "Reg-E", "CCPA"). Multi-select. Optional for articles where compliance has no view. Invisible to customers. Lets compliance officers query the corpus directly.</li>
      </ol>
      <p>You write a definition for each tag in both taxonomies ("Use this tag when the article describes verification of customer identity, including document upload, biometric verification, or PEP screening"). You make both fields enum dropdowns in the CMS. You migrate the existing 47 tags into the new structure, deleting orphans.</p>
      <p>Six months later: customer support reports the filter UI is being used. Compliance reports their last audit took a single afternoon. You did taxonomy engineering in a regulated context — which, in interviews, is more credible than almost any other portfolio artifact a content designer can show.</p>` },

    { type: "activity", id: "2.1", title: "Audit your real taxonomy", prompt: `<p>Find your company's blog, help center, design system docs, or any content hub. List every tag or category currently in use. (If you can't see this from the front-end, ask whoever owns the CMS — most CMSes have an admin view of all tags.)</p>
      <p>Then audit it:</p>
      <ol>
        <li><strong>Group near-duplicates.</strong> "AI" / "ai" / "Artificial Intelligence" / "ML" / "machine-learning" — these are the same. List the merge candidates.</li>
        <li><strong>Identify orphan tags.</strong> Tags used on 1–2 items only. Either delete (probably) or expand usage (rarely).</li>
        <li><strong>Spot missing categories.</strong> Look for clusters of content that ought to share a tag but don't. ("These five articles are all about phishing but none are tagged 'security'.")</li>
        <li><strong>Propose a cleaned-up taxonomy.</strong> Target ≤15 top-level categories, with optional secondary tags.</li>
        <li><strong>Write definitions.</strong> Every category gets a "use this when..." sentence. Without definitions, drift restarts.</li>
      </ol>`,
      placeholder: "Source I audited:\\n\\nCurrent tag count: \\n\\nDuplicates to merge:\\n- [a] + [b] + [c] -> [canonical]\\n\\nOrphan tags to delete:\\n- \\n\\nMissing categories to add:\\n- \\n\\nProposed canonical taxonomy (max 15):\\n1. [name] — use when ...\\n2. ...\\n\\nMigration plan:\\n- " },

    { type: "activity", id: "2.2", title: "Design dual taxonomies for a regulated context", prompt: `<p>Now design two separate taxonomies for the same content corpus:</p>
      <ul>
        <li><strong>Customer-facing</strong> — what users browse and filter by. Plain language, ≤15 categories, optimized for findability.</li>
        <li><strong>Internal / compliance</strong> — what internal teams query by. Specialized vocabulary, can be more granular, optimized for queries and audits.</li>
      </ul>
      <p>Spell out, for each taxonomy: the values, definitions, and which content types it applies to. Then write one paragraph explaining why these are two separate fields in the model, not one.</p>`,
      placeholder: "Customer-facing taxonomy:\\n1. [name] — use when ...\\n...\\n\\nInternal/compliance taxonomy:\\n1. [name] — use when ...\\n...\\n\\nWhy two fields, not one:\\n" },

    { type: "activity", id: "2.3", title: "Mark up a page with Schema.org", prompt: `<p>Pick any help article or marketing page on your company's site. View its HTML source (right-click → View Page Source). Search for "schema.org" — does it appear? What's there? What's missing?</p>
      <p>For a help article, the typical markup is <code>Article</code> plus, if there are Q&amp;A sections, <code>FAQPage</code>. For a product page, <code>Product</code>. Use <a href="https://schema.org/" target="_blank">schema.org</a> to find the right type.</p>
      <p>Write what the markup <em>should</em> be:</p>
      <pre><code>&lt;script type="application/ld+json"&gt;
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "...",
  "author": { "@type": "Organization", "name": "..." },
  "datePublished": "...",
  "dateModified": "..."
}
&lt;/script&gt;</code></pre>
      <p>Schema.org is one of the highest-leverage things you can advocate for in your current job. It costs the engineering team a small amount of time and substantially improves how your content is understood by Google, social platforms, and AI assistants.</p>`,
      placeholder: "Page I audited:\\nSchema.org present today (Y/N): \\nWhat I'd add or fix:\\n\\n{\\n  \\\"@context\\\": ...\\n}" },

    { type: "apply", html: `<p>This week, in any content review, look at what's being tagged and ask: <em>"Where does that tag come from — a defined list, or did the writer make it up?"</em> Then ask: <em>"Who decides what tags exist?"</em> The answer in most organizations is "nobody," which is itself the problem — and the opportunity for you to own it.</p>` },

    { type: "selfcheck", questions: [
      "Difference between metadata and content?",
      "When is a controlled vocabulary better than open tagging?",
      "What's the difference between hierarchical and faceted classification?",
      "Why might you have two separate taxonomies for the same content?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>The deliverable from this module is a <strong>taxonomy proposal document</strong> for one real content corpus. It should contain:</p>
      <ol>
        <li>A one-paragraph context — what corpus, what problems with the current taxonomy</li>
        <li>The audit results: tag counts, duplicates, orphans</li>
        <li>The proposed taxonomy (or dual taxonomies) with values and definitions</li>
        <li>A migration plan: how you'd move existing content into the new structure, what's safe to automate, what needs human review</li>
        <li>A governance plan: who owns the taxonomy going forward, how new tags are added, how often it's audited</li>
      </ol>
      <p>This kind of document is what content engineers produce as a quarterly artifact. Having one in your portfolio is unusually credible.</p>` }
  ]
},
{
  id: "m3",
  section: "Module 3",
  number: "03",
  title: "CMS Architecture and Configuration",
  intro: "Now that you can model content and organize it taxonomically, you need somewhere for it to live. CMS choice and configuration is where many content engineering careers get most of their hands-on time.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>A content engineer chooses, configures, and extends a CMS — usually a <em>headless</em> one. They design its schemas (sometimes through a GUI, sometimes as code), customize its editing interface, and set up integrations (webhooks, build hooks, translation services, asset pipelines).</p>
      <p>This is also where the most technical part of the job lives. Schema-as-code CMSes like Sanity, Payload, and Strapi let you define your content model in TypeScript or JavaScript files. You don't have to write that code yourself, but you have to be able to read it, review it, and have informed opinions about how it's structured.</p>` },

    { type: "minor", text: "Headless vs. traditional vs. hybrid" },
    { type: "prose", html: `<ul>
      <li><strong>Traditional CMS</strong> (WordPress, Drupal core, Joomla) — couples content to a website. The CMS renders the pages directly. Easy for non-technical teams to get started; hard to deliver the same content to multiple front-ends.</li>
      <li><strong>Headless CMS</strong> (Sanity, Contentful, Strapi, Storyblok, Prismic, Payload, Hygraph, Kontent.ai) — stores content and exposes it via API. The CMS doesn't render anything itself; any front-end can consume it. This is where modern content engineering work happens.</li>
      <li><strong>Hybrid / "visual" headless</strong> (Storyblok, Builder.io, some Contentful setups) — headless under the hood but with visual editing for marketing teams that don't want to lose WYSIWYG.</li>
      <li><strong>Component Content Management System (CCMS)</strong> (MadCap IXIA, Heretto, Paligo) — purpose-built for technical documentation. Heavy emphasis on content reuse, single-sourcing, and DITA. If your future role is in regulated technical content (medical devices, aerospace, financial product docs), this is the world.</li>
    </ul>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<p>You probably use a CMS every week, even if you don't think of it that way. If you've ever:</p>
      <ul>
        <li>Drafted help articles in a CMS or a content tool</li>
        <li>Filled in fields in a marketing platform (HubSpot, Marketo) to publish a landing page</li>
        <li>Updated a Confluence or Notion page that gets pulled into a product</li>
        <li>Edited a JSON or YAML file in a Git repo</li>
      </ul>
      <p>...you've been a CMS user. The transition is to start thinking like a CMS <em>configurer</em>: what fields exist, what validation enforces what rules, what the authoring interface looks like and why, who can publish what.</p>` },

    { type: "head", text: "The headless CMS landscape in 2026", num: "III" },
    { type: "minor", text: "Sanity" },
    { type: "prose", html: `<p>Schema-as-code (TypeScript). Highly customizable Studio (the editing interface). Free tier generous. GROQ is its query language; GraphQL is also available. Strong choice for technical teams that want flexibility. The 2026 enterprise narrative around Sanity emphasizes that <a href="https://www.llmcms.org/guides/structured-content-as-ai-ready-data-an-enterprise-guide" target="_blank">structured content is AI-ready content</a> — which has driven enterprise adoption from teams building RAG and chatbots.</p>` },

    { type: "minor", text: "Contentful" },
    { type: "prose", html: `<p>Enterprise standard for large organizations. GUI model builder, REST and GraphQL APIs. Robust ecosystem of apps and integrations. More expensive at scale; sometimes critiqued for being heavyweight, but it's the safest "nobody got fired for choosing Contentful" pick at large companies.</p>` },

    { type: "minor", text: "Storyblok" },
    { type: "prose", html: `<p>Visual editing, popular with marketing teams that want WYSIWYG-style editing on a headless backend. Block-based composition.</p>` },

    { type: "minor", text: "Strapi" },
    { type: "prose", html: `<p>Open source, self-hostable. Popular when you want to keep content infrastructure in-house (regulated industries often prefer this).</p>` },

    { type: "minor", text: "Payload" },
    { type: "prose", html: `<p>Newer, code-first, open source. Built on Node/TypeScript. Gaining momentum, particularly for teams that want a CMS deeply integrated into their codebase.</p>` },

    { type: "minor", text: "Kontent.ai" },
    { type: "prose", html: `<p>Enterprise-focused with strong governance and workflow features. Often picked by regulated industries where Contentful's workflow capabilities feel too thin.</p>` },

    { type: "minor", text: "How to choose" },
    { type: "prose", html: `<p>A short rubric (this is how a content engineer thinks about it):</p>
      <ul>
        <li><strong>Authoring team's skill level</strong> — non-technical marketers? Storyblok or Contentful. Engineers or content engineers writing schemas? Sanity, Payload, Strapi.</li>
        <li><strong>Workflow / governance needs</strong> — regulated industry with multi-step approvals? Kontent.ai or Contentful with custom workflows.</li>
        <li><strong>Self-hosted vs. SaaS</strong> — strict data residency or sovereignty requirements? Strapi, Payload self-hosted. Otherwise SaaS is fine and faster to adopt.</li>
        <li><strong>Localization depth</strong> — many locales with per-locale variants? Contentful and Kontent.ai have strong field-level localization. Sanity supports it but you build more yourself.</li>
        <li><strong>Budget</strong> — Sanity and Strapi have generous free tiers. Contentful and Kontent.ai are enterprise-priced.</li>
      </ul>` },

    { type: "head", text: "Real scenario — choosing a CMS for a regulated SaaS", num: "IV" },
    { type: "scenario", html: `<p>You're at a Series B fintech. The team is launching a help center, in-product educational tips, and a marketing site, and the previous setup (Webflow + Google Docs + hardcoded strings) has fallen apart.</p>
      <p>The PM asks you (the content designer) to "pick a CMS." This is a content engineering decision dressed up as a copy decision. You ask:</p>
      <ul>
        <li>Who writes content? (Two content designers, occasional support agents, occasional legal reviewers.)</li>
        <li>How many surfaces will consume it? (Web help center, in-product tips, marketing site, eventually email and the iOS app.)</li>
        <li>What workflow do we need? (Editorial review, then for regulated articles, legal review, then publish. Quarterly compliance re-review for fee-related content.)</li>
        <li>Data residency? (We're US-only for now but EU expansion is in the roadmap.)</li>
        <li>Budget? (Seed-stage; nothing over $1K/month right now.)</li>
      </ul>
      <p>You recommend Sanity for the help center and in-product tips (schema-as-code lets you encode the compliance metadata model you designed in Module 1), Webflow CMS for the marketing site (keeps the marketing team happy and visually editing), and a webhook from Sanity to your build pipeline so legal-approved content publishes automatically.</p>
      <p>This is a layered architecture, intentionally. Two CMSes is fine when each is doing a different job for a different audience. A content engineer who insists on one CMS for everything will lose either the marketers or the developers.</p>` },

    { type: "activity", id: "3.1", title: "Build your first content model in a real CMS", prompt: `<p><strong>This is the highest-leverage activity in the course. Do not skip it.</strong> You'll go from talking about content engineering to having done it.</p>
      <ol>
        <li>Sign up for <a href="https://www.sanity.io" target="_blank">sanity.io</a> (free).</li>
        <li>Create a new project. Choose "Clean project" or "Blog" — either works.</li>
        <li>Install Sanity locally. The setup wizard walks you through it.</li>
        <li>Open the schema files in your code editor. They're plain TypeScript/JavaScript. Look at how Author or Post is defined.</li>
        <li>Add the content type you modeled in Activity 1.1. For an ErrorMessage pattern, the schema starts like:
          <pre><code>// schemas/errorMessage.ts
export default {
  name: 'errorMessage',
  title: 'Error Message',
  type: 'document',
  fields: [
    {
      name: 'id',
      title: 'Identifier',
      type: 'string',
      validation: Rule => Rule.required(),
    },
    {
      name: 'title',
      title: 'Title',
      type: 'string',
      validation: Rule => Rule.required().max(60),
    },
    {
      name: 'severity',
      title: 'Severity',
      type: 'string',
      options: {
        list: ['info', 'warning', 'error', 'blocking'],
      },
    },
    {
      name: 'isRegulatory',
      title: 'Is regulatory?',
      type: 'boolean',
    },
    // ... etc
  ],
}</code></pre>
        </li>
        <li>Add at least 3 sample entries through Sanity Studio (the GUI).</li>
        <li>Open Vision (Sanity's query playground) and run a GROQ query: <code>*[_type == "errorMessage"]</code>. Then filter: <code>*[_type == "errorMessage" &amp;&amp; isRegulatory == true]</code>.</li>
      </ol>
      <p>If you can do this, you've performed actual content engineering work. Add the Sanity studio URL to your portfolio.</p>`,
      placeholder: "Sanity project URL:\\n\\nWhat tripped me up:\\n- \\n\\nGROQ queries I wrote:\\n```\\n*[_type == 'errorMessage']\\n```\\n\\nHow long this took:\\n\\nReflections:\\n- " },

    { type: "activity", id: "3.2", title: "Compare two CMSes for one content type", prompt: `<p>Pick a second CMS — Contentful (free trial) or Strapi (free, self-hosted via Docker) or Storyblok (free tier).</p>
      <p>Recreate the same content type in the second CMS. Then write a comparison:</p>
      <ul>
        <li>How was the modeling done? (GUI? Code?)</li>
        <li>How was the authoring interface? Where did each shine, where did each frustrate?</li>
        <li>How was the validation surfaced to the writer?</li>
        <li>If you were briefing a small content team, which would you recommend and why?</li>
      </ul>
      <p>This kind of hands-on comparison is something interviewers love, and almost no candidate brings it.</p>`,
      placeholder: "Second CMS chosen: \\n\\nModeling experience:\\n  Sanity: \\n  [other]: \\n\\nAuthoring interface:\\n  Sanity: \\n  [other]: \\n\\nValidation UX:\\n  Sanity: \\n  [other]: \\n\\nMy recommendation for a small team:\\n  ...because:\\n  " },

    { type: "apply", html: `<p>Find out which CMS(es) your company actually uses. Ask a developer to walk you through one schema for one content type. Take notes. Don't pretend to understand things you don't — just ask. A 30-minute walkthrough beats five hours of reading documentation.</p>` },

    { type: "selfcheck", questions: [
      "Difference between a traditional and headless CMS?",
      "Why might a company use two CMSes intentionally?",
      "What does 'schema-as-code' mean and what does it enable?",
      "When would you pick a CCMS over a general-purpose headless CMS?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>The artifact for this module is <strong>a live Sanity (or other CMS) studio URL</strong> showing your custom schemas and at least 5 sample entries per type. Make it public. Put the link in your portfolio.</p>
      <p>Add a one-page README to a public GitHub repo explaining: the content model, the rationale, the tradeoffs you considered. In interviews you'll show the live studio and walk through the README. That sequence — "here's the system I built, here's why, here's what I considered" — is what gets a content designer hired into a content engineering role.</p>` }
  ]
},
{
  id: "m4",
  section: "Module 4",
  number: "04",
  title: "Content APIs and Integrations",
  intro: "Once content is modeled and stored, it has to get to the surfaces where users see it. APIs are the connective tissue. Understanding how content flows through them is what separates a content engineer from a content strategist.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>A content engineer designs and documents how content is delivered: which API endpoints exist, what shape the responses are, how the front-end consumes them, when content is fetched (build time? request time? on demand?), how it's cached, how it invalidates when content changes.</p>
      <p>You don't have to write the API code yourself. You do have to be able to read an API response, reason about its shape, and have informed opinions about what should and shouldn't be in it.</p>
      <p>The reason this matters for content: the API contract is where editorial intent meets engineering reality. If your model says an article has an "excerpt" field but the API returns null for 60% of articles, the front-end has to make a decision about fallback behavior. That decision should be a content engineering decision, not a developer's improvisation.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<ul>
      <li>Every time you've asked "where will this string come from at runtime?", you've been thinking about an API.</li>
      <li>Every time you've debated whether a piece of copy should be in the CMS or in the code, you've been thinking about the boundary between content and product.</li>
      <li>Every time you've written copy with a fallback ("if there's no name, say 'there'"), you've designed for null handling — which is an API concern.</li>
    </ul>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "The mental model" },
    { type: "prose", html: `<ul>
      <li>The CMS holds content (roughly, a database).</li>
      <li>A program — the website, a mobile app, an email service — sends a <strong>request</strong> to the CMS's API: "give me the help article with slug <code>set-up-2fa</code>".</li>
      <li>The API sends back a <strong>response</strong>, usually as <strong>JSON</strong>, which is just structured text.</li>
      <li>The program reads the JSON and renders the page, screen, or email.</li>
    </ul>` },

    { type: "minor", text: "JSON in sixty seconds" },
    { type: "prose", html: `<pre><code>{
  "title": "How to set up two-factor authentication",
  "slug": "set-up-2fa",
  "publishedAt": "2025-09-14",
  "lastReviewedBy": {
    "name": "Priya Natarajan",
    "team": "Compliance"
  },
  "applicableRegions": ["US", "UK", "EU"],
  "isRegulatory": true,
  "body": "Two-factor authentication adds..."
}</code></pre>
      <p>Curly braces are objects. Square brackets are arrays. Keys are field names. Values are strings, numbers, booleans, objects, arrays, or <code>null</code>. The whole web runs on this.</p>` },

    { type: "minor", text: "REST vs. GraphQL" },
    { type: "prose", html: `<ul>
      <li><strong>REST.</strong> You go to a URL like <code>/articles/set-up-2fa</code> and the API gives you a fixed JSON shape for that resource. Predictable. Cacheable. Easy to debug. Sometimes over-fetches (you wanted just the title, you got the whole body too).</li>
      <li><strong>GraphQL.</strong> You go to a single URL and <em>send a query</em> that says "give me exactly these fields and no others." More flexible. The mobile app can fetch a different shape than the web. Slightly more setup; harder to cache.</li>
    </ul>
    <p>Most modern headless CMSes give you both. Sanity has its own query language called <strong>GROQ</strong> which is more powerful than REST and simpler than GraphQL.</p>` },

    { type: "minor", text: "When content is fetched: build time vs. request time" },
    { type: "prose", html: `<ul>
      <li><strong>Build time (SSG — static site generation).</strong> Content is fetched once when the site is built. The result is static HTML, blazingly fast. But updating content requires a rebuild. Used by Astro, Hugo, Eleventy, and Next.js in static mode. Good for content that doesn't change minute-to-minute (marketing sites, blogs, docs).</li>
      <li><strong>Request time (SSR — server-side rendering).</strong> Content is fetched fresh on every request. Slower but always up-to-date. Used by classic Next.js and Remix in server mode. Good for personalized content, prices, anything time-sensitive.</li>
      <li><strong>Incremental static regeneration (ISR).</strong> A hybrid: static by default, but the server quietly regenerates pages on a schedule or when content changes. Best of both worlds for many cases.</li>
      <li><strong>Client-side fetching.</strong> The browser fetches content after the page loads. Used for dashboards, real-time feeds, anything personalized.</li>
    </ul>
    <p>You don't have to know all of this in detail. You do have to know it exists and ask which mode is being used for the content you're designing — because it affects how quickly your edits go live.</p>` },

    { type: "minor", text: "Webhooks and content events" },
    { type: "prose", html: `<p>When content changes in a CMS, the CMS sends an HTTP request to a URL you specify. This is called a <strong>webhook</strong>. Common uses: trigger a site rebuild, notify Slack ("Priya just approved the new disclosure"), update a search index, push to a translation vendor, log to an analytics system.</p>
      <p>Webhooks are how content operations gets glued together. A content engineer often designs the webhook flows: "When an entry of type Disclosure is set to published, post to the #compliance-published Slack channel, send to our translation vendor, and trigger a rebuild."</p>` },

    { type: "head", text: "Real scenario — designing an API contract for a regulated content type", num: "IV" },
    { type: "scenario", html: `<p>You're at a healthtech company. Your team is shipping a feature that surfaces patient-education tips in the app based on what the patient is doing. The engineering team asks you, the content designer, for the API contract.</p>
      <p>You realize this is a content engineering decision. The API contract determines what the engineering team has to build and what flexibility content has later. You sketch the contract:</p>
      <pre><code>GET /tips?context=medication-added&amp;userId=...

Response (200):
{
  "tip": {
    "id": "tip_medication_interactions",
    "title": "Check for interactions",
    "body": "...",
    "severity": "important",
    "lastReviewedBy": {
      "name": "Dr. Lin",
      "credentials": "MD, internal medicine",
      "team": "Clinical review"
    },
    "lastReviewedAt": "2026-03-14",
    "relatedTips": [
      { "id": "tip_pharmacist_questions", "title": "..." }
    ],
    "telemetryId": "med-interactions-v3"
  },
  "fallback": null
}

Response (404 — no tip for this context):
{
  "tip": null,
  "fallback": {
    "title": "Tip not yet available",
    "body": "Talk to your care team if you have questions."
  }
}</code></pre>
      <p>Notice the editorial decisions baked into the contract:</p>
      <ul>
        <li>The API returns the <em>full</em> clinical reviewer info (name, credentials, team), not just an ID. Why? Because the UI needs to surface "reviewed by [name, credentials]" inline for trust. If the app had to fetch a separate Reviewer resource, that's another network call and a possible failure point.</li>
        <li>If no tip exists for the context, the API doesn't error out — it returns a fallback. The fallback is content too. <strong>Where does that fallback live?</strong> You proposed: in the CMS, as a special Tip with <code>id: "fallback_generic"</code>. So fallbacks are editorially controlled, not hardcoded.</li>
        <li>The <code>telemetryId</code> is included in the response so analytics can track which tips perform well — driving editorial decisions about future tips.</li>
      </ul>
      <p>The developer implements your contract. Six months later, the clinical team wants to add an "audience" filter ("show this tip only to patients with diabetes"). Because <code>context</code> is already a query parameter, the change is trivial — add an <code>audienceFilters</code> field to the Tip model, update the API to consider it. The system absorbed a real product change without a rewrite because the contract was designed thoughtfully.</p>
      <p>You did content engineering by spec'ing an API.</p>` },

    { type: "activity", id: "4.1", title: "Read a real API response", prompt: `<p>Open a terminal. On Mac it's Terminal.app, on Windows it's PowerShell. Type these commands one at a time and look at the output:</p>
      <pre><code>curl https://jsonplaceholder.typicode.com/posts/1
curl https://jsonplaceholder.typicode.com/users/1
curl https://jsonplaceholder.typicode.com/posts/1/comments</code></pre>
      <p>This is a real HTTP API. Each command sends a request; each output is a JSON response. The third one shows a one-to-many relationship: comments belong to a post.</p>
      <p>Then try the OpenWeather API or any other free API. The point isn't to learn the specific API — the point is to internalize that this is the lingua franca of content engineering.</p>`,
      placeholder: "API I tried beyond jsonplaceholder:\\n\\nResponse I got:\\n```json\\n...\\n```\\n\\nWhat surprised me:\\n- " },

    { type: "activity", id: "4.2", title: "Trace a piece of content end-to-end", prompt: `<p>Pick a piece of content on your company's site — a help article title, a product description, a button label. Open browser DevTools (right-click → Inspect → Network tab) and reload the page.</p>
      <p>Filter for "Fetch/XHR" or "JSON". Find the request that returned your content. You've just traced content from CMS → API → browser → screen.</p>
      <p>Look at the JSON shape. Is the field you expected there? Is the shape clean (atomic fields) or a blob (one giant HTML string)? Are there fields you don't recognize?</p>
      <p>If your site is fully static, look at the build output or the GitHub repo's content folder instead. Same principle: content lives somewhere structured, and a build step turns it into HTML.</p>`,
      placeholder: "Content I traced:\\n\\nThe request URL was:\\n\\nThe response shape was:\\n```json\\n{ ... }\\n```\\n\\nObservations:\\n- " },

    { type: "activity", id: "4.3", title: "Spec the API contract for your content type", prompt: `<p>Take the content type you modeled in Module 1. Write the API contract for it — both the success response and at least one error case. Use the scenario above as a template.</p>
      <p>Bonus: write a second contract for a "list" endpoint (return many entries with filters). What query parameters should it accept? What does the list response include vs. the single-item response (often you don't include the full body in lists)?</p>`,
      placeholder: "GET /[endpoint]/[id]\\n\\nSuccess response:\\n{\\n  ...\\n}\\n\\nError response (e.g., 404):\\n{\\n  ...\\n}\\n\\nList endpoint: GET /[endpoint]?...\\n\\n{\\n  ...\\n}" },

    { type: "apply", html: `<p>Next time a developer mentions "the API" in your hearing, don't change the subject. Ask: <em>"Can you show me the JSON?"</em> Look at it together. The single biggest credibility shift in becoming a content engineer is going from "I'll let the engineers handle that" to "let me see the response." You're not pretending to be a developer; you're being a serious collaborator.</p>` },

    { type: "selfcheck", questions: [
      "Difference between a request and a response?",
      "If a field is null in a JSON response, what should the front-end do?",
      "When would you choose static site generation over server-side rendering for content?",
      "What does a webhook do, and what's a typical content-engineering use for one?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>Produce <strong>an API contract document</strong> for one content type. Include:</p>
      <ol>
        <li>Get-by-id endpoint with success and error responses</li>
        <li>List endpoint with filter parameters and a list-shape response</li>
        <li>A short note explaining 3–5 editorial decisions baked into the contract (e.g., "Why we return the full reviewer info instead of an ID")</li>
        <li>A diagram of which surfaces will consume this API (web, mobile, email, etc.) and whether they fetch at build time or request time</li>
      </ol>
      <p>Hiring managers for content engineering roles love this document. It demonstrates you can think between editorial intent and engineering specification.</p>` }
  ]
},
{
  id: "m5",
  section: "Module 5",
  number: "05",
  title: "Authoring Experience (AX)",
  intro: "The UX of the people who create content. Underrated, undervalued, and one of the highest-impact things a content designer can own in a content engineering role.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>Every CMS has an authoring interface — the screens where writers, editors, marketers, legal reviewers, and translators interact with content. A content engineer designs that interface as deliberately as a UX designer designs an end-user interface.</p>
      <p>AX work spans:</p>
      <ul>
        <li>Field labels (clear, jargon-free, helpful)</li>
        <li>Helper text and inline guidance</li>
        <li>Validation messaging (specific, actionable, kind)</li>
        <li>Field ordering and grouping</li>
        <li>Default values and smart defaults</li>
        <li>Required vs. optional cues</li>
        <li>Preview behavior (can the writer see what their content will look like?)</li>
        <li>Workflow visibility (where is this content in its lifecycle?)</li>
        <li>"Where is this used?" — back-references so writers know what depends on the entry they're editing</li>
        <li>Role-based field visibility (legal sees the legal fields, marketers see the marketing fields)</li>
      </ul>
      <p>A well-designed CMS authoring interface saves hours of content team time per week. A badly designed one causes typos, missed compliance fields, and silent content drift.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<p>If you've ever cursed at a confusing CMS field, you have AX opinions. You just haven't formalized them yet. Content designers are uniquely well-suited to AX work because:</p>
      <ul>
        <li>You already think about clear field labels (you write them for end users every day)</li>
        <li>You already think about helper text and error messages (you write them for end users every day)</li>
        <li>You already think about what someone is trying to accomplish (you've done user research)</li>
      </ul>
      <p>The leap is to apply the craft to the people creating content, not just consuming it. Same skill, different audience.</p>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "Editor personas" },
    { type: "prose", html: `<p>The classic mistake in CMS design is assuming "the editor" is one person. In a real enterprise, the editor is many people with different needs:</p>
      <ul>
        <li><strong>The content designer</strong> — wants to see semantic structure, validation, and preview.</li>
        <li><strong>The marketer</strong> — wants WYSIWYG, easy reordering of blocks, social preview.</li>
        <li><strong>The support agent</strong> — wants quick edits, a clear publish button, minimal clutter.</li>
        <li><strong>The legal reviewer</strong> — wants to see what's changed since their last review, an approval workflow, and clear "this is the version I approved" history.</li>
        <li><strong>The compliance officer</strong> — wants to filter content by regulatory category, see review dates, and run reports.</li>
        <li><strong>The translator</strong> — wants to see the source content, work in their language, and not accidentally edit anything outside their assignment.</li>
      </ul>
      <p>A content engineer's AX work starts with persona mapping: who edits this content type, and what do they need to see, hide, and do?</p>` },

    { type: "minor", text: "Field-level AX choices" },
    { type: "prose", html: `<ul>
      <li><strong>Labels:</strong> Plain English, not field names. <code>audioUrl</code> should display as "Audio file URL." <code>isRegulatory</code> should display as "Does this content have regulatory implications?"</li>
      <li><strong>Helper text:</strong> Below or beside the field. One sentence. What goes in this field, why it matters, what good looks like.</li>
      <li><strong>Validation messaging:</strong> When validation fails, say what went wrong, where, and how to fix it. "Title is too long" is mediocre. "Title is 92 characters; the limit is 60. Try shortening to..." is good.</li>
      <li><strong>Smart defaults:</strong> If a field is almost always X for a given content type, pre-fill X.</li>
      <li><strong>Required vs. optional:</strong> Make it obvious. An asterisk is a minimum. Color and grouping help too. Some CMSes let you mark fields "required for publish" vs. "required for draft" — useful for regulated content.</li>
      <li><strong>Field ordering:</strong> Most important first. Group related fields. Hide rarely-used fields behind a "more options" expander.</li>
      <li><strong>Preview:</strong> Writers should see what their content will look like, not work blind. Sanity has a side-by-side Studio with preview. Contentful supports custom preview via integrations. The CMS that doesn't support preview costs writers hours every week.</li>
    </ul>` },

    { type: "minor", text: "Workflow visibility" },
    { type: "prose", html: `<ul>
      <li>Where in the lifecycle is this content?</li>
      <li>What's the next step?</li>
      <li>Who's responsible for that step?</li>
      <li>What changed since the last review?</li>
      <li>When does this need to be re-reviewed?</li>
    </ul>
    <p>In a regulated context, this is non-optional. Compliance teams need to see "all articles where last review was &gt; 12 months ago and the article is published." That's an AX feature, not just a query.</p>` },

    { type: "head", text: "Real scenario — designing AX for a legal reviewer", num: "IV" },
    { type: "scenario", html: `<p>Your fintech CMS has a content type called RegulatoryDisclosure. The legal team reviews these monthly. Today, the legal reviewer's experience is:</p>
      <ul>
        <li>Open the CMS (which she finds intimidating)</li>
        <li>See a list of all disclosures (40+ entries, no filtering)</li>
        <li>Click into each one</li>
        <li>Scroll through 22 fields, half of which are irrelevant to her review (telemetry, internal IDs, layout hints)</li>
        <li>Try to figure out what changed since her last review (no obvious indicator)</li>
        <li>Click "approve" — except there's no "approve" button, just "publish," which feels wrong</li>
      </ul>
      <p>Quietly, the legal reviewer has stopped logging in. She emails the content designer her edits as a Google Doc instead. The content designer copies the edits manually back into the CMS. Compliance audits are failing because the "lastReviewedBy" field is reliably wrong (it shows whoever pasted the edits, not the legal reviewer).</p>
      <p>You take this on as AX work. The redesign:</p>
      <ul>
        <li>The legal reviewer gets a custom dashboard view in Sanity Studio — "My pending reviews" — showing only disclosures she's been assigned.</li>
        <li>For each, only the fields she needs are visible: the disclosure text, the jurisdiction, the proposed change (diffed against the last approved version), and a comment box.</li>
        <li>The "publish" button is renamed to "Approve" for her role. Clicking it stamps her name on <code>lastReviewedBy</code> automatically.</li>
        <li>A "what changed" diff is shown inline, so she can scan instead of re-read the whole disclosure.</li>
        <li>If she rejects, she enters a comment, the disclosure goes back to "in legal review" status, and the original author is notified.</li>
      </ul>
      <p>Three months later, the legal reviewer is using the CMS. Compliance audits pass. The content designer spends less time on edit-paste-edit busywork. You did AX engineering — and the only code that changed was a Sanity Studio configuration file.</p>` },

    { type: "activity", id: "5.1", title: "AX audit of your current CMS", prompt: `<p>Open your company's CMS. Pick one content type. From the perspective of a non-technical content creator, audit the editing interface against this list:</p>
      <ul>
        <li>Are field labels plain English, not code names?</li>
        <li>Does every field have helper text? If not, which fields most need it?</li>
        <li>Is required vs. optional obvious at a glance?</li>
        <li>Do validation errors tell the writer what's wrong and how to fix it?</li>
        <li>Are fields ordered usefully (most important first)?</li>
        <li>Are related fields grouped together?</li>
        <li>Can the writer preview what their content will look like before publishing?</li>
        <li>Is the workflow state obvious — what's the next step, who's responsible?</li>
        <li>For regulated fields, are the compliance implications clear?</li>
        <li>If multiple roles use this CMS, do they each see what they need (and not what they don't)?</li>
      </ul>
      <p>For each "no" answer, write what you'd change.</p>`,
      placeholder: "Content type audited:\\n\\nIssues I found:\\n1. [field/section]: [problem] -> [fix]\\n2. ...\\n\\nThe single biggest improvement I'd propose:\\n" },

    { type: "activity", id: "5.2", title: "Map the editor personas for your content", prompt: `<p>Pick a content type. List every person/role who edits it. For each, write:</p>
      <ul>
        <li>Their goal when interacting with this content</li>
        <li>The fields they care about</li>
        <li>The fields that should be hidden from them (because they don't have permission or because the clutter slows them down)</li>
        <li>The workflow state they enter / exit (e.g., "moves it from draft to in legal review")</li>
        <li>The notification or alert they'd want (e.g., "wants to be notified when something needs her review")</li>
      </ul>
      <p>This is the input to a real AX redesign. You can hand it to whoever configures your CMS and they can build to it.</p>`,
