      placeholder: "Content type:\\n\\nPersona 1: [role]\\n  Goal: \\n  Fields they care about: \\n  Fields to hide: \\n  Workflow transitions: \\n  Notifications they want: \\n\\nPersona 2: ...\\n" },

    { type: "activity", id: "5.3", title: "Write the AX spec for one improvement", prompt: `<p>Pick one improvement from your audit in 5.1 — the single highest-impact change. Write it as a spec a developer could implement:</p>
      <ul>
        <li>What's the current behavior?</li>
        <li>What's the desired behavior?</li>
        <li>Why it matters (user impact)</li>
        <li>How to validate it worked (what would you measure or observe)</li>
      </ul>
      <p>Treat this exactly like a UX spec — because it is one. The user is the editor.</p>`,
      placeholder: "AX issue I'm fixing: \\n\\nCurrent behavior:\\n\\nDesired behavior:\\n\\nUser impact:\\n\\nHow we'd know it worked:\\n" },

    { type: "apply", html: `<p>Sit with a writer or marketer at your company while they edit content. Don't talk, just observe. Note every moment of friction — every "wait, what does this field mean?", every "let me check the spec doc," every typo, every backtrack. That's your AX backlog. Most engineering teams have no idea any of this is happening.</p>` },

    { type: "selfcheck", questions: [
      "What does AX stand for and why does it matter?",
      "Name three editor personas that might use the same CMS differently.",
      "Why is field ordering an editorial decision, not just an engineering one?",
      "How does role-based field visibility serve compliance in a regulated content team?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>Produce an <strong>AX redesign spec</strong> for one content type. Include:</p>
      <ol>
        <li>Persona map (Activity 5.2)</li>
        <li>Before/after for at least three fields (screenshots if you can, sketches if you can't)</li>
        <li>The full field ordering and grouping you'd recommend, with rationale</li>
        <li>The role-based visibility rules (which persona sees what)</li>
        <li>The workflow visibility additions ("show diff since last approval," "show pending re-reviews")</li>
        <li>Three success metrics — what would change in the content team's day-to-day if this shipped</li>
      </ol>
      <p>AX work is a competitive moat for content designers transitioning into content engineering. It plays to your strengths and nobody else on the team is doing it.</p>` }
  ]
},
{
  id: "m6",
  section: "Module 6",
  number: "06",
  title: "Content Operations",
  intro: "Workflows, approvals, lifecycles, governance, content ownership. The systems side of how content gets made and stays accurate. ContentOps is its own emerging discipline; content engineering and content ops overlap heavily.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>Content operations (or ContentOps) is the set of systems and processes that let a team produce, review, approve, publish, maintain, and retire content reliably at scale. Where content modeling and CMS configuration are about <em>how</em> content is structured, content operations is about <em>how it moves through the organization</em>.</p>
      <p>The discipline owes a lot to Rahel Anne Bailie (a foundational thinker in content engineering and content operations), Kristina Halvorson (whose <em>Content Strategy for the Web</em> shaped the field), and Erin Scime (whose "content lifecycle" framing is widely cited).</p>
      <p>A working content engineer who owns content operations:</p>
      <ul>
        <li>Designs the workflow state machine for each content type (what states, what transitions, who can advance each)</li>
        <li>Defines content ownership (who is the responsible person for this article being accurate three years from now)</li>
        <li>Sets re-review cadences (regulated content gets re-reviewed every N months)</li>
        <li>Designs governance — who decides what (taxonomy changes, model changes, new content types)</li>
        <li>Audits content systematically (what's stale, what's never used, what needs archiving)</li>
        <li>Builds the connective tissue (webhooks, notifications, dashboards) that keeps content from quietly drifting</li>
      </ul>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<ul>
      <li>Every time you've chased someone to review your copy, you've felt the absence of a workflow.</li>
      <li>Every time you've discovered an old help article saying something now wrong, you've experienced content drift.</li>
      <li>Every time you've debated who "owns" a piece of content, you've encountered the governance question.</li>
      <li>Every time you've written a style guide, you've done a piece of governance work.</li>
    </ul>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "The content lifecycle" },
    { type: "prose", html: `<p>A common framing: every piece of content moves through stages.</p>
      <ol>
        <li><strong>Plan</strong> — what is this content, who's it for, what's the goal</li>
        <li><strong>Create</strong> — draft</li>
        <li><strong>Review</strong> — editorial review, possibly multiple rounds; legal/compliance review where applicable</li>
        <li><strong>Approve</strong> — sign-off from designated approver</li>
        <li><strong>Publish</strong> — live on the relevant surfaces</li>
        <li><strong>Maintain</strong> — periodic re-review, performance monitoring, updates</li>
        <li><strong>Archive / retire</strong> — content that's no longer accurate or relevant is sunsetted with a clear record</li>
      </ol>
      <p>Each stage has owners, criteria, and SLAs. The biggest difference between mature and immature content operations: the mature one explicitly designs each stage; the immature one assumes content magically moves through without anyone owning the system.</p>` },

    { type: "minor", text: "Workflow as a state machine" },
    { type: "prose", html: `<p>Each content type can be modeled as a state machine: a set of states, plus rules for which states can transition to which, and who can perform each transition.</p>
      <pre><code>States: draft, in editorial review, in legal review,
        approved, published, needs update, archived

Transitions:
  draft -> in editorial review
    (author, when they're done drafting)
  in editorial review -> draft
    (editor, with comments)
  in editorial review -> in legal review
    (editor, if isRegulatory == true)
  in editorial review -> approved
    (editor, if isRegulatory == false)
  in legal review -> approved
    (legal reviewer)
  in legal review -> in editorial review
    (legal reviewer, with comments)
  approved -> published
    (anyone with publish permission)
  published -> needs update
    (system, on a schedule, or anyone)
  needs update -> in editorial review
    (the article owner)
  any -> archived
    (admin, with reason)</code></pre>
      <p>Drawing this state machine before configuring a workflow in your CMS is one of the most valuable hours you can spend.</p>` },

    { type: "minor", text: "Governance models" },
    { type: "prose", html: `<p>Who decides what about content?</p>
      <ul>
        <li><strong>Centralized.</strong> One team owns the model, the taxonomy, the style guide. Other teams use what they're given. Common at smaller companies.</li>
        <li><strong>Federated.</strong> Each product area owns its content but follows shared standards (set by a central team or a guild). Common at larger companies.</li>
        <li><strong>Hub-and-spoke.</strong> A central team owns the model and standards; spokes own specific content types or surfaces. Common in regulated industries.</li>
      </ul>
      <p>The governance model determines whose name is on every "no" — who can block a taxonomy change, who can add a new content type, who can break the model.</p>` },

    { type: "minor", text: "Content auditing" },
    { type: "prose", html: `<p>A content audit is an inventory of all your content plus a verdict on each piece: keep, update, merge, delete, leave alone. Sara Wachter-Boettcher's <em>Content Everywhere</em> and Kristina Halvorson's writing both lean heavily on audits as the foundational diagnostic tool.</p>
      <p>The audit's outputs feed everything else: what to migrate, what to deprecate, what taxonomy needs cleaning, what models need fields, what should be referenced rather than duplicated.</p>` },

    { type: "head", text: "Real scenario — designing the workflow for a regulated healthcare content type", num: "IV" },
    { type: "scenario", html: `<p>You're at a digital health company. Your team owns "patient education tips" — short pieces of content shown contextually in the app. Today the workflow is: a content designer drafts it, the medical director reviews it via Slack screenshots, edits happen in the CMS, and the designer marks it published when the medical director nods.</p>
      <p>This has gone wrong twice in six months. Once, a tip about a medication was published without medical director review because the content designer thought the screenshot reply meant approval. Another time, a tip went stale because nobody noticed it had been six months since the last medical-director review.</p>
      <p>You redesign the workflow. Here's what you propose:</p>
      <ul>
        <li>Content type: <code>PatientEducationTip</code>. Already exists. You add fields: <code>workflowState</code> (enum), <code>medicalDirectorApprovedBy</code> (reference), <code>medicalDirectorApprovedAt</code> (datetime), <code>reviewDueAt</code> (datetime, auto-set 6 months after approval), <code>changeNotes</code> (string, required when transitioning from "in clinical review" back to "draft").</li>
        <li>State machine: <code>draft → in editorial review → in clinical review → approved → published → needs update → archived</code>. Only the medical director can advance "in clinical review → approved." Only an admin can archive.</li>
        <li>A weekly automated Slack message to the medical director listing all tips due for re-review within 30 days.</li>
        <li>A dashboard view filtering to "<code>workflowState == published AND reviewDueAt &lt; now()</code>" — the stale-content alarm.</li>
        <li>A monthly content audit run by you, reporting to the medical director and CTO: how many tips, how many overdue, how many archived.</li>
      </ul>
      <p>Three months after launch, no tip has gone out without medical-director review, no published tip is more than 6 months out of date, and the medical director has a dashboard she can show in compliance audits. <strong>You did content operations engineering.</strong></p>` },

    { type: "activity", id: "6.1", title: "Map your current content lifecycle", prompt: `<p>For one content type at your company, map the actual lifecycle. Be honest — what really happens, not what the playbook says.</p>
      <ul>
        <li>What states does content move through? (Use real names from your team's vocabulary, not textbook ones.)</li>
        <li>Who advances each state?</li>
        <li>How is the next person notified?</li>
        <li>What's the SLA for each transition (24 hours? a week? "whenever")?</li>
        <li>Where does content get stuck? (There's always at least one bottleneck.)</li>
        <li>Where does content drop out of the workflow entirely (publish-and-forget)?</li>
      </ul>`,
      placeholder: "Content type:\\n\\nCurrent states:\\n1. \\n2. \\n\\nTransitions and owners:\\n  [state A] -> [state B]: [who, how, SLA]\\n  ...\\n\\nWhere it gets stuck:\\n- \\n\\nWhere it drops out:\\n- " },

    { type: "activity", id: "6.2", title: "Design the ideal workflow as a state machine", prompt: `<p>Now design what the workflow <em>should</em> look like. Use the format from the scenario above.</p>
      <ul>
        <li>States (≤7 — more than that and the workflow becomes unusable)</li>
        <li>Transitions with owners and validation rules</li>
        <li>Required metadata for each transition (e.g., "approving requires entering the approval reason")</li>
        <li>Notifications (Slack, email) on each transition</li>
        <li>Re-review cadence — for which content types does maintenance kick in?</li>
        <li>An audit cadence — when does someone systematically review the corpus?</li>
      </ul>`,
      placeholder: "Content type:\\n\\nStates:\\n1. \\n2. \\n\\nTransitions:\\n  [A] -> [B]: by [who], requires [validation], notifies [who]\\n\\nRe-review cadence:\\n\\nAudit cadence:\\n" },

    { type: "activity", id: "6.3", title: "Run a mini audit", prompt: `<p>Pick a small subset of your content (10–30 entries). For each one, log:</p>
      <ul>
        <li>What it is (title, type)</li>
        <li>When it was last updated</li>
        <li>Who owns it (if anyone)</li>
        <li>Is it still accurate? (Yes / no / partly)</li>
        <li>Verdict: keep / update / merge with another piece / delete</li>
      </ul>
      <p>Then aggregate: what percent need updates? What percent should be deleted? What patterns do you see (e.g., "everything in category X is stale")?</p>
      <p>This is one tenth the scale of a real audit but you'll learn the muscle.</p>`,
      placeholder: "Audit scope (N items, content type):\\n\\nFindings:\\n  Total: \\n  Keep as-is: \\n  Update: \\n  Merge: \\n  Delete: \\n\\nPatterns I noticed:\\n- " },

    { type: "apply", html: `<p>Bring your workflow map (Activity 6.1) to your next 1:1 with your manager. Ask: <em>"This is what our workflow currently looks like for [content type]. Do you see the same bottlenecks?"</em> That conversation either confirms you've spotted something real or teaches you context you were missing. Either way, you've staked a claim on content operations as your territory.</p>` },

    { type: "selfcheck", questions: [
      "Difference between content modeling and content operations?",
      "What's a workflow state machine and why design one explicitly?",
      "What are the three main governance models, and which fits a regulated company best?",
      "What does a content audit produce, and what does the output drive?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>Produce a <strong>content operations playbook</strong> for one content type. Include:</p>
      <ol>
        <li>The content type, who owns it, who creates it, who reviews it</li>
        <li>The workflow state machine (Activity 6.2) — diagram or table</li>
        <li>The required metadata for each state transition</li>
        <li>The notification and dashboard design</li>
        <li>The re-review and audit cadences</li>
        <li>The governance rules — who can change this content type's model, who can add a new state, who can delete entries</li>
      </ol>
      <p>This is a document you'd hand to a new hire on the content team. Having one in your portfolio shows you can systems-design content, not just write it.</p>` }
  ]
},
{
  id: "m7",
  section: "Module 7",
  number: "07",
  title: "Localization Architecture",
  intro: "Content engineering really earns its name when content has to exist in multiple languages and regions. Decisions made early at the model level decide whether localization is routine or painful for years.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>A content engineer designs the content system so localization isn't a bolted-on afterthought. That means deciding, at the modeling stage:</p>
      <ul>
        <li>Which fields are translatable, and which are global (a numeric ID isn't translated; a CTA label is)</li>
        <li>How locales are represented in the data model (field-level vs. entry-level localization)</li>
        <li>How locale-aware delivery works at the API and front-end layer (currency, dates, numbers, RTL languages)</li>
        <li>What jurisdictionally-required content exists (a GDPR disclosure in EU; a CCPA notice in California; PSD2 language in EU banking) — and how the model holds it</li>
        <li>How translation workflows integrate (translation memory, vendor handoff, in-context translation, machine translation review)</li>
      </ul>
      <p>Companies that skip this end up retrofitting localization, which is one of the most expensive content engineering projects an organization ever undertakes.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<ul>
      <li>Every time you've written copy that doesn't translate well (an idiom, a culturally specific reference), you've experienced the cost of l10n-naive content design.</li>
      <li>Every time legal has handed you different language for different markets, you've encountered jurisdictional content variation.</li>
      <li>Every time you've fought a designer over text expansion ("the German version doesn't fit"), you've experienced the design implications.</li>
    </ul>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "i18n vs. l10n" },
    { type: "prose", html: `<ul>
      <li><strong>Internationalization (i18n).</strong> Designing the system so localization is possible. Separating translatable strings from code; supporting RTL languages; making date/currency/number formatting locale-aware; allowing per-locale content overrides.</li>
      <li><strong>Localization (l10n).</strong> Adapting content for a specific locale. Translation, plus cultural adaptation, plus regulatory adjustment, plus currency conversion, plus example-changing.</li>
    </ul>
    <p>"i18n" is the architecture. "l10n" is what you do once the architecture supports it.</p>` },

    { type: "minor", text: "Locale, not language" },
    { type: "prose", html: `<p>A locale is a language-region combination. <code>en-US</code> and <code>en-GB</code> are different locales: spelling differs (organize / organise), currency differs ($ / £), idioms differ. Banking products in <code>en-US</code> and <code>en-GB</code> use entirely different concepts (ACH routing vs. sort codes; checks vs. cheques). Designing for "English" is naive; designing for locales is correct.</p>` },

    { type: "minor", text: "Field-level vs. entry-level localization" },
    { type: "prose", html: `<p>Two architectural patterns:</p>
      <ul>
        <li><strong>Field-level localization.</strong> A single content entry has fields with per-locale values. <code>title</code> has values for en-US, en-GB, fr-FR, de-DE. The structure is shared; only the strings differ. Cleaner when locales mostly have the same content, just translated.</li>
        <li><strong>Entry-level localization.</strong> Each locale has its own entry, linked via a shared key. <code>article_set-up-2fa.en-US</code> and <code>article_set-up-2fa.de-DE</code> are separate entries. Cleaner when locales need to diverge significantly — different sections, different images, different content order.</li>
      </ul>
      <p>Most modern headless CMSes support both. The choice should follow the content's needs: highly parallel content (most product UI) → field-level. Content that diverges by market (marketing pages, jurisdictional disclosures) → entry-level.</p>` },

    { type: "minor", text: "Locale fallback" },
    { type: "prose", html: `<p>What happens when a piece of content isn't yet translated into a target locale? Fallback rules:</p>
      <ul>
        <li>Strict (no fallback): show nothing if the locale is missing. Sometimes required by regulation (you can't show English content to a German user if German is required).</li>
        <li>Region fallback: <code>fr-CA</code> falls back to <code>fr-FR</code>, then to <code>en</code>, then to <code>en-US</code>.</li>
        <li>Default-locale fallback: anything missing in target falls back to the source locale (usually <code>en-US</code>).</li>
      </ul>
      <p>The choice is a content engineering decision: a content designer should be in the conversation, because fallback behavior shapes user experience.</p>` },

    { type: "minor", text: "ICU MessageFormat and pluralization" },
    { type: "prose", html: `<p>Some languages have complex pluralization rules (Russian has multiple plural forms; Arabic has six). Hardcoding "You have N items" doesn't work. <strong>ICU MessageFormat</strong> is the industry-standard format for writing translatable strings with plurals, gender, and selection:</p>
      <pre><code>{count, plural,
  =0 {No notifications}
  one {You have 1 notification}
  other {You have # notifications}
}</code></pre>
      <p>Translators write the locale-specific rules. Content designers ought to know this exists. Translators love working with content designers who do.</p>` },

    { type: "minor", text: "Text expansion / contraction" },
    { type: "prose", html: `<p>Different languages take different amounts of space. German is often 30% longer than English. Japanese can be much shorter. Designs that work in English break in German. Content engineering implications:</p>
      <ul>
        <li>Set max-length validation per locale, not globally</li>
        <li>Communicate expansion expectations to designers ("design for German length, not English")</li>
        <li>Provide a per-locale character count in the CMS so writers see when they're over</li>
      </ul>` },

    { type: "head", text: "Real scenario — US fintech expanding into the EU", num: "IV" },
    { type: "scenario", html: `<p>Your US fintech is expanding into the EU. Six months in, the project is in trouble. Marketing assumed "we'll translate the website." Six things they didn't model:</p>
      <ol>
        <li>Required GDPR disclosures don't exist in the US content at all. There's no place in the model to hold them.</li>
        <li>PSD2 strong-customer-authentication language is mandatory in EU but creates US legal risk if shown to US users. So it's not a "translate everywhere" problem — it's a "show only in EU" problem.</li>
        <li>"Bank account" translates fine, but the <em>concept</em> differs: IBAN vs. ACH routing, different account types, different fee structures. Some content needs full rewriting, not translation.</li>
        <li>Customer testimonials are all from US small businesses; irrelevant for German enterprise users. There's no field tagging testimonials by region or industry.</li>
        <li>The Pricing page has "$" hardcoded inside content strings. Currency should be rendered by the front-end based on locale, not baked into text.</li>
        <li>Date format is hardcoded <code>MM/DD/YYYY</code> inside several content fields. Same issue — should be locale-aware rendering.</li>
      </ol>
      <p>A content engineer would have, six months earlier, designed the model to absorb this:</p>
      <ul>
        <li>A <code>Disclosure</code> content type with a <code>jurisdiction</code> field; disclosures referenced from articles instead of embedded</li>
        <li>Currency and date never inside content strings — handled by the front-end's <code>Intl</code> API based on user locale</li>
        <li>Testimonials tagged with <code>region</code> and <code>industry</code>; the homepage carousel filters by user's region</li>
        <li>Field-level localization for product UI strings; entry-level for marketing pages where content actually diverges</li>
        <li>Locale fallback rules documented per content type</li>
      </ul>
      <p>None of this is exotic. It's planned at the modeling stage instead of bolted on at the translation stage.</p>` },

    { type: "activity", id: "7.1", title: "Localization-readiness audit", prompt: `<p>Take one page or one flow from your product. Imagine it has to launch in a new locale tomorrow — pick one with real cultural distance from your current locale (Japanese, Arabic, Hindi if you're in en-US; or vice versa). List everything that would break, mistranslate, or be culturally wrong if you literally translated word-for-word.</p>
      <p>Group findings into three buckets:</p>
      <ol>
        <li><strong>Model changes needed</strong> — fields that need to be added, fields that shouldn't hold what they currently hold (e.g., currency in a string field)</li>
        <li><strong>Translation guidance needed</strong> — glossary of brand terms not to translate, terminology decisions per market</li>
        <li><strong>Per-locale overrides needed</strong> — content that needs to be entirely different per locale, not just translated</li>
      </ol>`,
      placeholder: "Page/flow audited:\\nTarget locale:\\n\\nProblems found:\\n- \\n\\nModel changes needed:\\n- \\n\\nTranslation guidance needed:\\n- \\n\\nPer-locale overrides needed:\\n- " },

    { type: "activity", id: "7.2", title: "Multi-channel field modeling", prompt: `<p>Take a content type from your earlier work. Now imagine it has to render across: web, push notification, email subject line, voice assistant.</p>
      <p>For each channel, list:</p>
      <ul>
        <li>The maximum length</li>
        <li>The fields needed (push doesn't need rich text body; voice doesn't need images)</li>
        <li>The fields to suppress (push notifications shouldn't include legal disclosures)</li>
        <li>The rephrasing implications (voice assistant content should avoid abbreviations and read naturally aloud)</li>
      </ul>
      <p>Then update your content model. You'll probably end up with fields like <code>pushTitle</code> (max 50), <code>emailSubject</code> (max 80), <code>voiceSummary</code> (one short sentence, no abbreviations) — variants of the same content tuned per channel.</p>`,
      placeholder: "Content type:\\n\\nChannel: web\\n  Max length:\\n  Fields needed:\\n  Fields to suppress:\\n\\nChannel: push\\n  ...\\n\\nNew or modified fields in my model:\\n- " },

    { type: "activity", id: "7.3", title: "Sketch a Disclosure content type for multiple jurisdictions", prompt: `<p>Design a <code>Disclosure</code> content type for a regulated multi-jurisdiction product (fintech, healthtech, your call). Requirements:</p>
      <ul>
        <li>One disclosure should be able to have different wording in different jurisdictions</li>
        <li>The model should let you query "all GDPR-related disclosures last reviewed before 2024"</li>
        <li>The model should support both "shown everywhere" and "shown only in specific jurisdictions"</li>
        <li>Multiple articles should reference the same disclosure (so updates flow through)</li>
      </ul>
      <p>Sketch the schema using the format from Module 1.</p>`,
      placeholder: "CONTENT TYPE: Disclosure\\nPURPOSE: \\n\\nFIELDS:\\n- \\n\\nREFERENCES (from other types to this):\\n- \\n\\nGOVERNANCE NOTES:\\n- " },

    { type: "apply", html: `<p>Even if your company is single-locale today, ask in your next product review: <em>"Are we modeling content in a way that would let us localize next year without a rewrite?"</em> The answer will almost always be "no, but we should." That conversation is your opening to own the question.</p>` },

    { type: "selfcheck", questions: [
      "Difference between i18n and l10n?",
      "Why is 'locale' more specific than 'language'?",
      "When does field-level localization make sense vs. entry-level?",
      "Why should currency and date never be inside a content string?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>Produce a <strong>localization plan document</strong> for one content type or one product surface. Include:</p>
      <ol>
        <li>Which fields are translatable, which are global, why</li>
        <li>Field-level vs. entry-level decision, with rationale</li>
        <li>Locale fallback rules</li>
        <li>Jurisdictional content strategy (where Disclosure-style references replace inline content)</li>
        <li>Translation workflow (vendor, in-context, MT review)</li>
        <li>Text expansion budget per field</li>
      </ol>
      <p>Multi-locale companies hire content engineers specifically to produce this document. Having one shows you can do the job.</p>` }
  ]
},
{
  id: "m8",
  section: "Module 8",
  number: "08",
  title: "Content Migrations",
  intro: "The dirty, unglamorous work of moving content from one system to another. Also, frankly, the best on-ramp into content engineering — companies always need it, content designers rarely volunteer for it, and you learn the model deeply by working with it at scale.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>A migration is moving content from a source system (or a chaos of systems) into a target system, ideally cleaner and better-modeled than where it came from. Migrations happen for many reasons:</p>
      <ul>
        <li>Switching CMSes (WordPress to Sanity)</li>
        <li>Moving from Google Docs / Notion / Confluence into a real CMS</li>
        <li>Consolidating multiple CMSes into one</li>
        <li>Refactoring an existing CMS schema (the old model was wrong; new content type, migrate existing entries)</li>
        <li>Reclaiming content from hardcoded strings into a CMS</li>
      </ul>
      <p>The work involves: auditing what exists, designing the target model (Module 1), mapping old fields to new fields, deciding what to migrate / merge / delete / leave behind, writing or commissioning migration scripts, doing dry runs, doing the real migration, validating, rolling back if needed, and finally — the part most teams skip — communicating the change.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<ul>
      <li>Every time a product redesign has forced you to rewrite all the help articles, you've done migration work without the engineering layer.</li>
      <li>Every time you've consolidated three duplicate articles into one, that's a micro-migration.</li>
      <li>Every time you've moved a doc from Notion to your CMS, you've migrated content.</li>
    </ul>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "The migration workflow" },
    { type: "prose", html: `<ol>
      <li><strong>Inventory</strong> — list everything that exists. URLs, file paths, CMS entries, doc links. Spreadsheet is fine.</li>
      <li><strong>Audit</strong> — verdict on each: keep, update, merge, delete (Module 6).</li>
      <li><strong>Target model</strong> — what the receiving CMS / structure looks like. Designed before migration starts.</li>
      <li><strong>Mapping document</strong> — for each source field, where does it go in the target? What transformations are needed? What gets dropped?</li>
      <li><strong>Migration script or process</strong> — code (Python, JS) that reads from source and writes to target. Or, for small migrations, a manual copy-paste workflow.</li>
      <li><strong>Dry run</strong> — migrate to a staging environment first. Validate. Catch the surprises.</li>
      <li><strong>Real migration</strong> — usually in a maintenance window, sometimes with content authors locked out so nothing is edited mid-migration.</li>
      <li><strong>Validation</strong> — checks on the target. Did everything come through? Are character counts plausible? Are references intact? Did anything get corrupted in encoding?</li>
      <li><strong>Rollback plan</strong> — what happens if something is wrong. Snapshot of pre-migration state.</li>
      <li><strong>Communication</strong> — telling the team what changed, what URLs moved, what to do about broken links.</li>
    </ol>` },

    { type: "minor", text: "The mapping document" },
    { type: "prose", html: `<p>The unsexy heart of any migration. A spreadsheet (or a doc) with rows like:</p>
      <table>
        <thead><tr><th>Source field</th><th>Target field</th><th>Transformation</th><th>Notes</th></tr></thead>
        <tbody>
          <tr><td>WordPress post_title</td><td>Article.title</td><td>Strip HTML if present</td><td>—</td></tr>
          <tr><td>WordPress post_excerpt</td><td>Article.excerpt</td><td>If empty, leave null</td><td>Will need backfill</td></tr>
          <tr><td>WordPress post_author</td><td>Article.author</td><td>Lookup author by email; create Author entry if missing</td><td>Some authors are now ex-employees</td></tr>
          <tr><td>WordPress categories</td><td>Article.category (enum)</td><td>Map per attached translation table</td><td>15 source categories → 7 target</td></tr>
          <tr><td>WordPress tags</td><td>Article.tags (array)</td><td>Filter to approved tags only</td><td>Drop unapproved</td></tr>
          <tr><td><em>(new)</em></td><td>Article.lastReviewedBy</td><td>Set to null</td><td>Compliance backfill task created</td></tr>
        </tbody>
      </table>
      <p>This document is the contract between you, the engineer running the migration, and the content team. Every decision the migration makes traces back to a row in this table.</p>` },

    { type: "head", text: "Real scenario — migrating regulated help content into a headless CMS", num: "IV" },
    { type: "scenario", html: `<p>You're at a fintech where 250 help articles live in a tangle: 120 in WordPress, 80 in Google Docs (the support team's preferred tool), 30 in Notion (the product team's), 20 hardcoded as in-product help strings. You're tasked with consolidating into Sanity.</p>
      <p>You scope it as a six-week project. The phases:</p>
      <p><strong>Week 1: Inventory and audit.</strong> You list every article across all sources. You categorize each: keep / update / merge / delete. You find 40 duplicates (slightly different versions of the same article in WordPress and Google Docs). You find 60 articles nobody's looked at in 18 months — likely deletable.</p>
      <p><strong>Week 2: Target model.</strong> You finalize the Sanity schema for HelpArticle (from Module 1 work). You add compliance fields legal demands: <code>lastReviewedBy</code>, <code>complianceCategory</code>, <code>jurisdictions</code>, <code>reviewDueAt</code>.</p>
      <p><strong>Week 3: Mapping document.</strong> You write the mapping for each source. WordPress → Sanity is mostly clean (CMS to CMS). Google Docs → Sanity is messy (you have to parse heading structure manually for each article). Hardcoded strings need a developer to extract them.</p>
      <p><strong>Week 4: Dry run.</strong> You migrate WordPress to a Sanity staging environment via a Node script the engineer wrote. You discover 12 articles have malformed image references — the script chokes. You spec a fix. You discover 4 article slugs collide with existing Sanity entries; the script renames them. You discover 17 author entries weren't created automatically because some authors had multiple email aliases in WordPress.</p>
      <p><strong>Week 5: Real migration.</strong> Saturday morning. Content team is locked out of the source systems. Migration runs in 90 minutes. You validate row counts, spot-check 30 articles. Two issues found, both fixed in the script. Re-run. Clean.</p>
      <p><strong>Week 6: Backfill and comms.</strong> You and two content designers split up the 250 articles to backfill the compliance metadata that didn't exist in the source systems. You write a Loom video for the support team explaining how to find articles in the new system. You set up 301 redirects from old URLs.</p>
      <p>You produced one of the most credible content engineering portfolio artifacts possible: a successful regulated content migration with documentation.</p>` },

    { type: "activity", id: "8.1", title: "Run a mini content inventory and audit", prompt: `<p>Pick a small corner of your company's content — 20 to 50 items. Could be a help center section, a set of marketing pages, in-product strings from one flow.</p>
      <p>For each item, log in a spreadsheet (or a structured note):</p>
      <ul>
        <li>ID or URL</li>
        <li>Title</li>
        <li>Content type (if classifiable)</li>
        <li>Last updated date (find it; if unknown, mark "unknown")</li>
        <li>Owner (if known)</li>
        <li>Quality (good / needs update / stale)</li>
        <li>Verdict (keep / update / merge with another / delete)</li>
        <li>If merge: which entry does it merge into</li>
      </ul>
      <p>Then aggregate: percentages, patterns, biggest categories. This output is the input to every later migration decision.</p>`,
      placeholder: "Corpus:\\nN items audited:\\n\\nFindings summary:\\n  Keep as-is: \\n  Update: \\n  Merge: \\n  Delete: \\n\\nPatterns:\\n- \\n\\nBiggest decision I'd make based on this:\\n" },

    { type: "activity", id: "8.2", title: "Write the mapping document", prompt: `<p>Imagine you're migrating the corpus from Activity 8.1 into a clean target CMS. Design the target schema (from your Module 1 work). Then write the mapping document: source field → target field → transformation → notes.</p>
      <p>Be explicit about:</p>
      <ul>
        <li>Source fields that have no target (where do they go? dropped? logged?)</li>
        <li>Target fields with no source (which need to be backfilled by hand)</li>
        <li>References that need creating during migration (e.g., Author entries)</li>
        <li>Validation that might fail (and what to do — fix or quarantine)</li>
      </ul>`,
      placeholder: "Source -> Target:\\n\\n[source field] -> [target field]\\n  Transformation:\\n  Notes:\\n\\nFields with no target (dropped or logged):\\n- \\n\\nFields needing backfill:\\n- \\n\\nReferences to create during migration:\\n- " },

    { type: "activity", id: "8.3", title: "Plan the rollout and comms", prompt: `<p>Migrations succeed or fail at the human layer. Write the comms plan:</p>
      <ul>
        <li>Who's affected by this migration (content team, engineering, support, marketing, anyone consuming the content)</li>
        <li>What changes for each group (where do they go now, what's different about the editing interface, what URLs changed)</li>
        <li>What you'll send (Slack post? all-hands? Loom?)</li>
        <li>When (relative to migration day)</li>
        <li>What you'll do about broken links (301 redirects, search-engine notifications)</li>
        <li>What support you'll provide post-migration (office hours, dedicated Slack channel)</li>
      </ul>`,
      placeholder: "Stakeholders affected:\\n- \\n\\nKey messages per stakeholder:\\n- \\n\\nComms timeline:\\n  T-2 weeks: \\n  T-1 week: \\n  Migration day: \\n  T+1 week: \\n\\nBroken-link plan:\\n\\nPost-migration support:\\n" },

    { type: "apply", html: `<p>If your company is on the verge of a migration (CMS switch, redesign that requires content cleanup, etc.), <em>volunteer to scope it</em>. This is the highest-leverage move a transitioning content designer can make. Migrations are nobody's favorite work, you'll learn the entire content estate, and you'll end up running the project — which puts you in the content engineering role functionally even if your title hasn't changed.</p>` },

    { type: "selfcheck", questions: [
      "What's the purpose of a mapping document, and what goes in it?",
      "Why is a dry run essential even for 'simple' migrations?",
      "What's the most common reason a migration goes wrong?",
      "Why is the communication plan as important as the technical plan?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>Produce a <strong>complete migration plan document</strong> for a real or imagined migration. Include:</p>
      <ol>
        <li>Inventory and audit summary (Activity 8.1)</li>
        <li>Target schema</li>
        <li>Mapping document (Activity 8.2)</li>
        <li>Dry-run validation checklist (what would you check?)</li>
        <li>Migration timeline with milestones</li>
        <li>Comms plan (Activity 8.3)</li>
        <li>Rollback plan</li>
        <li>Post-migration validation checklist</li>
      </ol>
      <p>This is one of the most undervalued portfolio artifacts in the field. Most candidates don't have one. The ones who do almost always get the role.</p>` }
  ]
},
{
  id: "m9",
  section: "Module 9",
  number: "09",
  title: "Content for AI",
  intro: "LLMs are now a major consumer of your content. RAG, semantic markup, and machine-legibility are emerging concerns. The honest version of this module separates real signal from hype.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>A content engineer in 2026 is increasingly asked to make content work for AI systems — chatbots, AI assistants, AI-powered search, IDE agents, third-party tools that consume your docs. The practice areas:</p>
      <ul>
        <li><strong>RAG-readiness</strong> — making content that retrieves well from vector databases and embeds into LLM prompts cleanly</li>
        <li><strong>Semantic markup</strong> — Schema.org, ARIA, semantic HTML — so machines understand structure and meaning, not just surface text</li>
        <li><strong>llms.txt</strong> — an emerging proposed standard for telling LLMs which content matters on a site (more on the realism of this below)</li>
        <li><strong>Chunking design</strong> — structuring content so it splits into meaningful pieces during RAG ingestion</li>
        <li><strong>Glossaries and term consistency</strong> — so different parts of the corpus don't say the same fact in different ways</li>
        <li><strong>Editorial review of AI output</strong> — once an AI is producing content using your corpus, who validates that the output is correct, in voice, and compliant?</li>
      </ul>
      <p>Patrick Stafford's <a href="https://uxcontent.com/content-design-3-0-roadmap-ux-content/" target="_blank">Content Design 3.0 framework</a> argues this is the central shift facing content designers — moving from manual delivery to managing the systems that produce content. Whether or not you buy the framework, the underlying observation is real.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<ul>
      <li>Every time you've written clear, scannable, structured help content, you've made content easier for an AI to retrieve correctly.</li>
      <li>Every time you've fought for jargon-free language, you've reduced AI hallucination risk.</li>
      <li>Every time you've insisted on factual specificity ("the fee is $35", not "the applicable fee"), you've prevented an AI from getting confused.</li>
    </ul>
    <p>The leap is to formalize this. Audit your content explicitly through the AI-consumption lens. Make recommendations about how the content system supports (or breaks) AI use.</p>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "RAG (Retrieval-Augmented Generation)" },
    { type: "prose", html: `<p>RAG is the dominant pattern for AI assistants that use your specific content. The mechanics, simplified:</p>
      <ol>
        <li>Your content is split into <strong>chunks</strong> (paragraphs, sections, fixed token windows).</li>
        <li>Each chunk is converted into an <strong>embedding</strong> — a numeric vector that captures its meaning.</li>
        <li>Embeddings are stored in a <strong>vector database</strong>.</li>
        <li>When a user asks a question, the question is also embedded, and the system retrieves the chunks whose embeddings are most semantically similar.</li>
        <li>Those chunks are inserted into an LLM's context window with the question. The LLM answers using them.</li>
      </ol>
      <p>This is now standard architecture. <a href="https://www.techment.com/blogs/rag-in-2026/" target="_blank">The 2026 enterprise narrative</a> calls it the new standard for accurate, sourced, contextual AI — particularly in regulated industries where hallucination has real cost.</p>` },

    { type: "minor", text: "What this means for how you write" },
    { type: "prose", html: `<ul>
      <li><strong>Chunks should stand alone.</strong> If a paragraph relies on context from three sections above, RAG will retrieve it without that context, and the LLM will be confused. Write so that each meaningful section is self-contained.</li>
      <li><strong>Headings are anchors.</strong> Good H2/H3 structure helps chunking algorithms split content at meaningful boundaries instead of mid-paragraph.</li>
      <li><strong>Define jargon explicitly.</strong> Inline definitions, or a glossary, give the model what it needs to ground answers correctly.</li>
      <li><strong>Avoid hidden referents.</strong> "Click the button" is bad — <em>which</em> button? "Click the <strong>Save</strong> button in the top right" is good.</li>
      <li><strong>State facts specifically.</strong> "The overdraft fee is $35" beats "the applicable fee." If the user (or AI) retrieves only that paragraph, the specific fact is preserved.</li>
      <li><strong>Don't bury the lede.</strong> State the answer in the first sentence of the section. RAG retrieval favors chunks that look like answers.</li>
      <li><strong>Mark up structure semantically.</strong> Schema.org, ARIA, sensible HTML — all of it helps AI systems understand role and relationship.</li>
    </ul>` },

    { type: "minor", text: "llms.txt — the honest 2026 picture" },
    { type: "prose", html: `<p>llms.txt is a proposed standard, introduced in late 2024: a Markdown file at the root of a site (<code>example.com/llms.txt</code>) that gives LLMs a curated map of your most important content with one-line descriptions of each. The pitch: instead of letting an LLM crawl your noisy HTML, give it a clean menu.</p>
      <p>The honest 2026 state of adoption is more nuanced than blog posts suggest:</p>
      <ul>
        <li><a href="https://codersera.com/blog/llms-txt-complete-guide-2026/" target="_blank">Adoption is roughly 9–10% of mid-to-high traffic documentation sites</a>, even across the SERanking 300k-domain study. Lower for general business sites.</li>
        <li>Major LLM crawlers (GPTBot, ClaudeBot, PerplexityBot) <a href="https://limy.ai/blog/llms.txt-in-2026-the-full-guide" target="_blank">do not currently respect llms.txt as a first-class signal for AI search</a>.</li>
        <li>Studies show no measurable lift in AI citations from having an llms.txt file.</li>
        <li><em>However:</em> IDE agents and developer-facing AI tools (Cursor, Continue, Aider, MCP servers) do read llms.txt when present.</li>
        <li>Documentation platforms (Mintlify, GitBook, Vercel Docs) auto-generate llms.txt for hosted projects.</li>
      </ul>
      <p>The honest read: llms.txt is currently a <em>developer experience</em> bet more than an <em>AI search visibility</em> bet. It costs a half-day to publish and is forward-compatible if the standard gains formal vendor support. Ship one if you have substantive documentation; skip it if you have under 20 pages of content. And don't oversell its current impact in your 2026 portfolio.</p>` },

    { type: "minor", text: "Schema.org for AI" },
    { type: "prose", html: `<p>Schema.org markup (covered in Module 2) is arguably <em>more</em> consequential for AI than llms.txt. It's already respected by Google's AI Overviews and most retrieval pipelines. <a href="https://www.allmo.ai/articles/llms-txt" target="_blank">2026 analyses</a> consistently show schema-marked content gets cited more reliably by AI search engines than equivalent un-marked content.</p>` },

    { type: "head", text: "Real scenario — a fintech AI assistant getting fees wrong", num: "IV" },
    { type: "scenario", html: `<p>Your fintech ships an AI assistant trained on your help content. Two weeks after launch, customers complain the assistant gives wrong information about overdraft fees. Compliance flags it as a potential CFPB issue.</p>
      <p>You investigate. Three problems:</p>
      <ol>
        <li>The overdraft article has a paragraph that says "the standard fee applies" — the actual fee number was in the paragraph above. The chunker split them.</li>
        <li>Two other articles state the fee differently: "$35" in one, "$34 (subject to change)" in another. There's no canonical source.</li>
        <li>The help center has no Schema.org markup on the overdraft article. Some AI tools haven't been able to identify it as the authoritative source.</li>
      </ol>
      <p>The fix:</p>
      <ul>
        <li>Rewrite the overdraft article so every section is self-contained. Every paragraph that mentions the fee states the number, not "the fee."</li>
        <li>Consolidate the two conflicting articles. Mark one as canonical (<code>isCanonical: true</code>). Add 301 redirects.</li>
        <li>Add Schema.org Article markup with <code>dateModified</code>, <code>author</code> (Organization), and an <code>@id</code> that uniquely identifies the article.</li>
        <li>Configure the chunking pipeline (if you control it) to respect section boundaries. If you don't, work with the engineer who does.</li>
      </ul>
      <p>Compliance gets a one-page write-up. The AI assistant gives correct overdraft answers. You did content engineering for AI in a regulated context — which, on a portfolio, is gold.</p>` },

    { type: "activity", id: "9.1", title: "Make a help article RAG-ready", prompt: `<p>Take one help article from your product, ideally one that touches a regulated or fact-sensitive topic (fees, eligibility, security, data handling, account closure, identity verification, medication safety, whatever applies).</p>
      <p>Read it as if you had access to only one paragraph at a time, in random order. For each paragraph:</p>
      <ul>
        <li>Does it stand alone, or does it depend on context above?</li>
        <li>Does it use undefined pronouns (this/that/it/the) whose referent is in another paragraph?</li>
        <li>Does it define its terms?</li>
        <li>If a fact is mentioned (a number, a date, a condition), is it stated explicitly in every paragraph that references it, or is it abstracted into "the applicable fee" / "the standard timeframe"?</li>
        <li>Are the section headings descriptive enough that a chunker would split at meaningful boundaries?</li>
      </ul>
      <p>Rewrite the article so every paragraph passes the standalone test. Don't make it robotic. Just self-contained.</p>`,
      placeholder: "Original article: \\n\\nProblems I found:\\n- [paragraph X]: [problem]\\n\\nRewritten approach:\\n\\n[paste rewrite]" },

    { type: "activity", id: "9.2", title: "Write an llms.txt for your product (honestly)", prompt: `<p>Pick a product or company (yours, ideally). Draft a <code>/llms.txt</code>. The format is Markdown:</p>
      <pre><code># Your Company Name

&gt; One-paragraph description of what you do. This becomes the model's mental model of your site.

## Docs

- [Getting started](https://example.com/docs/getting-started): description
- [API reference](https://example.com/docs/api): description

## Policies and disclosures

- [Refund policy](https://example.com/refunds): canonical refund rules
- [Privacy](https://example.com/privacy)

## Optional

- [Blog](https://example.com/blog): less canonical content</code></pre>
      <p>Keep it curated. 20–50 links max — dumping the whole sitemap is the most common implementation failure. Descriptions should help the agent decide what to fetch, not optimize for SEO. Then write three honest sentences about what value you expect this to provide today vs. in 18 months.</p>`,
      placeholder: "[paste llms.txt draft]\\n\\nMy honest assessment of value:\\n- Today:\\n- 18 months out:\\n" },

    { type: "activity", id: "9.3", title: "Schema.org audit on a critical page", prompt: `<p>Pick the most important page on your company's site — the page that, if an AI assistant got it wrong, would cause the most damage. View page source. Check for Schema.org markup. If present, evaluate completeness. If absent, write what should be there.</p>
      <p>Bonus: cross-check against Google's <a href="https://search.google.com/test/rich-results" target="_blank">Rich Results Test</a> — pasting your page URL or HTML there will tell you what structured data Google sees.</p>`,
      placeholder: "Page audited:\\nSchema.org present (Y/N): \\nType(s) found:\\n\\nWhat I'd add or fix:\\n\\n{\\n  \\\"@context\\\": ...\\n}" },

    { type: "apply", html: `<p>If your company has any AI feature — a chatbot, smart search, AI summarization — find out what content it's drawing from. Read three articles from that corpus with the standalone-chunk lens. Propose one rewrite. This is a one-week-effort artifact that demonstrates exactly the skill regulated industries are hiring for in 2026.</p>` },

    { type: "selfcheck", questions: [
      "What is RAG, in one sentence?",
      "Why does writing self-contained paragraphs matter for AI consumption?",
      "What's the honest 2026 state of llms.txt — and when is it worth publishing?",
      "Why is Schema.org probably a higher-leverage AI investment than llms.txt right now?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>Produce an <strong>AI-readiness audit</strong> of one critical content area in your product. Include:</p>
      <ol>
        <li>The corpus you audited (e.g., "the overdraft and fees section of the help center")</li>
        <li>RAG-readiness findings: which articles have hidden referents, undefined terms, fact-abstraction problems</li>
        <li>Three concrete rewrites (before/after)</li>
        <li>Schema.org audit results and proposed markup</li>
        <li>llms.txt recommendation (publish or skip, with honest rationale)</li>
        <li>A one-page summary the compliance team could read</li>
      </ol>
      <p>This artifact bridges content design and the AI-pipeline content engineering definition. It's the most current and in-demand skill in the field as of 2026.</p>` }
  ]
},
{
  id: "m10",
  section: "Module 10",
  number: "10",
  title: "Documentation and Standards",
  intro: "The meta-layer. Writing about your content model. Naming conventions. Style guides. Content patterns in your design system. Documentation that makes your content engineering work durable past your time at the company.",
  sections: [
    { type: "head", text: "What this practice involves", num: "I" },
    { type: "prose", html: `<p>Every system that survives has documentation. Content engineering systems are no exception. A content engineer in this practice area:</p>
      <ul>
        <li>Documents the content model (every type, every field, every reference) so a new hire can understand it without you</li>
        <li>Writes naming conventions and applies them consistently (slugs, IDs, taxonomy values)</li>
        <li>Maintains the editorial style guide and integrates it into the design system</li>
        <li>Authors content patterns — the equivalent of design system components, but for content (error message patterns, empty state patterns, notification patterns, transactional email patterns)</li>
        <li>Writes decision records (sometimes called "architecture decision records" or ADRs) — short docs explaining why a content engineering decision was made, so future-you doesn't redo the work</li>
      </ul>
      <p>The leading discipline here is <strong>content design systems</strong>, a maturing area that <a href="https://www.nngroup.com/articles/content-design-systems/" target="_blank">NN/G described in 2024</a> and that <a href="https://indeed.design/article/content-in-for-and-of-design-systems/" target="_blank">Indeed Design</a>, Shopify Polaris, Atlassian, Sainsbury's, Intuit QuickBooks, and Mailchimp have all built exemplars of.</p>` },

    { type: "head", text: "Where you already touch this as a content designer", num: "II" },
    { type: "prose", html: `<p>This is where content designers already do the most content engineering work — just usually without the engineering frame. If you've ever:</p>
      <ul>
        <li>Written a voice and tone guide</li>
        <li>Documented a pattern ("error messages should follow this structure")</li>
        <li>Decided on terminology ("we use 'transfer' not 'send money'")</li>
        <li>Argued for putting content guidance into the design system</li>
      </ul>
      <p>...you've already started. The transition is to deepen it: think in terms of content patterns (with code examples), of versioning the guidance, of integrating it with the design system's components, of making it queryable and referable from the CMS.</p>` },

    { type: "head", text: "Vocabulary and concepts", num: "III" },
    { type: "minor", text: "Content patterns" },
    { type: "prose", html: `<p>A content pattern is the reusable content shell for a recurring situation. <a href="https://uxdesign.cc/how-to-incorporate-content-design-into-your-design-system-127ced15ba79" target="_blank">Bobbie Wood describes patterns</a> as "a conceptual shell with a predefined shape" that gets filled with situation-specific content.</p>
      <p>Examples:</p>
      <ul>
        <li><strong>Empty state pattern</strong> — illustration + headline + supporting text + primary action + (optional) secondary action. The pattern says <em>what fields exist and how to write them</em>; individual empty states fill the shell.</li>
        <li><strong>Error message pattern</strong> — title + body + recovery action + accessibility label. Different severities follow the same shape.</li>
        <li><strong>Confirmation modal pattern</strong> — heading (action-as-question) + body (consequences) + destructive action label + cancel label.</li>
        <li><strong>Transactional email pattern</strong> — preheader + subject + greeting + key fact + supporting context + CTA + footer disclosures.</li>
      </ul>
      <p>Patterns sit between the design system's visual components and your CMS's content types. Done right, they bridge the two.</p>` },

    { type: "minor", text: "Five things a mature content design system contains" },
    { type: "prose", html: `<p>From <a href="https://review.content-science.com/content-the-next-big-thing-for-design-systems/" target="_blank">Content Science Review's survey</a>:</p>
      <ol>
        <li><strong>Content presence</strong> — content guidance is in the design system, navigable, not a separate document.</li>
        <li><strong>Style</strong> — editorial style guides, usage notes, terminology, punctuation, capitalization.</li>
        <li><strong>Voice and tone</strong> — how to write for the brand or product, with examples per emotional context.</li>
        <li><strong>Content in components and patterns</strong> — real-life copy in component examples, not lorem ipsum.</li>
        <li><strong>Content patterns or types</strong> — how-to guidance for repeated content types (headlines, error messages, notifications, help articles).</li>
      </ol>
      <p>Most design systems have 1–3 of these. The ones with all five (Shopify Polaris, Atlassian, Indeed, QuickBooks) are widely cited as exemplars.</p>` },

    { type: "minor", text: "Naming conventions" },
    { type: "prose", html: `<p>Boring, but high-leverage. The conventions touch:</p>
      <ul>
        <li>Content type names (PascalCase? <code>HelpArticle</code> not <code>helpArticle</code>; <code>RegulatoryDisclosure</code> not <code>regulatorydisclosure</code>)</li>
        <li>Field names (camelCase? <code>lastReviewedBy</code>? <code>last_reviewed_by</code>?)</li>
        <li>Slug formats (kebab-case, lowercase, no special chars)</li>
        <li>ID formats (<code>tip_medication_interactions</code> vs UUID; opinions vary, document the choice)</li>
        <li>Taxonomy value formats (lowercase? "title-case"? plural?)</li>
      </ul>
      <p>Pick conventions, write them down, hold the line. Drift here is invisible but corrosive.</p>` },

    { type: "minor", text: "Decision records" },
    { type: "prose", html: `<p>A decision record (ADR) is a short doc — a page at most — capturing one consequential decision. The classic format:</p>
      <ul>
        <li><strong>Context.</strong> What problem are we solving?</li>
        <li><strong>Options considered.</strong> 2–4 alternatives, with tradeoffs.</li>
        <li><strong>Decision.</strong> What we chose.</li>
        <li><strong>Consequences.</strong> What this commits us to.</li>
      </ul>
      <p>For content engineering, ADRs are perfect for: "Why we chose Sanity over Contentful," "Why our taxonomy has two separate fields," "Why disclosures are their own content type," "Why we don't allow free-text tags." Without ADRs, every new team member relitigates these.</p>` },

    { type: "head", text: "Real scenario — building a content design system in a regulated company", num: "IV" },
    { type: "scenario", html: `<p>You're a content designer at a fintech with a mature visual design system but no content design system. Engineers and product designers default to the visual system's lorem-ipsum examples when building screens. The few content guidelines that exist live in a Google Doc nobody reads.</p>
      <p>You propose a content design system, integrated into the existing design system. The first six-month roadmap:</p>
      <ol>
        <li><strong>Audit the corpus.</strong> Find every UI string in the product (export from the strings file or scrape the UI). Cluster by pattern: error messages, empty states, tooltips, etc. Find the inconsistencies.</li>
        <li><strong>Author the first three patterns.</strong> Error message, empty state, confirmation modal. Each documents: when to use, the shape (fields), writing principles, do/don't examples drawn from real product copy. Live alongside the visual component pages.</li>
        <li><strong>Editorial style guide.</strong> Voice, tone (per emotional context), terminology decisions, punctuation, capitalization. Integrated into the design system's navigation.</li>
        <li><strong>Regulatory content guidance.</strong> A section for jurisdictional content patterns — how to write a disclosure, what fields the Disclosure content type holds, how to reference disclosures from other surfaces.</li>
        <li><strong>Decision records.</strong> An ADR section: "Why we use Disclosure as a referenced content type", "Why we have a separate compliance taxonomy", "Why we localize field-level for product UI and entry-level for marketing."</li>
        <li><strong>Adoption.</strong> Hold office hours. Train PMs and engineers. Audit new features against the patterns. Make the standards visible in PR reviews.</li>
      </ol>
      <p>Eighteen months later, new product features ship using your patterns by default. New hires onboard from the design system instead of asking you. Compliance audits cite the patterns as evidence of due process. You've moved from being the team's writer to being the team's content architect.</p>` },

    { type: "activity", id: "10.1", title: "Audit content in your design system", prompt: `<p>Open your company's design system (if it has one). Audit it for the five content-system elements from above:</p>
      <ol>
        <li>Is content guidance present at all, or is it only visual?</li>
        <li>Is there an editorial style guide?</li>
        <li>Is voice and tone documented?</li>
        <li>Do component examples use realistic content, or lorem ipsum?</li>
        <li>Are there content patterns for recurring content types?</li>
      </ol>
      <p>Score honestly out of 5. For each gap, write what the design system needs.</p>`,
      placeholder: "Design system audited:\\n\\nScore: __ / 5\\n\\n1. Content presence: \\n2. Style: \\n3. Voice and tone: \\n4. Content in components: \\n5. Content patterns: \\n\\nBiggest gap to fill first:\\n" },

    { type: "activity", id: "10.2", title: "Write a content pattern", prompt: `<p>Pick one content type your product uses repeatedly (error message, empty state, transactional email, tooltip, confirmation modal — your choice). Write the full content pattern. Format:</p>
      <ul>
        <li><strong>Name and purpose</strong> — what this pattern is for, when to use it, when not to use it</li>
        <li><strong>Anatomy</strong> — the fields that make up the pattern, with character limits and constraints</li>
        <li><strong>Writing principles</strong> — 4–6 do/don't rules, each with rationale</li>
        <li><strong>Examples</strong> — at least 3 real examples in different contexts (e.g., severity levels for an error message), with annotations</li>
        <li><strong>Accessibility considerations</strong> — screen reader behavior, ARIA roles, color/icon dependencies</li>
        <li><strong>Localization notes</strong> — text expansion budget, anything that needs per-locale variation</li>
        <li><strong>When this pattern doesn't apply</strong> — explicit out-of-scope cases</li>
      </ul>`,
      placeholder: "PATTERN NAME:\\n\\nPURPOSE:\\n\\nANATOMY:\\n- field 1: ...\\n\\nWRITING PRINCIPLES:\\n1. Do ... because ...\\n2. Don't ... because ...\\n\\nEXAMPLES:\\n\\nACCESSIBILITY:\\n\\nLOCALIZATION:\\n\\nNOT FOR:" },

    { type: "activity", id: "10.3", title: "Write a decision record", prompt: `<p>Pick one consequential content engineering decision from your work (real or imagined). Write a decision record in the format:</p>
      <pre><code>TITLE: [decision in one sentence]
DATE: [when this was decided]
STATUS: [proposed / accepted / superseded]

CONTEXT:
[what problem we were solving]

OPTIONS CONSIDERED:
1. [option A] — tradeoffs: ...
2. [option B] — tradeoffs: ...
3. [option C] — tradeoffs: ...

DECISION:
[what we chose]

CONSEQUENCES:
[what this commits us to;
what becomes harder; what becomes easier]</code></pre>
      <p>If you can't think of a real decision, write the ADR for "Why we'd choose Sanity over Contentful for our use case" — it's a great forcing function.</p>`,
      placeholder: "TITLE:\\nDATE:\\nSTATUS:\\n\\nCONTEXT:\\n\\nOPTIONS CONSIDERED:\\n1.\\n2.\\n3.\\n\\nDECISION:\\n\\nCONSEQUENCES:" },

    { type: "apply", html: `<p>Pitch your content pattern (Activity 10.2) to your design system team this quarter. Frame it as: "I noticed [pattern] keeps coming up inconsistently in PRs. I drafted a pattern. Can we add it to the design system?" Most design system teams will say yes — they want content contribution but most content designers don't bring it.</p>` },

    { type: "selfcheck", questions: [
      "What are the five elements of a mature content design system?",
      "What's the difference between a content pattern and a design system component?",
      "Why are naming conventions worth documenting explicitly?",
      "What is a decision record, and what does writing one prevent?"
    ]},

    { type: "head", text: "Leveling up — the portfolio artifact", num: "V" },
    { type: "prose", html: `<p>Produce a <strong>contribution to a content design system</strong>. The artifact:</p>
      <ol>
        <li>One fully documented content pattern (Activity 10.2)</li>
        <li>Two decision records relevant to the pattern</li>
        <li>A short proposal for how this pattern integrates into your company's (or a hypothetical) design system</li>
        <li>A page or web mockup showing how the pattern would appear in the design system docs (e.g., side-by-side with the corresponding visual component)</li>
      </ol>
      <p>This artifact tells hiring managers: this person doesn't just write content; this person produces durable content infrastructure. That's the line a content designer crosses to become a content engineer.</p>` }
  ]
},
{
  id: "capstone",
  section: "Capstone",
  number: "C",
  title: "Capstone — Build a Content Engineering Portfolio Piece",
  intro: "One synthesis project, taken seriously. The deliverable is a portfolio artifact that proves you can do content engineering work end-to-end — not just discuss it.",
  sections: [
    { type: "head", text: "What the capstone is for", num: "I" },
    { type: "prose", html: `<p>Each module produced a leveling-up artifact. The capstone integrates many of them around one realistic problem, in one chosen industry context. Pick the option that closest matches the industry you want to work in next. You'll need a focused 15–30 hours over 2–4 weeks.</p>
      <p>The capstone artifact is the document, repo, or studio you'll point to in interviews. Treat it that seriously.</p>` },

    { type: "head", text: "Three capstone options — pick one", num: "II" },

    { type: "minor", text: "Option A — Fintech help system" },
    { type: "prose", html: `<p><strong>Scenario.</strong> You're hired as the first content engineer at a mid-stage fintech. The product spans US and EU. The help center is a tangle of 200+ articles across WordPress, Google Docs, and Notion. There's a customer-facing AI assistant being scoped that needs to draw from this content. Compliance has flagged that nothing is auditable.</p>
      <p><strong>Your task.</strong> Produce a complete content engineering plan: content model, taxonomy (dual customer/compliance), CMS recommendation, AX spec for legal reviewers, workflow design, migration plan, localization architecture for EU expansion, AI-readiness audit of 5 critical articles, and a contribution to the existing design system. This integrates Modules 1–10.</p>` },

    { type: "minor", text: "Option B — Healthtech patient education library" },
    { type: "prose", html: `<p><strong>Scenario.</strong> A digital health company is rebuilding its patient education library. Currently 400 articles in a custom CMS no engineer wants to maintain. Clinical review process is informal — articles go stale and nobody knows. Mobile app, web, push notifications, transactional email, and (soon) a voice assistant all need to consume this content. HIPAA constraints apply.</p>
      <p><strong>Your task.</strong> Design the content model with clinical-review metadata baked in, the taxonomy (condition-based and care-pathway-based, dual fields), the workflow including the medical-director approval gate, the AX for clinicians who don't want to learn a CMS, multi-channel field design, an audit and migration plan, an AI-readiness plan, and patient-facing content patterns added to the design system.</p>` },

    { type: "minor", text: "Option C — Enterprise design system content library" },
    { type: "prose", html: `<p><strong>Scenario.</strong> A large enterprise SaaS company has a mature visual design system but its content layer is lorem ipsum. Five product teams each invent their own error messages, empty states, and confirmation modals. Hiring managers ask candidates "do you know content design systems?" — that's the role you want.</p>
      <p><strong>Your task.</strong> Build the content layer of a design system: pattern library with 5 patterns fully documented, editorial style guide, voice and tone framework, content in component examples (replace lorem ipsum), terminology glossary, naming conventions, and 5 decision records explaining the consequential choices. Build a public-facing site (Notion, Mintlify, plain HTML — your call) showing it off.</p>` },

    { type: "head", text: "Deliverables (any option)", num: "III" },
    { type: "prose", html: `<ol>
      <li><strong>An overview document</strong> — 1–2 pages — explaining context, scope, and your role.</li>
      <li><strong>At least 5 module-style artifacts</strong> from the leveling-up sections of the earlier modules, polished and integrated.</li>
      <li><strong>A live, public artifact where possible</strong> — a Sanity studio, a public Notion site, a GitHub repo, or a Mintlify-hosted doc site.</li>
      <li><strong>A short README</strong> — what's here, how to navigate, what each artifact demonstrates.</li>
      <li><strong>A "tradeoffs and what I'd do differently" reflection</strong> — interviewers love this. It shows seniority.</li>
    </ol>` },

    { type: "head", text: "How to scope this realistically", num: "IV" },
    { type: "prose", html: `<p>You can't do everything. Pick the 5–7 artifacts that best demonstrate what you want to be hired for, and go deep on those. Suggested combinations:</p>
      <ul>
        <li><strong>If you want a content engineering IC role:</strong> heavy on Modules 1 (model), 3 (CMS), 4 (APIs), and 8 (migration).</li>
        <li><strong>If you want a content ops or governance role:</strong> heavy on Modules 5 (AX), 6 (ops), 7 (localization), and 10 (standards).</li>
        <li><strong>If you want an AI-adjacent content role:</strong> heavy on Modules 1 (model), 2 (taxonomy), 9 (AI), and 10 (standards).</li>
      </ul>
      <p>It's fine to skip modules. The capstone is about depth, not coverage.</p>` },

    { type: "activity", id: "C.1", title: "Capstone planning", prompt: `<p>Before you start, write your plan:</p>
      <ol>
        <li>Which option (A / B / C)?</li>
        <li>Which role are you positioning for? (Specific job titles, real or imagined postings.)</li>
        <li>Which 5–7 artifacts will you produce?</li>
        <li>What's your 4-week timeline?</li>
        <li>What's the public artifact (URL, repo) you'll point at?</li>
        <li>What's your "I'm done" criteria for each artifact?</li>
      </ol>
      <p>Don't skip this. The capstone fails when it's open-ended; it succeeds when you scope it.</p>`,
      placeholder: "Option: \\nRole I'm positioning for: \\n\\nArtifacts I'll produce:\\n1. \\n\\nTimeline:\\n  Week 1: \\n  Week 2: \\n  Week 3: \\n  Week 4: \\n\\nPublic artifact: \\n\\nDone criteria per artifact: \\n" },

    { type: "activity", id: "C.2", title: "Capstone reflection", prompt: `<p>After finishing, write a one-page reflection. Real reflection — not a humble brag. Cover:</p>
      <ul>
        <li>What I built and the choices I made</li>
        <li>What I'd do differently if I started over</li>
        <li>What I learned about content engineering that I didn't expect</li>
        <li>What the next layer of depth would look like (so an interviewer can ask "and where would you go next with this?")</li>
        <li>The three sentences I'd say in 30 seconds to introduce this work to a hiring manager</li>
      </ul>
      <p>This reflection often matters more than the artifact itself in interviews.</p>`,
      placeholder: "What I built and chose:\\n\\nWhat I'd do differently:\\n\\nWhat I learned that surprised me:\\n\\nNext layer of depth:\\n\\nThe 30-second pitch:\\n" },

    { type: "head", text: "Closing", num: "V" },
    { type: "prose", html: `<p>The transition from content designer to content engineer is real, the demand is real, and the work draws on craft you already have. The hardest part isn't learning new things. It's giving yourself permission to be the person who thinks about systems instead of strings, and producing the artifacts that prove it.</p>
      <p>Make the artifact. Put it in your portfolio. Reference it in interviews. The role is yours to take.</p>` }
  ]
},
{
  id: "appA",
  section: "Appendix A",
  number: "A",
  title: "The two definitions of content engineering",
  intro: "An expanded reference for navigating the two roles you'll encounter in 2026 job postings.",
  sections: [
    { type: "head", text: "Why this matters", num: "I" },
    { type: "prose", html: `<p>If you read about content engineering on the open web in 2026, you'll find two different jobs both called "content engineer." Knowing which is which lets you read job descriptions accurately and position yourself precisely.</p>` },

    { type: "head", text: "Definition 1 — Structured content engineering", num: "II" },
    { type: "minor", text: "Lineage" },
    { type: "prose", html: `<p>Roots in the early-2000s structured-content movement: DITA, XML-based authoring, single-sourcing in technical communication. Key voices: <a href="https://www.simplea.com/resources/articles/content-engineer-roles-and-responsibilities" target="_blank">Rahel Anne Bailie and Cleve Gibbon</a>, Carrie Hane and Mike Atherton (<em>Designing Connected Content</em>), Sara Wachter-Boettcher (<em>Content Everywhere</em>), Karen McGrane (<em>Content Strategy for Mobile</em>), Ann Rockley (<em>Managing Enterprise Content</em>). Industry: Forrester, NN/G, parson AG, content technology vendors (Sanity, Contentful, Kontent.ai).</p>` },

    { type: "minor", text: "Core focus" },
    { type: "prose", html: `<ul>
      <li>Content modeling and structured content</li>
      <li>Taxonomy, metadata, semantic markup</li>
      <li>CMS architecture (especially headless)</li>
      <li>Multichannel and omnichannel delivery</li>
      <li>Localization architecture</li>
      <li>Content governance and operations</li>
      <li>AI-readiness via structure (RAG, Schema.org)</li>
    </ul>` },

    { type: "minor", text: "Salary signals (2026)" },
    { type: "prose", html: `<p>Per multiple 2026 listings: IC content engineers $120K–$165K; senior $160K–$220K; heads of content engineering $200K–$280K. Lower at smaller companies, higher at large enterprises and regulated industries.</p>` },

    { type: "minor", text: "Who hires this role" },
    { type: "prose", html: `<p>Enterprise SaaS, fintech, healthtech, retail/e-commerce with deep catalogs, media companies with large content libraries, technical documentation organizations.</p>` },

    { type: "minor", text: "How to position into it from content design" },
    { type: "prose", html: `<p>This course. Heavy emphasis on Modules 1, 3, 5, 6, 7, 8, 10. Build the portfolio artifacts. Reframe your existing work using the vocabulary in Appendix B. In interviews, lead with the content design system / structured content work, not the prose writing.</p>` },

    { type: "head", text: "Definition 2 — AI-pipeline content engineering", num: "III" },
    { type: "minor", text: "Lineage" },
    { type: "prose", html: `<p>Emerged in 2024–25 from SEO/marketing-automation world. Pushed by Jasper, Ahrefs, AirOps, Averi, Semrush. The shift: <em>content engineer</em> reframed as "the person who builds the AI content production pipeline" — automated research, drafting, optimization for SEO/AEO/GEO, publishing, measurement.</p>` },

    { type: "minor", text: "Core focus" },
    { type: "prose", html: `<ul>
      <li>Designing AI content workflows (n8n, LangChain, custom pipelines)</li>
      <li>Prompt engineering and prompt libraries</li>
      <li>SEO/AEO/GEO optimization at scale</li>
      <li>Content automation and refresh systems</li>
      <li>AI search visibility (LLM citations, Google AI Overviews)</li>
      <li>Vector databases and RAG infrastructure</li>
      <li>Measurement: AI search citations, AEO performance, pipeline efficiency</li>
    </ul>` },

    { type: "minor", text: "Salary signals (2026)" },
    { type: "prose", html: `<p>Per <a href="https://www.averi.ai/blog/what-is-a-content-engineer-the-2026-role-(and-who-should-hire-one)" target="_blank">Averi's 2026 analysis</a>: IC roles $120K–$165K; senior $160K–$220K; head-level $200K–$280K. Heavy variance based on whether the role is at a startup or enterprise marketing org.</p>` },

    { type: "minor", text: "Who hires this role" },
    { type: "prose", html: `<p>Series B+ SaaS marketing orgs. Content-heavy media companies experimenting with AI. Marketing-led companies pushing into AI search visibility. SEO agencies.</p>` },

    { type: "minor", text: "How to position into it from content design" },
