    { type: "prose", html: `<p>Steeper transition than Definition 1. Need to add: prompt engineering, basic understanding of LLM APIs (Anthropic, OpenAI), automation tooling (n8n, Zapier, or LangChain), SEO/AEO measurement. Modules 2, 9, and 10 of this course are most relevant. The capstone won't position you for this role unless you adapt it heavily.</p>` },

    { type: "head", text: "How to tell which a job posting is", num: "IV" },
    { type: "minor", text: "Signals it's Definition 1 (structured content)" },
    { type: "prose", html: `<ul>
      <li>Words: content modeling, taxonomy, schema, CMS, headless, multichannel, content reuse, governance, localization, design system, structured content, DITA, CCMS</li>
      <li>Team: under design, product, content strategy, or knowledge management</li>
      <li>Stack: Sanity, Contentful, Strapi, Kontent.ai, Storyblok, Payload, MadCap, Heretto, Paligo</li>
      <li>Industries: enterprise SaaS, fintech, healthtech, regulated industries, technical documentation</li>
    </ul>` },

    { type: "minor", text: "Signals it's Definition 2 (AI pipeline)" },
    { type: "prose", html: `<ul>
      <li>Words: AI agents, content automation, SEO, AEO, GEO, content pipelines, RAG ingestion, prompt engineering, LLM workflows, content production at scale</li>
      <li>Team: under marketing, growth, or SEO</li>
      <li>Stack: n8n, LangChain, Zapier, OpenAI/Anthropic APIs, vector databases, Ahrefs, Semrush, AirOps</li>
      <li>Industries: marketing-led SaaS, media, content agencies, AI startups</li>
    </ul>` },

    { type: "minor", text: "Hybrid roles" },
    { type: "prose", html: `<p>Many 2026 enterprise roles blend both. A fintech might want someone who can model content for RAG (Definition 1), <em>and</em> design the AI workflow that uses it (Definition 2). If you can do both, you become unusually hireable. Module 9 of this course is the bridge.</p>` }
  ]
},
{
  id: "appB",
  section: "Appendix B",
  number: "B",
  title: "Vocabulary cheat sheet",
  intro: "The terms you'll encounter in content engineering job interviews, with one-sentence working definitions. Keep this open during interview prep.",
  sections: [
    { type: "head", text: "Content modeling and structure", num: "I" },
    { type: "prose", html: `<dl>
      <dt><strong>Content model</strong></dt><dd>The schema definition of a kind of content — its fields, their types, validation rules, and references to other content types.</dd>
      <dt><strong>Content type</strong></dt><dd>A defined category of content (Article, Author, Disclosure, ErrorMessage). Singular content types ("the homepage") vs. collection types ("articles").</dd>
      <dt><strong>Field</strong></dt><dd>A property on a content type. Has a name, a type, sometimes validation.</dd>
      <dt><strong>Reference</strong></dt><dd>A pointer from one content entry to another (Article → Author). Can be one-to-one, one-to-many, or many-to-many.</dd>
      <dt><strong>Atomic content</strong></dt><dd>Content modeled at its smallest meaningful unit, designed for reuse and composition.</dd>
      <dt><strong>Composable content</strong></dt><dd>Content systems where larger structures (pages, emails) are assembled from atomic pieces, not authored as monoliths.</dd>
      <dt><strong>Blob content</strong></dt><dd>The anti-pattern of stuffing many things into one large rich-text field. Opaque to systems.</dd>
      <dt><strong>Single-sourcing</strong></dt><dd>The practice of authoring content once and using it across multiple outputs. Foundational in technical documentation; the same principle drives modern multichannel content.</dd>
      <dt><strong>Headless CMS</strong></dt><dd>A CMS that stores content and serves it via API, without rendering pages itself.</dd>
      <dt><strong>CCMS</strong></dt><dd>Component Content Management System. Purpose-built for structured, reusable technical content (MadCap, Heretto, Paligo).</dd>
      <dt><strong>DITA</strong></dt><dd>Darwin Information Typing Architecture. An XML-based standard for structured technical content. Old, still widely used in regulated technical writing.</dd>
    </dl>` },

    { type: "head", text: "Taxonomy and metadata", num: "II" },
    { type: "prose", html: `<dl>
      <dt><strong>Taxonomy</strong></dt><dd>The organized system of categories, tags, and labels you apply to content.</dd>
      <dt><strong>Controlled vocabulary</strong></dt><dd>A fixed list of allowed tag values; editors pick from a dropdown.</dd>
      <dt><strong>Folksonomy</strong></dt><dd>Free-form tagging where editors invent terms. Flexible, inconsistent.</dd>
      <dt><strong>Hierarchical taxonomy</strong></dt><dd>Tags with parent/child relationships.</dd>
      <dt><strong>Faceted classification</strong></dt><dd>Multiple parallel taxonomies (topic, audience, region) applied to the same content.</dd>
      <dt><strong>Metadata</strong></dt><dd>Data about content (title, author, date, status), distinct from content itself.</dd>
      <dt><strong>Schema.org</strong></dt><dd>A shared web vocabulary for semantic markup (Article, Product, FAQPage) maintained by major search engines.</dd>
      <dt><strong>JSON-LD</strong></dt><dd>The format Schema.org markup usually appears in — a JSON block in the page's HTML.</dd>
      <dt><strong>Knowledge graph</strong></dt><dd>A graph structure of entities and their relationships, often used to power semantic search.</dd>
    </dl>` },

    { type: "head", text: "Delivery and APIs", num: "III" },
    { type: "prose", html: `<dl>
      <dt><strong>API</strong></dt><dd>Application Programming Interface. A defined contract for how a program asks a system for data.</dd>
      <dt><strong>REST</strong></dt><dd>An API style with fixed endpoints (URLs) per resource, returning predefined JSON shapes.</dd>
      <dt><strong>GraphQL</strong></dt><dd>An API style where the caller specifies exactly which fields they need in a query.</dd>
      <dt><strong>GROQ</strong></dt><dd>Sanity's query language; more powerful than REST and simpler than GraphQL.</dd>
      <dt><strong>JSON</strong></dt><dd>The data format APIs almost always use. Objects, arrays, strings, numbers, booleans, null.</dd>
      <dt><strong>Webhook</strong></dt><dd>An HTTP request a system sends when something happens (content published, status changed) — used to trigger downstream actions.</dd>
      <dt><strong>SSG / SSR / ISR</strong></dt><dd>Static Site Generation / Server-Side Rendering / Incremental Static Regeneration — three patterns for when and how content gets fetched into the page.</dd>
      <dt><strong>CDN</strong></dt><dd>Content Delivery Network. Geographically distributed servers that cache content for fast delivery.</dd>
    </dl>` },

    { type: "head", text: "Operations and governance", num: "IV" },
    { type: "prose", html: `<dl>
      <dt><strong>Content operations (ContentOps)</strong></dt><dd>The systems and processes for making, reviewing, publishing, and maintaining content at scale.</dd>
      <dt><strong>Workflow state machine</strong></dt><dd>The defined states a content entry can be in, and the rules for transitions between them.</dd>
      <dt><strong>Governance</strong></dt><dd>The rules about who decides what — who can change the content model, who owns each content type, who can publish.</dd>
      <dt><strong>Content audit</strong></dt><dd>A systematic review of an existing content corpus, producing a verdict per item (keep, update, merge, delete).</dd>
      <dt><strong>Content inventory</strong></dt><dd>The list of everything that exists — the input to an audit.</dd>
      <dt><strong>Content lifecycle</strong></dt><dd>The stages content moves through from plan to retire.</dd>
      <dt><strong>Re-review cadence</strong></dt><dd>The defined interval at which regulated content must be re-reviewed (e.g., every 12 months).</dd>
    </dl>` },

    { type: "head", text: "Localization", num: "V" },
    { type: "prose", html: `<dl>
      <dt><strong>i18n</strong></dt><dd>Internationalization. Designing the system so localization is possible.</dd>
      <dt><strong>l10n</strong></dt><dd>Localization. Adapting content for a specific locale.</dd>
      <dt><strong>Locale</strong></dt><dd>A language-region combination (en-US, en-GB, fr-FR).</dd>
      <dt><strong>Field-level localization</strong></dt><dd>One entry has fields with per-locale values.</dd>
      <dt><strong>Entry-level localization</strong></dt><dd>Each locale has its own entry, linked via shared key.</dd>
      <dt><strong>ICU MessageFormat</strong></dt><dd>The industry-standard format for writing translatable strings with plurals and selection rules.</dd>
      <dt><strong>Translation memory (TM)</strong></dt><dd>A database of previously-translated strings, reused to keep translations consistent and reduce vendor cost.</dd>
      <dt><strong>Locale fallback</strong></dt><dd>The rules for what to show when a target locale doesn't have the content (e.g., fall back to source locale).</dd>
    </dl>` },

    { type: "head", text: "AI and machine-readability", num: "VI" },
    { type: "prose", html: `<dl>
      <dt><strong>LLM</strong></dt><dd>Large Language Model. The category of AI that includes Claude, GPT, Gemini.</dd>
      <dt><strong>RAG</strong></dt><dd>Retrieval-Augmented Generation. The pattern where an LLM is grounded by retrieved chunks from a content corpus before generating.</dd>
      <dt><strong>Embedding</strong></dt><dd>A numeric vector representation of content's meaning. Similar content has similar embeddings.</dd>
      <dt><strong>Vector database</strong></dt><dd>A database optimized to store and query embeddings (Pinecone, Weaviate, Chroma).</dd>
      <dt><strong>Chunking</strong></dt><dd>Splitting content into pieces before embedding for RAG. The chunking strategy affects retrieval quality.</dd>
      <dt><strong>Prompt engineering</strong></dt><dd>The discipline of designing prompts to get reliable behavior from LLMs.</dd>
      <dt><strong>System prompt</strong></dt><dd>The instructions given to an LLM that shape how it responds across many user inputs.</dd>
      <dt><strong>llms.txt</strong></dt><dd>A proposed standard for a Markdown file at the root of a site, giving LLMs a curated guide to important content.</dd>
      <dt><strong>AEO / GEO</strong></dt><dd>Answer Engine Optimization / Generative Engine Optimization. SEO-adjacent disciplines aimed at AI search citations.</dd>
      <dt><strong>MCP</strong></dt><dd>Model Context Protocol. Anthropic-introduced open standard for connecting AI models to tools and data sources.</dd>
    </dl>` },

    { type: "head", text: "Tooling and platforms", num: "VII" },
    { type: "prose", html: `<dl>
      <dt><strong>Sanity</strong></dt><dd>Schema-as-code headless CMS. Studio is the editing UI. GROQ is the query language.</dd>
      <dt><strong>Contentful</strong></dt><dd>Enterprise-standard headless CMS with GUI model builder.</dd>
      <dt><strong>Strapi</strong></dt><dd>Open-source, self-hostable headless CMS.</dd>
      <dt><strong>Storyblok</strong></dt><dd>Visual-editing headless CMS popular with marketing teams.</dd>
      <dt><strong>Payload</strong></dt><dd>Open-source, TypeScript-first headless CMS.</dd>
      <dt><strong>Kontent.ai</strong></dt><dd>Enterprise headless CMS with strong workflow and governance features.</dd>
      <dt><strong>Mintlify / GitBook</strong></dt><dd>Documentation platforms with built-in AI-readiness features (auto-generated llms.txt, RAG-friendly structure).</dd>
      <dt><strong>Markdown</strong></dt><dd>Lightweight markup format used widely for documentation and structured content.</dd>
      <dt><strong>MDX</strong></dt><dd>Markdown with embedded JSX/React components. Common in modern documentation sites.</dd>
      <dt><strong>YAML / JSON / TOML</strong></dt><dd>Three common data-serialization formats. Frontmatter at the top of Markdown files is usually YAML.</dd>
      <dt><strong>Git</strong></dt><dd>The version-control system used by engineering teams. Increasingly used for "docs-as-code" content workflows.</dd>
    </dl>` }
  ]
},
{
  id: "appC",
  section: "Appendix C",
  number: "C",
  title: "Career positioning",
  intro: "Practical guidance for translating this course's work into interviews, portfolio, and job applications.",
  sections: [
    { type: "head", text: "Reframing your existing content design work", num: "I" },
    { type: "prose", html: `<p>A lot of what you've already done is content engineering work — just described in content design language. Translate it:</p>
      <ul>
        <li>"I wrote the error messages for the onboarding flow" → "I designed the error-message content pattern, including the field structure and validation rules, that's now used across the product."</li>
        <li>"I wrote a style guide" → "I authored the editorial style standards for our design system, integrated into the component documentation."</li>
        <li>"I cleaned up our help center" → "I led a content audit of 200+ help articles and proposed a taxonomy redesign and consolidation plan."</li>
        <li>"I worked with engineers to update UI strings" → "I designed the localization-ready string structure and worked with engineering to refactor hardcoded strings into the CMS."</li>
        <li>"I joined the design system team" → "I contributed the content layer of our design system — patterns for error messages, empty states, and notifications."</li>
      </ul>
      <p>None of this is exaggeration. It's accurate framing of work that was always systemic.</p>` },

    { type: "head", text: "Portfolio structure that works for content engineering roles", num: "II" },
    { type: "prose", html: `<ol>
      <li><strong>One headline artifact.</strong> The capstone. Public, accessible, no login required. This is what they look at.</li>
      <li><strong>2–3 deeper case studies.</strong> Each from a module. Real or composite (composite is fine if you label it). Each should be one page, with: problem, your approach, the artifact (model, taxonomy, workflow, etc.), and tradeoffs you considered.</li>
      <li><strong>A "writing about systems" piece.</strong> One blog post, Medium article, or LinkedIn long-form post about content engineering. Demonstrates you can think aloud about the work.</li>
      <li><strong>A skills section.</strong> List the CMSes, the modeling languages, the tools, the standards. Be honest. "Familiar with" is fine. "Built production schemas in" is better when true.</li>
    </ol>
    <p>Skip the prose-writing samples unless explicitly asked. Hiring managers for content engineering roles assume you can write; they want to see if you can think in systems.</p>` },

    { type: "head", text: "Interviewing", num: "III" },
    { type: "minor", text: "Story structure" },
    { type: "prose", html: `<p>For every "tell me about a time" question, structure your answer:</p>
      <ol>

/* ============================================================
   APP STATE
   ============================================================ */
const STORAGE_KEY = "content-eng-course-v2";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    currentModule: "intro",
    completed: {},
    activities: {},
    selfChecks: {},
    theme: "light"
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn("Could not save state", e);
  }
}

let state = loadState();

/* ============================================================
   RENDER
   ============================================================ */
function renderNav() {
  const nav = document.getElementById("nav-list");
  let html = "";
  let currentSection = "";

  courseData.forEach((mod, idx) => {
    const sectionLabel = mod.section.startsWith("Module") ? "Modules"
                        : mod.section.startsWith("Appendix") ? "Appendices"
                        : "Start here";
    if (sectionLabel !== currentSection) {
      currentSection = sectionLabel;
      html += `<div class="nav-section-label">${sectionLabel}</div>`;
    }
    const isActive = mod.id === state.currentModule ? "active" : "";
    const isComplete = state.completed[mod.id] ? "complete" : "";
    html += `
      <button class="nav-item ${isActive} ${isComplete}" data-id="${mod.id}" onclick="goTo('${mod.id}')">
        <span class="nav-item-number">${mod.number}</span>
        <span class="nav-item-title">${mod.title}</span>
        <span class="nav-item-check" aria-hidden="true"></span>
      </button>
    `;
  });

  nav.innerHTML = html;
}

function renderProgress() {
  const total = courseData.length;
  const done = Object.values(state.completed).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
}

function escapeAttr(s) {
  return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
}

function renderLesson() {
  const mod = courseData.find(m => m.id === state.currentModule);
  if (!mod) return;

  document.getElementById("topbar-current").textContent = `${mod.section} · ${mod.title}`;

  let html = `
    <div class="lesson-meta">
      <span class="lesson-meta-rule"></span>
      <span>${mod.section}</span>
    </div>
    <h1 class="lesson-title">${mod.title}</h1>
    ${mod.intro ? `<p class="lesson-intro">${mod.intro}</p>` : ""}
    <div class="prose">
  `;

  mod.sections.forEach((sec, i) => {
    if (sec.type === "head") {
      html += `<h2 class="section-head">${sec.num ? `<span class="head-num">Part ${sec.num}</span>` : ""}${sec.text}</h2>`;
    } else if (sec.type === "subhead") {
      html += `<h3 class="subsection">${sec.text}</h3>`;
    } else if (sec.type === "minor") {
      html += `<h4 class="minor-head">${sec.text}</h4>`;
    } else if (sec.type === "prose") {
      html += sec.html;
    } else if (sec.type === "scenario") {
      html += `<div class="scenario"><div class="scenario-label">Real-world scenario</div>${sec.html}</div>`;
    } else if (sec.type === "activity") {
      const saved = state.activities[sec.id] || "";
      const words = saved.trim() ? saved.trim().split(/\s+/).length : 0;
      html += `
        <div class="activity">
          <div class="activity-header">
            <div>
              <div class="activity-tag">Activity ${sec.id}</div>
              <div class="activity-title">${sec.title}</div>
            </div>
            <div class="activity-status">
              <span class="save-indicator ${saved ? "saved" : ""}" id="indicator-${sec.id}"></span>
              <span id="status-${sec.id}">${saved ? "Saved" : "Not started"}</span>
            </div>
          </div>
          <div class="activity-prompt">${sec.prompt}</div>
          <div class="activity-workspace">
            <div class="workspace-label">
              <span>Your workspace</span>
              <span class="word-count" id="wc-${sec.id}">${words} word${words === 1 ? "" : "s"}</span>
            </div>
            <textarea
              class="workspace-textarea"
              data-activity="${sec.id}"
              placeholder="${escapeAttr(sec.placeholder || "Start typing your answer...")}"
              oninput="handleActivityInput(this)"
            >${saved.replace(/</g, "&lt;")}</textarea>
          </div>
        </div>
      `;
    } else if (sec.type === "apply") {
      html += `<div class="apply-callout"><div class="apply-callout-label">Apply it at work this week</div>${sec.html}</div>`;
    } else if (sec.type === "selfcheck") {
      html += `<div class="selfcheck"><div class="selfcheck-label">Self-check</div>`;
      sec.questions.forEach((q, qi) => {
        const key = `${mod.id}-${qi}`;
        const checked = state.selfChecks[key] ? "checked" : "";
        html += `
          <div class="selfcheck-question ${checked}" onclick="toggleSelfCheck('${key}', this)">
            <div class="selfcheck-checkbox"></div>
            <div class="selfcheck-text">${q}</div>
          </div>
        `;
      });
      html += `</div>`;
    }
  });

  html += `</div>`;

  const isComplete = state.completed[mod.id];
  html += `
    <div class="complete-cta">
      <div class="complete-cta-text">${isComplete ? "You've marked this module complete." : "Ready to move on?"}</div>
      <button class="btn-complete ${isComplete ? "is-complete" : ""}" onclick="toggleComplete('${mod.id}')">
        ${isComplete ? "✓ Completed" : "Mark as complete"}
      </button>
    </div>
  `;

  // Prev / next
  const idx = courseData.findIndex(m => m.id === mod.id);
  const prev = courseData[idx - 1];
  const next = courseData[idx + 1];
  html += `
    <div class="lesson-nav">
      ${prev ? `<button class="nav-link" onclick="goTo('${prev.id}')">
        <div class="nav-link-label">← Previous</div>
        <div class="nav-link-title">${prev.title}</div>
      </button>` : `<button class="nav-link" disabled><div class="nav-link-label">← Previous</div><div class="nav-link-title">Start of course</div></button>`}
      ${next ? `<button class="nav-link next" onclick="goTo('${next.id}')">
        <div class="nav-link-label">Next →</div>
        <div class="nav-link-title">${next.title}</div>
      </button>` : `<button class="nav-link next" disabled><div class="nav-link-label">Next →</div><div class="nav-link-title">End of course</div></button>`}
    </div>
  `;

  document.getElementById("lesson").innerHTML = html;
  window.scrollTo({ top: 0, behavior: "instant" });
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
function goTo(id) {
  state.currentModule = id;
  saveState();
  renderNav();
  renderLesson();
  closeSidebar();
}

function toggleComplete(id) {
  state.completed[id] = !state.completed[id];
  saveState();
  renderNav();
  renderProgress();
  renderLesson();
  if (state.completed[id]) {
    showToast("Module marked complete. Onward.");
  }
}

function toggleSelfCheck(key, el) {
  state.selfChecks[key] = !state.selfChecks[key];
  el.classList.toggle("checked");
  saveState();
}

let saveTimers = {};
function handleActivityInput(textarea) {
  const id = textarea.dataset.activity;
  const value = textarea.value;
  state.activities[id] = value;

  // Update word count
  const words = value.trim() ? value.trim().split(/\s+/).length : 0;
  const wcEl = document.getElementById(`wc-${id}`);
  if (wcEl) wcEl.textContent = `${words} word${words === 1 ? "" : "s"}`;

  // Update indicator
  const indicator = document.getElementById(`indicator-${id}`);
  const status = document.getElementById(`status-${id}`);
  if (indicator) {
    indicator.classList.remove("saved");
    indicator.classList.add("saving");
  }
  if (status) status.textContent = "Saving…";

  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => {
    saveState();
    if (indicator) {
      indicator.classList.remove("saving");
      indicator.classList.add("saved");
    }
    if (status) status.textContent = value.trim() ? "Saved" : "Not started";
  }, 500);
}

function toggleTheme() {
  state.theme = state.theme === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", state.theme);
  saveState();
}

function openSidebar() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("scrim").classList.add("show");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("scrim").classList.remove("show");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}

function exportProgress() {
  const now = new Date();
  const dateStr = now.toISOString().split("T")[0];
  let md = `# Content Engineering Course — My Work\n\nExported ${now.toLocaleString()}\n\n`;

  const total = courseData.length;
  const done = Object.values(state.completed).filter(Boolean).length;
  md += `**Progress:** ${done}/${total} modules complete (${Math.round(done/total*100)}%)\n\n---\n\n`;

  courseData.forEach(mod => {
    const isDone = state.completed[mod.id];
    md += `## ${mod.section} — ${mod.title} ${isDone ? "✓" : ""}\n\n`;

    let hasContent = false;

    mod.sections.forEach(sec => {
      if (sec.type === "activity") {
        const ans = state.activities[sec.id];
        if (ans && ans.trim()) {
          hasContent = true;
          md += `### Activity ${sec.id} — ${sec.title}\n\n`;
          md += ans.trim() + "\n\n";
        }
      } else if (sec.type === "selfcheck") {
        let scAnswered = sec.questions.map((q, qi) => state.selfChecks[`${mod.id}-${qi}`]).filter(Boolean).length;
        if (scAnswered > 0) {
          hasContent = true;
          md += `### Self-check\n\n`;
          sec.questions.forEach((q, qi) => {
            const checked = state.selfChecks[`${mod.id}-${qi}`];
            md += `- ${checked ? "✓" : "○"} ${q}\n`;
          });
          md += `\n`;
        }
      }
    });

    if (!hasContent && !isDone) {
      md += `_(no work yet)_\n\n`;
    }
  });

  const blob = new Blob([md], { type: "text/markdown" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `content-engineering-work-${dateStr}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast("Your work has been downloaded.");
}

function resetProgress() {
  if (!confirm("This will erase all your progress, activity answers, and self-check marks. Are you sure?\n\nTip: Export your work first if you want a backup.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  document.documentElement.setAttribute("data-theme", state.theme);
  renderAll();
  showToast("Progress reset.");
}

function renderAll() {
  renderNav();
  renderProgress();
  renderLesson();
}

/* ============================================================
   INIT
   ============================================================ */
document.documentElement.setAttribute("data-theme", state.theme);
renderAll();

// Keyboard nav
document.addEventListener("keydown", (e) => {
  // Don't intercept when typing in textarea/input
  if (e.target.matches("textarea, input")) return;
  const idx = courseData.findIndex(m => m.id === state.currentModule);
  if (e.key === "ArrowRight" && idx < courseData.length - 1) {
    goTo(courseData[idx + 1].id);
  } else if (e.key === "ArrowLeft" && idx > 0) {
    goTo(courseData[idx - 1].id);
  }
});
</script>
