/* ============================================================
   APP STATE
   ============================================================ */
const STORAGE_KEY = "content-eng-course-v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    currentModule: "intro",
    completed: {},
    activities: {},
    selfChecks: {},
    theme: "light"
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn("Could not save state", e);
  }
}

let state = loadState();

/* ============================================================
   RENDER
   ============================================================ */
function renderNav() {
  const nav = document.getElementById("nav-list");
  let html = "";
  let currentSection = "";

  courseData.forEach((mod, idx) => {
    const sectionLabel = mod.section.startsWith("Module") ? "Modules"
                        : mod.section.startsWith("Appendix") ? "Appendices"
                        : "Start here";
    if (sectionLabel !== currentSection) {
      currentSection = sectionLabel;
      html += `<div class="nav-section-label">${sectionLabel}</div>`;
    }
    const isActive = mod.id === state.currentModule ? "active" : "";
    const isComplete = state.completed[mod.id] ? "complete" : "";
    html += `
      <button class="nav-item ${isActive} ${isComplete}" data-id="${mod.id}" onclick="goTo('${mod.id}')">
        <span class="nav-item-number">${mod.number}</span>
        <span class="nav-item-title">${mod.title}</span>
        <span class="nav-item-check" aria-hidden="true"></span>
      </button>
    `;
  });

  nav.innerHTML = html;
}

function renderProgress() {
  const total = courseData.length;
  const done = Object.values(state.completed).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
}

function escapeAttr(s) {
  return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
}

function renderLesson() {
  const mod = courseData.find(m => m.id === state.currentModule);
  if (!mod) return;

  document.getElementById("topbar-current").textContent = `${mod.section} · ${mod.title}`;

  let html = `
    <div class="lesson-meta">
      <span class="lesson-meta-rule"></span>
      <span>${mod.section}</span>
    </div>
    <h1 class="lesson-title">${mod.title}</h1>
    ${mod.intro ? `<p class="lesson-intro">${mod.intro}</p>` : ""}
    <div class="prose">
  `;

  mod.sections.forEach((sec, i) => {
    if (sec.type === "head") {
      html += `<h2 class="section-head">${sec.num ? `<span class="head-num">Part ${sec.num}</span>` : ""}${sec.text}</h2>`;
    } else if (sec.type === "subhead") {
      html += `<h3 class="subsection">${sec.text}</h3>`;
    } else if (sec.type === "minor") {
      html += `<h4 class="minor-head">${sec.text}</h4>`;
    } else if (sec.type === "prose") {
      html += sec.html;
    } else if (sec.type === "scenario") {
      html += `<div class="scenario"><div class="scenario-label">Real-world scenario</div>${sec.html}</div>`;
    } else if (sec.type === "activity") {
      const saved = state.activities[sec.id] || "";
      const words = saved.trim() ? saved.trim().split(/\s+/).length : 0;
      html += `
        <div class="activity">
          <div class="activity-header">
            <div>
              <div class="activity-tag">Activity ${sec.id}</div>
              <div class="activity-title">${sec.title}</div>
            </div>
            <div class="activity-status">
              <span class="save-indicator ${saved ? "saved" : ""}" id="indicator-${sec.id}"></span>
              <span id="status-${sec.id}">${saved ? "Saved" : "Not started"}</span>
            </div>
          </div>
          <div class="activity-prompt">${sec.prompt}</div>
          <div class="activity-workspace">
            <div class="workspace-label">
              <span>Your workspace</span>
              <span class="word-count" id="wc-${sec.id}">${words} word${words === 1 ? "" : "s"}</span>
            </div>
            <textarea
              class="workspace-textarea"
              data-activity="${sec.id}"
              placeholder="${escapeAttr(sec.placeholder || "Start typing your answer...")}"
              oninput="handleActivityInput(this)"
            >${saved.replace(/</g, "&lt;")}</textarea>
          </div>
        </div>
      `;
    } else if (sec.type === "apply") {
      html += `<div class="apply-callout"><div class="apply-callout-label">Apply it at work this week</div>${sec.html}</div>`;
    } else if (sec.type === "selfcheck") {
      html += `<div class="selfcheck"><div class="selfcheck-label">Self-check</div>`;
      sec.questions.forEach((q, qi) => {
        const key = `${mod.id}-${qi}`;
        const checked = state.selfChecks[key] ? "checked" : "";
        html += `
          <div class="selfcheck-question ${checked}" onclick="toggleSelfCheck('${key}', this)">
            <div class="selfcheck-checkbox"></div>
            <div class="selfcheck-text">${q}</div>
          </div>
        `;
      });
      html += `</div>`;
    }
  });

  html += `</div>`;

  const isComplete = state.completed[mod.id];
  html += `
    <div class="complete-cta">
      <div class="complete-cta-text">${isComplete ? "You've marked this module complete." : "Ready to move on?"}</div>
      <button class="btn-complete ${isComplete ? "is-complete" : ""}" onclick="toggleComplete('${mod.id}')">
        ${isComplete ? "✓ Completed" : "Mark as complete"}
      </button>
    </div>
  `;

  // Prev / next
  const idx = courseData.findIndex(m => m.id === mod.id);
  const prev = courseData[idx - 1];
  const next = courseData[idx + 1];
  html += `
    <div class="lesson-nav">
      ${prev ? `<button class="nav-link" onclick="goTo('${prev.id}')">
        <div class="nav-link-label">← Previous</div>
        <div class="nav-link-title">${prev.title}</div>
      </button>` : `<button class="nav-link" disabled><div class="nav-link-label">← Previous</div><div class="nav-link-title">Start of course</div></button>`}
      ${next ? `<button class="nav-link next" onclick="goTo('${next.id}')">
        <div class="nav-link-label">Next →</div>
        <div class="nav-link-title">${next.title}</div>
      </button>` : `<button class="nav-link next" disabled><div class="nav-link-label">Next →</div><div class="nav-link-title">End of course</div></button>`}
    </div>
  `;

  document.getElementById("lesson").innerHTML = html;
  window.scrollTo({ top: 0, behavior: "instant" });
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
function goTo(id) {
  state.currentModule = id;
  saveState();
  renderNav();
  renderLesson();
  closeSidebar();
}

function toggleComplete(id) {
  state.completed[id] = !state.completed[id];
  saveState();
  renderNav();
  renderProgress();
  renderLesson();
  if (state.completed[id]) {
    showToast("Module marked complete. Onward.");
  }
}

function toggleSelfCheck(key, el) {
  state.selfChecks[key] = !state.selfChecks[key];
  el.classList.toggle("checked");
  saveState();
}

let saveTimers = {};
function handleActivityInput(textarea) {
  const id = textarea.dataset.activity;
  const value = textarea.value;
  state.activities[id] = value;

  // Update word count
  const words = value.trim() ? value.trim().split(/\s+/).length : 0;
  const wcEl = document.getElementById(`wc-${id}`);
  if (wcEl) wcEl.textContent = `${words} word${words === 1 ? "" : "s"}`;

  // Update indicator
  const indicator = document.getElementById(`indicator-${id}`);
  const status = document.getElementById(`status-${id}`);
  if (indicator) {
    indicator.classList.remove("saved");
    indicator.classList.add("saving");
  }
  if (status) status.textContent = "Saving…";

  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => {
    saveState();
    if (indicator) {
      indicator.classList.remove("saving");
      indicator.classList.add("saved");
    }
    if (status) status.textContent = value.trim() ? "Saved" : "Not started";
  }, 500);
}

function toggleTheme() {
  state.theme = state.theme === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", state.theme);
  saveState();
}

function openSidebar() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("scrim").classList.add("show");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("scrim").classList.remove("show");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}

function exportProgress() {
  const now = new Date();
  const dateStr = now.toISOString().split("T")[0];
  let md = `# Content Engineering Course — My Work\n\nExported ${now.toLocaleString()}\n\n`;

  const total = courseData.length;
  const done = Object.values(state.completed).filter(Boolean).length;
  md += `**Progress:** ${done}/${total} modules complete (${Math.round(done/total*100)}%)\n\n---\n\n`;

  courseData.forEach(mod => {
    const isDone = state.completed[mod.id];
    md += `## ${mod.section} — ${mod.title} ${isDone ? "✓" : ""}\n\n`;

    let hasContent = false;

    mod.sections.forEach(sec => {
      if (sec.type === "activity") {
        const ans = state.activities[sec.id];
        if (ans && ans.trim()) {
          hasContent = true;
          md += `### Activity ${sec.id} — ${sec.title}\n\n`;
          md += ans.trim() + "\n\n";
        }
      } else if (sec.type === "selfcheck") {
        let scAnswered = sec.questions.map((q, qi) => state.selfChecks[`${mod.id}-${qi}`]).filter(Boolean).length;
        if (scAnswered > 0) {
          hasContent = true;
          md += `### Self-check\n\n`;
          sec.questions.forEach((q, qi) => {
            const checked = state.selfChecks[`${mod.id}-${qi}`];
            md += `- ${checked ? "✓" : "○"} ${q}\n`;
          });
          md += `\n`;
        }
      }
    });

    if (!hasContent && !isDone) {
      md += `_(no work yet)_\n\n`;
    }
  });

  const blob = new Blob([md], { type: "text/markdown" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `content-engineering-work-${dateStr}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast("Your work has been downloaded.");
}

function resetProgress() {
  if (!confirm("This will erase all your progress, activity answers, and self-check marks. Are you sure?\n\nTip: Export your work first if you want a backup.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  document.documentElement.setAttribute("data-theme", state.theme);
  renderAll();
  showToast("Progress reset.");
}

function renderAll() {
  renderNav();
  renderProgress();
  renderLesson();
}

/* ============================================================
   INIT
   ============================================================ */
document.documentElement.setAttribute("data-theme", state.theme);
renderAll();

// Keyboard nav
document.addEventListener("keydown", (e) => {
  // Don't intercept when typing in textarea/input
  if (e.target.matches("textarea, input")) return;
  const idx = courseData.findIndex(m => m.id === state.currentModule);
  if (e.key === "ArrowRight" && idx < courseData.length - 1) {
    goTo(courseData[idx + 1].id);
  } else if (e.key === "ArrowLeft" && idx > 0) {
    goTo(courseData[idx - 1].id);
  }
});
</script>
