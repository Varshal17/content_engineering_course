<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Content Engineering — An Interactive Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4EFE6;
    --bg-elevated: #FDFAF3;
    --bg-sidebar: #EDE6D6;
    --ink: #1C1917;
    --ink-soft: #57534E;
    --ink-faint: #A8A29E;
    --accent: #9F1239;
    --accent-hover: #881337;
    --accent-soft: #FECDD3;
    --rule: #DDD3BD;
    --rule-soft: #E7E1D4;
    --complete: #15803D;
    --code-bg: #2A2724;
    --code-ink: #F4EFE6;
    --highlight: #FEF3C7;
    --shadow-soft: 0 1px 2px rgba(28,25,23,.04), 0 4px 16px rgba(28,25,23,.06);
    --shadow-strong: 0 4px 16px rgba(28,25,23,.08), 0 12px 32px rgba(28,25,23,.10);

    --font-display: "Fraunces", "Iowan Old Style", "Palatino", "Baskerville", Georgia, serif;
    --font-body: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", "SF Mono", Consolas, ui-monospace, monospace;

    --sidebar-w: 320px;
    --content-w: 720px;
    --ease: cubic-bezier(.4, 0, .2, 1);
  }

  [data-theme="dark"] {
    --bg: #1A1817;
    --bg-elevated: #242220;
    --bg-sidebar: #14110F;
    --ink: #F4EFE6;
    --ink-soft: #C7B299;
    --ink-faint: #78706A;
    --accent: #FB7185;
    --accent-hover: #F472B6;
    --accent-soft: #4C1D2F;
    --rule: #3A3530;
    --rule-soft: #2A2724;
    --complete: #4ADE80;
    --code-bg: #0E0C0B;
    --code-ink: #F4EFE6;
    --highlight: #44340A;
    --shadow-soft: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
    --shadow-strong: 0 4px 16px rgba(0,0,0,.5), 0 12px 32px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color .3s var(--ease), color .3s var(--ease);
  }

  ::selection { background: var(--accent); color: var(--bg); }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--rule);
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
    padding: 28px 0;
    transition: transform .3s var(--ease);
  }

  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  .brand {
    padding: 0 28px 24px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 20px;
  }

  .brand-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .brand-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 22px;
    line-height: 1.15;
    letter-spacing: -.01em;
    color: var(--ink);
    font-style: italic;
  }

  .brand-title em {
    font-style: normal;
    font-weight: 600;
  }

  .progress-summary {
    padding: 0 28px 20px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 20px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .progress-label-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  .progress-label-pct {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 20px;
    color: var(--accent);
    font-feature-settings: "tnum";
  }

  .progress-track {
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width .5s var(--ease);
    border-radius: 2px;
  }

  .nav-section {
    margin-bottom: 8px;
  }

  .nav-section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 8px 28px;
    font-weight: 500;
  }

  .nav-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 28px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.4;
    transition: background .15s var(--ease), color .15s var(--ease);
    position: relative;
  }

  .nav-item:hover {
    background: var(--bg-elevated);
    color: var(--ink);
  }

  .nav-item.active {
    background: var(--bg-elevated);
    color: var(--ink);
  }

  .nav-item.active::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .nav-item-number {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    min-width: 24px;
    padding-top: 2px;
    font-feature-settings: "tnum";
  }

  .nav-item-title {
    flex: 1;
    padding-right: 8px;
  }

  .nav-item-check {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--rule);
    flex-shrink: 0;
    margin-top: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s var(--ease);
  }

  .nav-item.complete .nav-item-check {
    background: var(--complete);
    border-color: var(--complete);
  }

  .nav-item.complete .nav-item-check::after {
    content: "";
    width: 4px;
    height: 7px;
    border: solid white;
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg) translateY(-1px);
  }

  .nav-item.complete .nav-item-title {
    color: var(--ink-faint);
  }

  .sidebar-footer {
    padding: 20px 28px;
    border-top: 1px solid var(--rule);
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .util-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 12px;
    transition: all .15s var(--ease);
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .util-btn:hover {
    background: var(--bg-elevated);
    color: var(--ink);
    border-color: var(--ink-soft);
  }

  /* Main */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar {
    height: 60px;
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .topbar-left {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .topbar-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s var(--ease);
  }

  .icon-btn:hover {
    background: var(--bg-elevated);
    color: var(--ink);
    border-color: var(--ink-soft);
  }

  .menu-btn { display: none; }

  /* Lesson */
  .lesson-container {
    flex: 1;
    padding: 56px 48px 80px;
    max-width: 100%;
    overflow-x: hidden;
  }

  .lesson {
    max-width: var(--content-w);
    margin: 0 auto;
    animation: fadeUp .5s var(--ease);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lesson-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .lesson-meta-rule {
    height: 1px;
    width: 32px;
    background: var(--accent);
  }

  h1.lesson-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.05;
    letter-spacing: -.02em;
    color: var(--ink);
    margin-bottom: 24px;
    font-feature-settings: "ss01";
  }

  .lesson-title em {
    font-style: italic;
    color: var(--accent);
  }

  .lesson-intro {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 1.45;
    color: var(--ink-soft);
    font-weight: 300;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
    font-style: italic;
  }

  h2.section-head {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -.01em;
    line-height: 1.2;
    color: var(--ink);
    margin: 48px 0 20px;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
    position: relative;
  }

  h2.section-head:first-child {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }

  h2.section-head .head-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: .1em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
  }

  h3.subsection {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    margin: 32px 0 14px;
    line-height: 1.3;
    letter-spacing: -.005em;
  }

  h4.minor-head {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 28px 0 12px;
  }

  .prose p {
    font-size: 17px;
    line-height: 1.65;
    margin-bottom: 18px;
    color: var(--ink);
  }

  .prose p.lead {
    font-size: 19px;
    color: var(--ink-soft);
  }

  .prose strong { font-weight: 600; color: var(--ink); }
  .prose em { font-style: italic; }

  .prose ul, .prose ol {
    margin: 8px 0 24px 0;
    padding-left: 0;
    list-style: none;
  }

  .prose ul li, .prose ol li {
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 12px;
    padding-left: 28px;
    position: relative;
  }

  .prose ul li::before {
    content: "—";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 500;
  }

  .prose ol {
    counter-reset: ol-counter;
  }

  .prose ol li {
    counter-increment: ol-counter;
  }

  .prose ol li::before {
    content: counter(ol-counter, decimal-leading-zero);
    position: absolute;
    left: 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    top: 2px;
  }

  .prose a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    transition: color .15s var(--ease);
  }

  .prose a:hover { color: var(--accent-hover); }

  .prose code {
    font-family: var(--font-mono);
    font-size: .88em;
    background: var(--rule-soft);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--ink);
    font-weight: 500;
  }

  .prose pre {
    background: var(--code-bg);
    color: var(--code-ink);
    border-radius: 8px;
    padding: 20px 24px;
    overflow-x: auto;
    margin: 20px 0;
    font-size: 14px;
    line-height: 1.6;
    border: 1px solid var(--rule);
    box-shadow: var(--shadow-soft);
  }

  .prose pre code {
    background: transparent;
    padding: 0;
    color: inherit;
    font-size: inherit;
    font-weight: 400;
  }

  .prose blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 24px;
    margin: 24px 0;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink-soft);
  }

  .prose blockquote p {
    margin-bottom: 12px;
    font-size: inherit;
    color: inherit;
  }

  .prose blockquote p:last-child { margin-bottom: 0; }

  .prose table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 14px;
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }

  .prose th {
    text-align: left;
    padding: 12px 16px 12px 0;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--accent);
    font-weight: 500;
    border-bottom: 1px solid var(--rule);
  }

  .prose td {
    padding: 14px 16px 14px 0;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
    line-height: 1.5;
  }

  .prose tr:last-child td { border-bottom: none; }

  /* Scenario callout */
  .scenario {
    background: var(--bg-elevated);
    border-left: 3px solid var(--accent);
    padding: 28px 32px;
    margin: 24px 0;
    border-radius: 0 8px 8px 0;
    position: relative;
  }

  .scenario-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scenario-label::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .scenario p {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .scenario p:last-child { margin-bottom: 0; }

  /* Activity */
  .activity {
    background: var(--bg-elevated);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 32px;
    margin: 32px 0;
    box-shadow: var(--shadow-soft);
  }

  .activity-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
  }

  .activity-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .activity-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ink);
  }

  .activity-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    flex-shrink: 0;
    padding-top: 8px;
    letter-spacing: .05em;
  }

  .save-indicator {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
    transition: background .3s var(--ease);
  }

  .save-indicator.saved {
    background: var(--complete);
  }

  .save-indicator.saving {
    background: var(--accent);
    animation: pulse 1s var(--ease) infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  .activity-prompt {
    margin-bottom: 20px;
  }

  .activity-prompt p,
  .activity-prompt ul,
  .activity-prompt ol {
    color: var(--ink);
  }

  .activity-workspace {
    margin-top: 20px;
  }

  .workspace-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .word-count {
    color: var(--ink-faint);
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .workspace-textarea {
    width: 100%;
    min-height: 200px;
    padding: 16px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    transition: border-color .15s var(--ease);
  }

  .workspace-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .workspace-textarea::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  /* Self-check */
  .selfcheck {
    background: var(--bg-elevated);
    border: 1px dashed var(--rule);
    border-radius: 10px;
    padding: 28px 32px;
    margin: 32px 0;
  }

  .selfcheck-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
  }

  .selfcheck-question {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
  }

  .selfcheck-question:last-child { border-bottom: none; }

  .selfcheck-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s var(--ease);
  }

  .selfcheck-question.checked .selfcheck-checkbox {
    background: var(--complete);
    border-color: var(--complete);
  }

  .selfcheck-question.checked .selfcheck-checkbox::after {
    content: "";
    width: 5px;
    height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translateY(-1px);
  }

  .selfcheck-question.checked .selfcheck-text {
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--ink-faint);
  }

  .selfcheck-text {
    font-size: 16px;
    color: var(--ink);
    line-height: 1.5;
    transition: color .15s var(--ease);
  }

  /* Apply callout */
  .apply-callout {
    background: linear-gradient(180deg, var(--bg-elevated) 0%, transparent 100%);
    border-top: 1px solid var(--accent);
    padding: 24px 0 0 0;
    margin: 32px 0;
  }

  .apply-callout-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .apply-callout p {
    font-family: var(--font-display);
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink);
    font-style: italic;
  }

  /* Complete CTA */
  .complete-cta {
    margin: 64px 0 24px;
    padding: 32px;
    border: 1px solid var(--rule);
    border-radius: 10px;
    background: var(--bg-elevated);
    text-align: center;
  }

  .complete-cta-text {
    font-family: var(--font-display);

const courseData = [
  {
    id: "intro",
    section: "Getting started",

    title: "Welcome to the course",
    intro: "A short orientation before you begin — what's in here, how it works, and how to get the most out of it.",

      { type: "prose", html: `<p class="lead">Content designers, UX writers, and content strategists who want to move into a content engineering role — or who want to bring engineering-grade rigor to the content they already produce.</p>` },

      { type: "head", text: "What you'll have at the end" },

        <li><strong>Your progress saves automatically</strong> in your browser. Close the tab and come back whenever you want.</li>

  {
    id: "m1",
    section: "Module 1",
    number: "01",
    title: "What Content Engineering Actually Is",
    intro: "Content designers think about the words on a screen. Content engineers think about the systems that produce, store, and deliver those words to any screen, any device, any AI, any language, at any scale.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>A content designer asks: <em>"What should this button say?"</em></p>
        <p>A content engineer asks: <em>"How is button-label content modeled, where does it live, how is it versioned, how is it translated, how is it served, and how does a designer change it without a developer's help?"</em></p>
        <p>Both roles care about the user. The engineer's user is broader: the writer, the translator, the developer, the AI model, and ultimately the reader.</p>` },

      { type: "head", text: "Concepts to learn", num: "II" },
      { type: "prose", html: `<ul>
        <li><strong>Content as data, not pages.</strong> A product description isn't a paragraph on a page — it's a structured record with a name, price, features list, an image reference, and a locale. The page is one of many possible renderings.</li>
        <li><strong>Separation of content and presentation.</strong> The same content record can render as a webpage, an email, a voice assistant reply, an Apple Watch notification, or an LLM context chunk.</li>
        <li><strong>Single source of truth.</strong> Every piece of content should live in exactly one place and flow outward to every channel.</li>
        <li><strong>Authoring experience (AX).</strong> Engineers care about the experience of the people creating content as much as designers care about the experience of the people consuming it.</li>
      </ul>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Your company sells software. The marketing site has a "Pricing" page. The mobile app has a paywall screen. The sales team has a PDF. The chatbot quotes prices. Each was written separately. Last week, pricing changed. Three of the four surfaces still show old prices. The CFO is furious.</p>
        <p><strong>The content designer's instinct:</strong> rewrite each surface.</p>
        <p><strong>The content engineer's instinct:</strong> ask why these four surfaces aren't reading from the same source, and propose an architecture where pricing lives in one place and updates everywhere.</p>` },

      { type: "activity", id: "1.1", title: "The 'where does it live' audit", prompt: `<p>Pick any product or company you know well (your employer is ideal). List 5 pieces of content that appear in more than one place — for example, a product name, a tagline, a feature description, an error message, a legal disclaimer.</p>
        <p>For each, fill in this table:</p>
        <table>
          <thead><tr><th>Content</th><th>Surface 1</th><th>Surface 2</th><th>Surface 3</th><th>Single source?</th><th>Who updates?</th></tr></thead>
          <tbody><tr><td>Product tagline</td><td>Homepage</td><td>App store</td><td>Sales deck</td><td>No</td><td>Different teams</td></tr></tbody>
        </table>
        <p>You'll almost certainly find that "single source?" is "No" for most rows. Save this — it's the seed of every conversation you'll have as a content engineer.</p>`,
        placeholder: "Start with: Company / product I'm auditing —\n\n1. [content piece] appears on [surfaces]. Single source: ...\n2. ..." },

      { type: "apply", html: `<p>In your next content review meeting, when someone asks for a copy change, ask: <em>"Where else does this string appear, and how will those places stay in sync?"</em> You will be the only person in the room asking that question. It is the engineering mindset in one sentence.</p>` },

      { type: "selfcheck", questions: [
        "Can you explain the difference between 'content' and 'a page' to a non-technical colleague?",
        "Can you name three surfaces in your product that probably contain duplicated content?"
      ]}
    ]
  },

  {
    id: "m2",
    section: "Module 2",
    number: "02",
    title: "Structured Content Fundamentals",
    intro: "You stop writing documents and start writing records.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>A document is "About Us — a 400-word paragraph."</p>
        <p>A record is <code>{ companyName, foundedYear, mission, headquartersCity, teamSize, ceoQuote }</code> — fields with types and rules, which a template assembles into the About Us page, the press kit, the LinkedIn bio, and the chatbot's company FAQ.</p>` },

      { type: "head", text: "Concepts", num: "II" },
      { type: "prose", html: `<p><strong>Unstructured content</strong> is a blob — a Word document, a Google Doc, a body of HTML. A computer can display it but can't reason about it.</p>
        <p><strong>Semi-structured content</strong> has some shape — Markdown with frontmatter, a doc with consistent headings.</p>
        <p><strong>Structured content</strong> has a defined schema — every record of a type has the same fields, each field has a type (string, number, image, reference, date), and the system can validate, query, and transform it.</p>` },

      { type: "minor", text: "The key vocabulary" },
      { type: "prose", html: `<ul>
        <li><strong>Content type</strong> — a category of content (Article, Author, Product, Event). Sometimes called a "model."</li>
        <li><strong>Field</strong> — a property of a content type (title, body, author, publishedAt).</li>
        <li><strong>Type</strong> — what kind of value a field accepts (short text, long text, integer, boolean, reference, image, datetime).</li>
        <li><strong>Validation</strong> — rules a field's value must follow (max 60 characters, must be unique, must match an email pattern).</li>
        <li><strong>Reference</strong> — a pointer from one record to another (an Article <em>references</em> an Author).</li>
        <li><strong>Entry / record / item</strong> — a single instance of a content type (the article "How we built our search").</li>
      </ul>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Your team wants to launch a Help Center. The PM says "let's just dump articles into a CMS." You, the new content engineer, raise your hand.</p>
        <p>Articles need: a title (short, max 80 chars), a slug (URL-safe, unique), an excerpt (max 160 chars, used in search results and meta description), a body, a primary category, optional sub-tags, a related-articles reference (up to 4), an author reference, a "last reviewed" date (auto-prompts re-review after 6 months), a status (draft / in-review / published / needs-update), and a difficulty level (beginner / intermediate / advanced — drives icon and filtering).</p>
        <p>What looked like "just articles" is actually a content type with 10+ fields, three references, two enums, and validation rules. <strong>That's the engineering work.</strong> Without it, writers will produce inconsistent content, search will be bad, related articles will be picked manually (and badly), and "last reviewed" will be a comment in someone's notes.</p>` },

      { type: "activity", id: "2.1", title: "Model a content type from scratch", prompt: `<p>Take one content type from your real product. Examples:</p>
        <ul>
          <li>A product page on an ecommerce site</li>
          <li>A job listing on a careers page</li>
          <li>A recipe on a cooking app</li>
          <li>A property listing on a real estate site</li>
        </ul>
        <p>Write out the full content model. Use this template:</p>
        <pre><code>CONTENT TYPE: [name]
PURPOSE: [one sentence — what is this and where does it appear]

FIELDS:
- fieldName (type, required/optional, validation, notes)
- ...

REFERENCES:
- ...

DERIVED / AUTOMATED FIELDS:
- (e.g., slug auto-generated from title; "last updated" set by system)

LIFECYCLE:
- (states this content can be in: draft → review → published → archived)</code></pre>
        <p>Aim for at least 12 fields. If you can't find 12, you're probably leaving content design responsibilities on the floor. Real example fields people forget: SEO title separate from display title, social-share image separate from hero image, "show in navigation" toggle, valid-from / valid-until dates, locale, content owner.</p>`,
        placeholder: "CONTENT TYPE: \nPURPOSE: \n\nFIELDS:\n- \n- \n- \n\nREFERENCES:\n- \n\nDERIVED FIELDS:\n- \n\nLIFECYCLE:\n- " },

      { type: "apply", html: `<p>Find one piece of content that currently lives as a Google Doc or a Figma annotation in your team. Sketch its structured model. Even if you never move it into a CMS, having the model on paper will change how you brief writers and how you spec out work for engineers.</p>` },

      { type: "selfcheck", questions: [
        "Without looking, list the difference between a field's type and its validation.",
        "Why is 'author' usually a reference and not a text field?"
      ]}
    ]
  },

  {
    id: "m3",
    section: "Module 3",
    number: "03",
    title: "Content Modeling Like an Architect",
    intro: "A bad content model is the original sin of a content system. It's also the most common one. You're going to be the person who fixes it.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>Most content systems are designed by developers who don't think about content, or by content people who don't think about systems. You're going to be the person who can do both.</p>` },

      { type: "head", text: "Three principles of good content modeling", num: "II" },
      { type: "prose", html: `<ol>
        <li><strong>Reflect the domain, not the page.</strong> Don't make a "Homepage" content type with 40 fields. Make a "HeroBlock," a "FeatureGrid," a "Testimonial," a "Product." Compose pages from these blocks. The same Testimonial then appears on the homepage, the pricing page, and an email.</li>
        <li><strong>Atomic, then composed.</strong> Model the smallest meaningful unit (an Author, an Image-with-credit, an Address). Compose larger types from those atoms (an Article references an Author; a Location uses an Address). This is <strong>content componentization</strong> — the equivalent of design system components.</li>
        <li><strong>Plan for variants and exceptions early.</strong> The most painful refactors are when you modeled "Product" and then someone adds "Bundle." Or "Article" and then someone needs "Video Article." Ask: what are all the variants of this content that might exist in 18 months?</li>
      </ol>` },

      { type: "minor", text: "Common modeling mistakes" },
      { type: "prose", html: `<ul>
        <li><strong>The God Type:</strong> one content type with 80 fields, half of which are blank on any given entry. ("Page" types are usually this.)</li>
        <li><strong>Flat structure with no references:</strong> the same author name typed manually on 200 articles. Author changes their byline preference — you update 200 records.</li>
        <li><strong>Coupling content to layout:</strong> a field called <code>leftColumnText</code> and another called <code>rightColumnText</code>. The day you redesign, you have to migrate every record.</li>
        <li><strong>No locale awareness:</strong> modeling everything assuming English, then bolting on localization later. It's always painful.</li>
      </ul>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Your company runs a SaaS product with a marketing site. There's a section called "Customer Stories" — case studies of customers using the product. Today, each case study is a long doc with embedded quotes, an embedded logo, and metrics ("3x faster," "$1M saved").</p>
        <p>Marketing wants to do four things: (1) display case studies as a grid on a new page, (2) pull the top quote from each into a homepage carousel, (3) generate a sales-friendly one-pager PDF per case study, (4) feed the metrics into a "social proof" component on the pricing page.</p>
        <p>If a case study is one unstructured doc, none of this is possible without manual copy-paste. If a case study is modeled with Customer (referenced), Quote (with attribution), Metrics (array of <code>{label, value, unit}</code>), Hero Image, Industry tag, and Body — all four use cases become trivial template work.</p>` },

      { type: "activity", id: "3.1", title: "Refactor a real content type", prompt: `<p>Take the content type you modeled in Activity 2.1. Now refactor it using the three principles:</p>
        <ol>
          <li><strong>Decompose.</strong> Identify any field that is actually a structured sub-thing. ("Author" → reference to Author. "Address" → reference to Address. "Pricing tier" → reference to PricingPlan.)</li>
          <li><strong>Identify atoms.</strong> What sub-types did you find that other content types in your product might also use?</li>
          <li><strong>Plan variants.</strong> Write down 2–3 plausible future variants. For each, decide: is this a new content type, or is it the same type with a <code>variant</code> field, or is it the same type with optional fields?</li>
        </ol>
        <p>Draw the resulting model as a diagram. Boxes for content types. Arrows for references. Label the arrows with cardinality (one-to-one, one-to-many).</p>`,
        placeholder: "Starting content type: ...\n\nDecomposed fields:\n- ...\n\nAtoms I extracted:\n- ...\n\nPlausible variants:\n- ..." },

      { type: "activity", id: "3.2", title: "The 'page is a composition' exercise", prompt: `<p>Take any single page on your product or marketing site. Break it down into reusable blocks. Example for a homepage:</p>
        <ul>
          <li>1 HeroBlock (heading, sub-heading, primary CTA, secondary CTA, background image)</li>
          <li>1 LogoBar (array of references to Customer)</li>
          <li>1 FeatureGrid (array of references to Feature)</li>
          <li>1 TestimonialCarousel (array of references to Testimonial)</li>
          <li>1 CTABanner (heading, body, CTA)</li>
        </ul>
        <p>Now imagine the marketing pricing page. How many of those same blocks does it reuse? This is the leverage of a good model: the page becomes a <em>playlist</em> of blocks, and the content stays put.</p>`,
        placeholder: "Page I'm breaking down: ...\n\nBlocks:\n1. ...\n2. ...\n\nReused on which other pages:\n- ..." },

      { type: "apply", html: `<p>Next time someone hands you a Figma design and says "we need copy for this page," ask the designer: <em>which of these elements appear on other pages, and should they share a source?</em> You'll start spotting unstructured-content debt everywhere.</p>` },

      { type: "selfcheck", questions: [
        "What is the difference between a content type and a page?",
        "Why is referencing Authors better than typing names into a string field?"
      ]}
    ]
  },

  {
    id: "m4",
    section: "Module 4",
    number: "04",
    title: "APIs and How Content Flows",
    intro: "Until now, 'content goes on a page' was a black box. Now you'll open it. APIs are how content moves between systems — and if you can read an API response, you can talk to engineers as a peer.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>Content moves through APIs. APIs are how the CMS hands content to the website, the mobile app, the chatbot, and the export script. If you can read an API response, you can talk to engineers as a peer.</p>` },

      { type: "head", text: "Concepts", num: "II" },
      { type: "prose", html: `<p><strong>An API</strong> is a way for one program to ask another for something. The most common kind for content is an HTTP API — your browser is already using dozens right now.</p>` },

      { type: "minor", text: "The mental model" },
      { type: "prose", html: `<ul>
        <li>The CMS holds content (a database, more or less).</li>
        <li>A program (the website, an app, a script) sends a <strong>request</strong> to the CMS's API: "give me article with slug <code>how-to-bake-bread</code>."</li>
        <li>The API sends back a <strong>response</strong> — usually as <strong>JSON</strong>, which is just structured text.</li>
        <li>The program reads the JSON and renders the page.</li>
      </ul>` },

      { type: "minor", text: "JSON in 60 seconds" },
      { type: "prose", html: `<pre><code>{
  "title": "How to Bake Bread",
  "slug": "how-to-bake-bread",
  "publishedAt": "2025-09-14",
  "author": {
    "name": "Mira Kapoor",
    "role": "Senior Editor"
  },
  "tags": ["bread", "baking", "beginner"],
  "body": "Bread is..."
}</code></pre>
        <p>That's it. Curly braces are objects (records). Square brackets are arrays (lists). Keys are field names. Values are strings, numbers, booleans, objects, arrays, or <code>null</code>. The whole web runs on this.</p>` },

      { type: "minor", text: "REST vs GraphQL — the one-sentence version" },
      { type: "prose", html: `<ul>
        <li><strong>REST:</strong> you go to a URL like <code>/articles/how-to-bake-bread</code> and the API gives you a fixed JSON shape for that resource.</li>
        <li><strong>GraphQL:</strong> you go to a single URL and <em>send a query</em> that says "give me exactly these fields and no others." More flexible, slightly steeper learning curve.</li>
      </ul>
      <p>Most modern headless CMSes give you both.</p>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>A developer Slacks you: "Hey, on the mobile app the article excerpt is showing the first 160 characters of the body when there's no excerpt field. Can you write fallback excerpts for the 300 articles that don't have one?"</p>
        <p><strong>Old you:</strong> "Sure, send me a list." Three weeks of writing.</p>
        <p><strong>New you:</strong> "Let's look at the API response. If <code>excerpt</code> is <code>null</code>, we can either (a) generate one from the first paragraph at render time, (b) have the CMS auto-fill it on save, or (c) require excerpts for new articles and backfill the 300 in a sprint. What's the tradeoff between editorial control and engineering cost?"</p>
        <p>You just turned a copywriting task into a content engineering decision. That's the role.</p>` },

      { type: "activity", id: "4.1", title: "Read a real API response", prompt: `<p>Open a terminal (Mac: Terminal app; Windows: PowerShell). Type this command exactly and press Enter:</p>
        <pre><code>curl https://jsonplaceholder.typicode.com/posts/1</code></pre>
        <p>You'll see a JSON response come back. That's a real HTTP API call. Now try:</p>
        <pre><code>curl https://jsonplaceholder.typicode.com/users/1</code></pre>
        <p>Look at the shape. Note the <code>address.geo.lat</code> — that's an object inside an object. Note that <code>id</code> is a number, not a string. This is the world that engineers live in. You now live in it too.</p>
        <p>Paste what you see into the workspace below, and note what surprised you.</p>`,
        placeholder: "API response I got:\n\n```json\n...\n```\n\nWhat I noticed / what surprised me:\n- " },

      { type: "activity", id: "4.2", title: "Trace a piece of content end-to-end", prompt: `<p>Pick any text on your company's homepage. Open browser DevTools (right-click → Inspect → Network tab → refresh the page). Look for requests that return JSON. Find the one containing your text. You've just traced a piece of content from CMS → API → browser → screen.</p>
        <p>If your company's site is fully static (no API at runtime), check the GitHub repo or content folder instead. The principle is the same: content lives somewhere structured, and a build step turns it into HTML.</p>`,
        placeholder: "Text I picked: ...\nWhere I found it in the network tab: ...\nWhat the JSON looked like: ..." },

      { type: "activity", id: "4.3", title: "Sketch the data shape for your content type", prompt: `<p>Take the content type you modeled in Module 3. Write what its API response would look like as JSON. Don't worry about syntax errors — focus on the shape:</p>
        <pre><code>{
  "id": "...",
  "title": "...",
  "author": { "id": "...", "name": "..." },
  ...
}</code></pre>
        <p>This is now a contract you can hand to a developer.</p>`,
        placeholder: "{\n  \"id\": \"\",\n  \"\": \"\",\n  \"\": {\n    \"\": \"\"\n  }\n}" },

      { type: "apply", html: `<p>The next time a developer mentions "the API," don't nod and change the subject. Ask: "Can you show me the JSON?" Look at it together. It will not be scary.</p>` },

      { type: "selfcheck", questions: [
        "What's the difference between a request and a response?",
        "If a field is null in a JSON response, what does that mean for rendering?"
      ]}
    ]
  },

  {
    id: "m5",
    section: "Module 5",
    number: "05",
    title: "Headless CMS in Practice",
    intro: "A traditional CMS couples content to a website. A headless CMS stores content and hands it out via API, leaving 'what to do with it' to whatever consumes the API. This is the architecture nearly all modern content engineering work happens in.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>WordPress and classic Drupal are traditional CMSes. They couple content tightly to a website's templates. Headless CMSes (Sanity, Contentful, Storyblok, Strapi, Prismic, Payload, Hygraph) decouple them. Content lives in the CMS, and any front-end can consume it.</p>` },

      { type: "head", text: "Concepts", num: "II" },
      { type: "minor", text: "Popular headless CMSes to recognize" },
      { type: "prose", html: `<ul>
        <li><strong>Sanity</strong> — schema-as-code, highly flexible, great developer experience, free tier generous.</li>
        <li><strong>Contentful</strong> — enterprise standard, GUI model builder, robust ecosystem.</li>
        <li><strong>Storyblok</strong> — visual editor, popular with marketing teams.</li>
        <li><strong>Strapi</strong> — open source, self-hostable.</li>
        <li><strong>Prismic</strong> — slice-based modeling, good for marketing sites.</li>
        <li><strong>Payload</strong> — newer, open source, code-first, gaining momentum.</li>
        <li><strong>Hygraph (formerly GraphCMS)</strong> — GraphQL-first.</li>
      </ul>
      <p>You don't need to know all of them. You need to know one deeply and be conversant about the rest.</p>` },

      { type: "minor", text: "The general pattern across all of them" },
      { type: "prose", html: `<ol>
        <li>You define <strong>content models</strong> (schemas) — either through a GUI or as code.</li>
        <li>Editors fill in content through an <strong>editing interface</strong>.</li>
        <li>The CMS exposes a <strong>REST and/or GraphQL API</strong>.</li>
        <li>Front-ends (web, mobile, etc.) <strong>fetch from the API</strong> and render.</li>
        <li>Optional: <strong>webhooks</strong> trigger builds, notifications, or sync to other systems when content changes.</li>
      </ol>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Your team is launching a podcast. The PM says "we'll just use a podcast hosting site and embed it on the marketing page." You ask: where will the show notes live? Where will the guest profiles live? When we want to feature a quote from an episode on the homepage, where does that quote come from? When we launch the iOS app next quarter, how do those show notes get there?</p>
        <p>The answer is: model Episode, Guest, and Quote in your headless CMS. Hosting can stay external (podcast hosts handle the audio file). But the <strong>content of the podcast as a content product</strong> lives in the CMS. From there, it flows to the web, the app, the email newsletter, and anywhere else.</p>
        <p>You've reframed "a podcast" from an audio file to a content type. That's content engineering.</p>` },

      { type: "activity", id: "5.1", title: "Build your first content model in a real CMS", prompt: `<p><strong>This is the most important activity in the course. Do not skip it.</strong></p>
        <ol>
          <li>Go to <a href="https://www.sanity.io" target="_blank">sanity.io</a> and sign up (free).</li>
          <li>Create a new project. Choose the "Blog" starter or "Clean project" — either works.</li>
          <li>Open the schema files in your code editor (or browse the schema in the dashboard). Look at how an Author or Post is defined.</li>
          <li>Now add a new content type yourself: <strong>Episode</strong> (for a podcast). It needs:
            <ul>
              <li><code>title</code> (string, required)</li>
              <li><code>episodeNumber</code> (number, required, must be positive)</li>
              <li><code>publishedAt</code> (datetime)</li>
              <li><code>duration</code> (number, in seconds)</li>
              <li><code>host</code> (reference to Author)</li>
              <li><code>guests</code> (array of references to Person — a new type you'll create)</li>
              <li><code>showNotes</code> (rich text / portable text)</li>
              <li><code>audioUrl</code> (URL string)</li>
              <li><code>featured</code> (boolean, default false)</li>
            </ul>
          </li>
          <li>Create the <code>Person</code> type too: <code>name</code>, <code>bio</code>, <code>photo</code> (image), <code>socialLinks</code> (array of <code>{platform, url}</code>).</li>
          <li>Add at least 2 sample episodes through the editing interface.</li>
          <li>Open the API playground (Sanity calls it "Vision"). Run a query to fetch all episodes. Then run a query to fetch only featured episodes.</li>
        </ol>
        <p>If you can do this, you have done the work of an entry-level content engineer.</p>`,
        placeholder: "My Sanity project URL: ...\n\nWhat tripped me up:\n- \n\nThe GROQ queries I wrote:\n```\n*[_type == 'episode']\n```\n\nHow long this took me: ...\n\nReflections:\n- " },

      { type: "activity", id: "5.2", title: "Compare authoring experience", prompt: `<p>Open the editing interface for one of your episodes. Ask yourself, from the perspective of a non-technical writer:</p>
        <ul>
          <li>Are the field labels clear? Or do they say <code>audioUrl</code> instead of "Audio file URL"?</li>
          <li>Are there helper texts on confusing fields?</li>
          <li>Is required vs optional obvious?</li>
          <li>If a field needs a specific format, is there guidance?</li>
        </ul>
        <p>Now go fix three things to make the authoring experience better. This is <strong>AX work</strong> — a real and underrated part of the content engineer's job. Editors are users too.</p>`,
        placeholder: "AX problems I spotted:\n1. \n2. \n3. \n\nWhat I changed:\n1. \n2. \n3. " },

      { type: "apply", html: `<p>Find out which CMS your company uses. Ask a developer to walk you through the schema for one content type. Don't pretend to understand things you don't — just ask. You'll get a faster education in one 30-minute walkthrough than from any tutorial.</p>` },

      { type: "selfcheck", questions: [
        "What's the difference between a headless CMS and a traditional CMS?",
        "Why might you reference an Author rather than embed their name as a string?",
        "What does AX mean and why do you care about it?"
      ]}
    ]
  },

  {
    id: "m6",
    section: "Module 6",
    number: "06",
    title: "Markdown, MDX, and Component Content",
    intro: "A surprising amount of modern content isn't in a CMS at all — it's in Markdown files in a Git repo. Documentation, technical blogs, developer marketing. As a content engineer, you need to be fluent here too.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>Headless CMSes are great for marketing teams and editorial workflows. Markdown in Git is great for technical docs and content that lives close to code. A modern content engineer works fluently across both.</p>` },

      { type: "head", text: "Concepts", num: "II" },
      { type: "minor", text: "Markdown basics" },
      { type: "prose", html: `<pre><code># Heading 1
## Heading 2

**bold** and *italic* and \`inline code\`

- bullet
- list

[link text](https://example.com)</code></pre>
        <p>You're literally reading rendered Markdown right now.</p>` },

      { type: "minor", text: "Frontmatter — structured metadata in a Markdown file" },
      { type: "prose", html: `<pre><code>---
title: How to bake bread
author: Mira Kapoor
publishedAt: 2025-09-14
tags: [bread, baking]
---

The body of the article starts here.</code></pre>
        <p>That frontmatter block is essentially a content record. The body below is the unstructured part. Together: semi-structured content.</p>` },

      { type: "minor", text: "MDX — Markdown plus components" },
      { type: "prose", html: `<pre><code>---
title: Pricing
---

# Our plans

&lt;PricingTable tier="pro" /&gt;

Everything below is back to normal Markdown.</code></pre>
        <p>The <code>&lt;PricingTable&gt;</code> is a real React component that gets rendered in place. This is <strong>componentized content</strong> — and it's how docs sites like Stripe's, Linear's, and Vercel's are built.</p>` },

      { type: "minor", text: "Static site generators" },
      { type: "prose", html: `<ul>
        <li><strong>Next.js</strong> (with <code>next-mdx-remote</code> or <code>contentlayer</code>) — most common professionally</li>
        <li><strong>Astro</strong> — content-first, gaining ground fast</li>
        <li><strong>Hugo, Jekyll, Eleventy</strong> — older but solid</li>
        <li><strong>Docusaurus, Nextra, Mintlify</strong> — purpose-built for docs</li>
      </ul>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Your engineering team's docs site is a mess. Pages are inconsistent. There's no shared "callout" style — half use blockquotes, half use custom HTML, some are bold paragraphs labeled "Note:". The marketing pricing page has a comparison table that's hand-written HTML and out of date.</p>
        <p>You propose: docs become MDX files in the engineering repo. A <code>&lt;Callout type="warning"&gt;</code> component is built once and used everywhere. The pricing comparison table becomes <code>&lt;PricingComparison plans={["free", "pro", "enterprise"]} /&gt;</code> — a component that reads from the same source of truth as the pricing API.</p>
        <p>Writers write Markdown. Engineers build components. Updates to a callout's style change every callout in the codebase at once. This is content engineering at the file-system level.</p>` },

      { type: "activity", id: "6.1", title: "Write a piece of structured Markdown", prompt: `<p>Open any text editor. Create a file called <code>episode-001.md</code>. Write:</p>
        <pre><code>---
title: "The future of content engineering"
episodeNumber: 1
publishedAt: 2025-11-04
duration: 2840
host: mira-kapoor
guests:
  - rahul-iyer
  - sam-okafor
tags:
  - careers
  - cms
featured: true
---

# Show notes

In this episode we discuss...

## Topics

- Why content is data
- The rise of the headless CMS
- How writers should learn schemas

## Links mentioned

- [Sanity](https://www.sanity.io)
- [Contentful](https://www.contentful.com)</code></pre>
        <p>Notice: the frontmatter is <em>the exact same shape</em> as the Sanity content model you built in Module 5. That's because they are the same content — just stored differently. A content engineer can move content between these formats fluently.</p>`,
        placeholder: "Paste your markdown here, or note what you made and where it lives..." },

      { type: "activity", id: "6.2", title: "Build a tiny docs site with Astro (optional but recommended)", prompt: `<p>If you're feeling brave:</p>
        <ol>
          <li>Install Node.js if you don't have it.</li>
          <li>In a terminal: <code>npm create astro@latest</code> — choose the "Docs" or "Blog" template.</li>
          <li>Add three Markdown files in the content folder.</li>
          <li>Run <code>npm run dev</code> and open the local URL.</li>
        </ol>
        <p>You now have a working static content site running on your machine. You can stop here, or you can spend an evening playing with the templates and seeing how content becomes pages. Either way, you've crossed a threshold.</p>`,
        placeholder: "What worked, what broke, what surprised me:\n- \n- \n- " },

      { type: "apply", html: `<p>If your company has internal docs in Confluence or Notion, ask: would these be better as Markdown in a repo? You don't have to migrate anything — just have the conversation. It will surface a lot about how your org thinks about content infrastructure.</p>` },

      { type: "selfcheck", questions: [
        "What's the difference between Markdown and MDX?",
        "Why is frontmatter a form of structured content?",
        "When would you choose a headless CMS over Markdown files, and vice versa?"
      ]}
    ]
  },

  {
    id: "m7",
    section: "Module 7",
    number: "07",
    title: "Schemas, Metadata, and Taxonomies",
    intro: "Every CMS, every Markdown file, every API response is governed by a schema. The taxonomy you wrap around content is what makes it findable, filterable, and meaningful at scale.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>Schemas are contracts. Taxonomies are how content gets organized and discovered. A content engineer owns both — and pushes back when either is weakly designed.</p>` },

      { type: "head", text: "Concepts", num: "II" },
      { type: "minor", text: "Schema — three overlapping meanings" },
      { type: "prose", html: `<ul>
        <li>A <strong>CMS content model schema</strong> (the fields you defined for Episode in Module 5).</li>
        <li>A <strong>JSON Schema</strong> — a portable, language-agnostic way to describe the shape of a JSON object.</li>
        <li><strong>Schema.org</strong> — a shared vocabulary for describing things on the web (Person, Article, Recipe, Product, Event). When you mark up a page with Schema.org, Google and other engines understand it better.</li>
      </ul>` },

      { type: "minor", text: "Metadata and taxonomy" },
      { type: "prose", html: `<p><strong>Metadata</strong> is data <em>about</em> content — not the content itself. Title, author, published date, locale, status, tags. The frontmatter from Module 6 was metadata.</p>
        <p><strong>Taxonomy</strong> is the organized system of categories, tags, and relationships you use to classify content. Two main shapes:</p>
        <ul>
          <li><strong>Controlled vocabulary</strong> — a fixed, curated list of allowed values. ("Difficulty" can only be beginner / intermediate / advanced.) Better for filters, navigation, analytics.</li>
          <li><strong>Folksonomy</strong> — free-form tags writers can invent. Better for emergent topics, worse for analytics because of inconsistency ("Customer Story" vs "customer-stories" vs "case study").</li>
        </ul>
        <p>A good content engineer often pushes hard toward controlled vocabularies for anything that drives UI or analytics, while allowing free tags for editorial flexibility.</p>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Marketing complains that the blog's category page is a mess. There are 47 tags. "AI", "ai", "Artificial Intelligence", and "machine-learning" are all separate. Articles tagged "Product Updates" and "Product News" go to different pages even though they're the same thing.</p>
        <p>You audit the tags. You propose a controlled vocabulary of ~12 categories and define ~30 approved tags. You write tag definitions ("Use this tag when..."). You migrate the existing content. You make the field a dropdown in the CMS, not a free text input.</p>
        <p>Six months later, the marketing team's monthly report has reliable numbers and the blog's filter page works. You did taxonomy engineering.</p>` },

      { type: "activity", id: "7.1", title: "Audit your real taxonomy", prompt: `<p>Find your company's blog, help center, or content hub. List every tag or category currently in use. Then:</p>
        <ol>
          <li>Group near-duplicates (capitalization variants, synonyms).</li>
          <li>Identify orphan tags (used on 1–2 items only).</li>
          <li>Spot missing categories (clusters of content with no shared tag).</li>
          <li>Propose a cleaned-up taxonomy: target ≤15 top-level categories, with optional secondary tags.</li>
        </ol>
        <p>Write up: which tags merge into which, which get deleted, which get added. This is a real deliverable you could pitch to your manager.</p>`,
        placeholder: "Source I audited:\n\nDuplicates / variants found:\n- AI / ai / Artificial Intelligence -> merge to: ...\n\nOrphan tags:\n- ...\n\nProposed canonical taxonomy:\n1. ...\n2. ...\n\nMigration plan:\n- ..." },

      { type: "activity", id: "7.2", title: "Mark up a page with Schema.org", prompt: `<p>Pick any article page on your company's site. View its HTML source (right-click → View Page Source). Search for "schema.org" — does it appear? If yes, look at what's there. If no, write the Schema.org markup it <em>should</em> have.</p>
        <p>Use <a href="https://schema.org/Article" target="_blank">schema.org/Article</a> as a reference. At minimum:</p>
        <pre><code>&lt;script type="application/ld+json"&gt;
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "How to bake bread",
  "author": {
    "@type": "Person",
    "name": "Mira Kapoor"
  },
  "datePublished": "2025-09-14",
  "image": "https://example.com/bread.jpg"
}
&lt;/script&gt;</code></pre>
        <p>This is what makes your content legible to Google, social cards, and now LLMs scraping the web. Most sites do this badly or not at all.</p>`,
        placeholder: "Page I audited:\nSchema markup currently present (Y/N): \nWhat I'd add or fix:\n\n{\n  \"@context\": \"https://schema.org\",\n  ...\n}" },

      { type: "apply", html: `<p>In your next content review, look at the tags being applied. Ask: "Are these from a defined list, or did the writer make them up? Who decides what tags exist?" Often the answer is: nobody decides, and that's the problem.</p>` },

      { type: "selfcheck", questions: [
        "Difference between metadata and content?",
        "When is a controlled vocabulary better than open tagging?",
        "Why might Schema.org markup affect how an LLM cites your content?"
      ]}
    ]
  },

  {
    id: "m8",
    section: "Module 8",
    number: "08",
    title: "Content for AI and LLMs",
    intro: "LLMs are now a major consumer of content. Your product's help center isn't just read by humans — it's chunked, embedded, and fed into chatbots, AI search, and AI summarizers. Content well-engineered for AI is content well-engineered for everything.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>This is the fastest-moving area of the field, and it's where your content design instincts (clarity, audience, structure) translate most directly into engineering value. Lean in.</p>` },

      { type: "head", text: "Concepts", num: "II" },
      { type: "minor", text: "Retrieval-Augmented Generation (RAG) in plain English" },
      { type: "prose", html: `<p>RAG is the dominant pattern for AI assistants that use your content. Roughly:</p>
        <ol>
          <li>Your content is split into <strong>chunks</strong> (paragraphs, sections).</li>
          <li>Each chunk is converted into an <strong>embedding</strong> — a numeric fingerprint of its meaning.</li>
          <li>When a user asks a question, the question becomes an embedding too.</li>
          <li>The system retrieves the chunks whose embeddings are most similar.</li>
          <li>Those chunks are stuffed into an LLM's context with the question. The LLM answers using them.</li>
        </ol>` },

      { type: "minor", text: "What this means for content" },
      { type: "prose", html: `<ul>
        <li><strong>Chunks should stand alone.</strong> If a paragraph relies on context from three sections above, RAG will retrieve it and the LLM will be confused. Write so that each meaningful section makes sense on its own.</li>
        <li><strong>Headings are anchors.</strong> Good H2/H3 structure helps chunking algorithms split content at meaningful boundaries.</li>
        <li><strong>Define jargon explicitly.</strong> A glossary section, or inline definitions, gives the model what it needs.</li>
        <li><strong>Avoid hidden meaning.</strong> "Click the button" is bad — <em>which</em> button? Spell it out: "Click the <strong>Save</strong> button in the top right."</li>
        <li><strong>Don't bury the lede.</strong> State the answer in the first sentence. RAG retrieval favors chunks that look like answers.</li>
        <li><strong>Mark up structure semantically.</strong> Schema.org, ARIA labels, sensible HTML — all of it helps AI systems understand role and relationship.</li>
      </ul>` },

      { type: "minor", text: "llms.txt" },
      { type: "prose", html: `<p><code>llms.txt</code> is an emerging proposal: a file at the root of a site that gives LLMs a curated map of your important content. Whether or not it becomes a standard, the principle — <em>be intentional about what AI sees</em> — is real and worth adopting.</p>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Your help center has 400 articles. The company spins up an AI chatbot trained on those articles. Two weeks later, customers complain the chatbot gives wrong answers about returns.</p>
        <p>You investigate. The returns policy article uses the phrase "the standard timeframe" without ever defining what it is — because the previous paragraph (which the chunker split off) had the number. Other articles describe returns as "30 days" while one mentions "two weeks." There's no single source.</p>
        <p>Fix: rewrite the returns article so each section is self-contained. Consolidate the conflicting articles. Tag the canonical one. Update the chunker to keep sections together. The chatbot improves overnight. <strong>You just did content engineering for AI.</strong></p>` },

      { type: "activity", id: "8.1", title: "Make a piece of content RAG-ready", prompt: `<p>Take one help article or knowledge-base page from your company (or any company). Read it as if you only had access to one paragraph at a time, in random order. For each paragraph:</p>
        <ul>
          <li>Does it stand alone? Or does it depend on context above?</li>
          <li>Does it use undefined pronouns ("this," "that," "it") whose referent is in another paragraph?</li>
          <li>Does it define its terms?</li>
        </ul>
        <p>Rewrite the article so that every paragraph passes the standalone test. Don't make it robotic — just self-contained.</p>`,
        placeholder: "Original article URL / title:\n\nProblems I found:\n- [paragraph X] uses 'this' referring to something three paragraphs up\n- ...\n\nRewritten version:\n\n..." },

      { type: "activity", id: "8.2", title: "Write an llms.txt", prompt: `<p>Pick any product or service (yours, ideally). Draft a <code>/llms.txt</code> file. The proposed format is Markdown:</p>
        <pre><code># Your Company Name

&gt; One-paragraph description of what you do.

## Docs

- [Getting started](https://example.com/docs/getting-started): how new users set up
- [API reference](https://example.com/docs/api): full REST API docs

## Policies

- [Refund policy](https://example.com/refunds): the canonical refund rules
- [Privacy](https://example.com/privacy)

## Optional

- [Blog](https://example.com/blog)</code></pre>
        <p>You've now thought about your content from an LLM's perspective. Few content people have.</p>`,
        placeholder: "# Company Name\n\n> Description...\n\n## Docs\n\n- [Title](url): description\n\n## Policies\n\n- ..." },

  {
    id: "m9",
    section: "Module 9",
    number: "09",
    title: "Localization and Multi-Channel Delivery",
    intro: "Content engineering really earns its name the moment content needs to exist in multiple languages, regions, and channels. Early architecture decides whether localization is painful or routine.",
    sections: [
      { type: "head", text: "The shift", num: "I" },
      { type: "prose", html: `<p>When content lives in one structured place and is rendered by templates, multiplying it across languages and channels becomes a configuration problem rather than a writing problem.</p>` },

      { type: "head", text: "Concepts", num: "II" },
      { type: "minor", text: "i18n vs l10n" },
      { type: "prose", html: `<p><strong>Localization (l10n)</strong> is adapting content for a specific locale: translating, but also changing currency, date formats, addresses, units, idioms, cultural references, and sometimes whole sections.</p>
        <p><strong>Internationalization (i18n)</strong> is designing your content system so localization is <em>possible</em> — separating translatable strings from code, allowing locale-specific overrides, handling right-to-left languages, etc.</p>
        <p><strong>Locale</strong> is more specific than "language." <code>en-US</code> (English, United States) and <code>en-GB</code> (English, United Kingdom) are different locales. Pricing differs, spelling differs, examples differ.</p>` },

      { type: "minor", text: "Two main localization models in CMSes" },
      { type: "prose", html: `<ul>
        <li><strong>Field-level localization:</strong> every translatable field has a value per locale. The same record holds English, French, German values for its <code>title</code> field.</li>
        <li><strong>Entry-level localization:</strong> there's one record per locale, linked via a shared <code>id</code> or <code>key</code>. The French record is a separate entry from the English one.</li>
      </ul>
      <p>Both have tradeoffs. Field-level is cleaner for parallel translation. Entry-level is cleaner when locales need to diverge significantly (different images, different content order, different sections entirely).</p>` },

      { type: "minor", text: "Channels — the broader problem" },
      { type: "prose", html: `<p>The same content rendered to web, iOS, Android, email, voice, smartwatch, print. Each channel has different constraints (character limits, no images, no rich text, voice-friendly phrasing).</p>
        <p><strong>Channel-aware content</strong> sometimes means modeling multiple variants of a field: <code>headline</code>, <code>headline_short</code> (for cards), <code>headline_voice</code> (for Alexa). Sometimes it means a single canonical version that channels truncate or transform.</p>` },

      { type: "head", text: "Real-world scenario", num: "III" },
      { type: "scenario", html: `<p>Your company is expanding into Japan. Marketing assumes "we'll just translate the website." Six months in, the project is a disaster.</p>
        <p>Examples of what they didn't think about: the homepage hero has a stat that says "Save 30%" — but the Japanese campaign offers different pricing. The customer testimonials are all from US companies. The "Pricing" page references USD only. The product itself uses date format <code>MM/DD/YYYY</code> baked into a content field. The screenshots show the English UI.</p>
        <p>A content engineer would have, six months earlier, modeled the content so that: stats are per-locale, testimonials are tagged by region, prices come from a Pricing service (not hardcoded text), date formats are rendered locale-aware, and screenshots have locale variants. None of this is exotic. It just needs to be planned at the modeling stage, not the translation stage.</p>` },

      { type: "activity", id: "9.1", title: "Localization-readiness audit", prompt: `<p>Take one page on your product. Imagine it has to launch in Japanese tomorrow. Make a list of everything on that page that would break, mistranslate, or be culturally wrong if you literally translated word-for-word.</p>
        <p>You'll find:</p>
        <ul>
          <li>Idioms that don't carry over</li>
          <li>Currency</li>
          <li>Date formats</li>
          <li>Names</li>
          <li>Examples that don't resonate</li>
          <li>Imagery</li>
          <li>Length: German is often 30% longer than English, Japanese can be much shorter — does your design accommodate it?</li>
        </ul>
        <p>Group the findings into:</p>
        <ol>
          <li><strong>Content model changes needed</strong> (e.g., currency must be a structured field, not part of a string)</li>
          <li><strong>Translation guidance needed</strong> (e.g., a glossary of brand terms not to translate)</li>
          <li><strong>Per-locale overrides needed</strong> (e.g., this whole testimonial section needs different content)</li>
        </ol>`,
        placeholder: "Page audited: \n\nProblems found:\n- \n\nContent model changes needed:\n- \n\nTranslation guidance needed:\n- \n\nPer-locale overrides needed:\n- " },

      { type: "activity", id: "9.2", title: "Multi-channel modeling", prompt: `<p>Take any single content type from your earlier work. Now imagine it needs to render on: web, push notification, email subject line, voice assistant.</p>
        <p>For each channel, ask: what's the maximum length, what fields do I need, what fields don't I need, what would I rephrase?</p>
        <p>Then update your content model. You might add <code>pushTitle</code> (max 50 chars), <code>emailSubject</code> (max 80 chars), <code>voiceSummary</code> (one sentence, no abbreviations).</p>`,
        placeholder: "Content type:\n\nChannel: web — fields needed: ..., length: ...\nChannel: push — fields needed: ..., length: ...\nChannel: email subject — fields needed: ..., length: ...\nChannel: voice — fields needed: ..., length: ...\n\nNew/modified fields in my model:\n- " },

      { type: "apply", html: `<p>Even if your company is single-language, ask: "Are we modeling content in a way that would let us localize next year without a rewrite?" The answer is almost always "no, but we should." That's a useful conversation to start.</p>` },

      { type: "selfcheck", questions: [
        "Difference between i18n and l10n?",
        "Field-level vs entry-level localization — when does each make sense?",
        "Why does multi-channel delivery push you toward more granular content models?"
      ]}
    ]
  },

      { type: "minor", text: "CI/CD for content" },
      { type: "prose", html: `<ul>

      { type: "prose", html: `<ul>

        <p>Better version: you ask, "where will these strings live so we can change them without a deploy?" Maybe a <code>onboardingCopy</code> content type in the CMS. Maybe a JSON file pulled at build time. Either way, you've engineered the workflow, not just the words.</p>` },
